---
# DNS role — deploys the services/dns/ Docker Compose stack to diglett-dns.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/dns
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/dns/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/dns/"
    dest: /home/{{ ansible_user }}/homelab/services/dns/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"

- name: Check current mount source for /mnt/nas/docker
  ansible.builtin.shell: awk '$2 == "/mnt/nas/docker" {print $1}' /proc/mounts
  register: current_mount_src
  changed_when: false

- name: Check if /mnt/nas/docker is accessible (detects stale mounts)
  ansible.builtin.command: timeout 5 stat /mnt/nas/docker
  register: mount_accessible
  changed_when: false
  failed_when: false
  become: true

- name: Force unmount if stale or wrong source
  ansible.builtin.command: umount -f -l /mnt/nas/docker
  become: true
  changed_when: true
  failed_when: false
  when: >
    (current_mount_src.stdout != '' and mount_accessible.rc != 0) or
    (current_mount_src.stdout != '' and current_mount_src.stdout != nas_ip + ':/mnt/apps/docker')

- name: Ensure NFS mount point exists
  ansible.builtin.file:
    path: /mnt/nas/docker
    state: directory
    mode: "0755"
  become: true

- name: Mount Alakazam NFS share
  ansible.posix.mount:
    path: /mnt/nas/docker
    src: "{{ nas_ip }}:/mnt/apps/docker"
    fstype: nfs
    opts: soft,timeo=30,nfsvers=4
    state: mounted
  become: true

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/adguardhome/work
    - /mnt/nas/docker/headscale
    - /mnt/nas/docker/headplane
  become: true

- name: Generate headplane cookie secret (32 hex chars, regenerate if wrong length)
  ansible.builtin.shell: |
    target=/mnt/nas/docker/headplane/cookie.secret
    if [ ! -f "$target" ] || [ "$(tr -d '\n' < "$target" | wc -c)" -ne 32 ]; then
      openssl rand -hex 16 > "$target"
      chmod 600 "$target"
      echo changed
    fi
  register: cookie_result
  changed_when: "'changed' in cookie_result.stdout"
  become: true

- name: Read HEADSCALE_SERVER_URL from headscale.env
  ansible.builtin.slurp:
    src: /etc/headscale.env
  register: headscale_env_raw
  become: true

- name: Set headscale URL in headplane config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/dns/headplane/config.yaml
    regexp: '^\s+url:'
    line: "  url: \"{{ headscale_env_raw.content | b64decode | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\\1') | first }}\""
  notify: Restart dns stack

- name: Set headplane base_url in config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/dns/headplane/config.yaml
    regexp: '^\s+base_url:'
    line: "  base_url: \"http://{{ ansible_host }}:3001\""
  notify: Restart dns stack

- name: Enable IP forwarding (required for tailscale exit node)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  become: true

- name: Configure UDP GRO forwarding for tailscale performance
  ansible.builtin.command: ethtool -K eth0 rx-udp-gro-forwarding on rx-gro-list off
  become: true
  changed_when: false

- name: Disable systemd-resolved stub listener (frees port 53)
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  become: true
  notify: Restart systemd-resolved

- name: Pull Docker images
  community.docker.docker_compose_v2_pull:
    project_src: /home/{{ ansible_user }}/homelab/services/dns
  become: true

- name: Start DNS stack
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user }}/homelab/services/dns
    state: present
    pull: never
  become: true
  notify: Restart dns stack
