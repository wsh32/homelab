---
# DNS role -- deploys the services/diglett-dns/ Docker Compose stack to diglett-dns.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/diglett-dns/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/diglett-dns/"
    dest: /home/{{ ansible_user }}/homelab/services/diglett-dns/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"

- name: Mount NFS share
  ansible.builtin.include_tasks: ../../../tasks/nfs-mount.yml
  vars:
    nfs_mount_path: /mnt/nas/docker
    nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/adguardhome/work
    - /mnt/nas/docker/headscale
    - /mnt/nas/docker/headplane
  become: true

- name: Generate headplane cookie secret (32 hex chars, regenerate if wrong length)
  ansible.builtin.shell: |
    target=/mnt/nas/docker/headplane/cookie.secret
    if [ ! -f "$target" ] || [ "$(tr -d '\n' < "$target" | wc -c)" -ne 32 ]; then
      openssl rand -hex 16 > "$target"
      chmod 600 "$target"
      echo changed
    fi
  register: cookie_result
  changed_when: "'changed' in cookie_result.stdout"
  become: true

- name: Read HEADSCALE_SERVER_URL from headscale.env
  ansible.builtin.slurp:
    src: /etc/headscale.env
  register: headscale_env_raw
  become: true

- name: Set headscale URL in headplane config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
    regexp: '^\s+url:'
    line: "  url: \"{{ headscale_env_raw.content | b64decode | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\\1') | first }}\""
  notify: Restart diglett-dns stack

- name: Set headplane base_url in config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
    regexp: '^\s+base_url:'
    line: "  base_url: \"https://headplane.wsh\""
  notify: Restart diglett-dns stack

- name: Validate existing headplane API key against headscale
  ansible.builtin.shell: |
    [ -z "$KEY" ] && exit 1
    docker exec headscale headscale apikeys list --output json 2>/dev/null \
      | python3 -c "import sys,json,os; keys=json.load(sys.stdin); p=os.environ['KEY'][:10]; [sys.exit(0) for k in keys if k.get('prefix','').startswith(p)]; sys.exit(1)"
  environment:
    KEY: "{{ lookup('file', '/mnt/nas/docker/headplane/api.key', errors='ignore') | trim }}"
  register: _hp_key_valid
  failed_when: false
  changed_when: false
  become: true

- name: Create new headscale API key for headplane
  ansible.builtin.shell: |
    docker exec headscale headscale apikeys create --expiration 9999d --output json \
      | tr -d '"'
  register: _hp_new_api_key
  become: true
  when: _hp_key_valid.rc != 0

- name: Save new headplane API key to NFS
  ansible.builtin.copy:
    content: "{{ _hp_new_api_key.stdout | trim }}"
    dest: /mnt/nas/docker/headplane/api.key
    mode: "0600"
  become: true
  when: _hp_key_valid.rc != 0

- name: Read headplane API key for config injection
  ansible.builtin.slurp:
    src: /mnt/nas/docker/headplane/api.key
  register: headplane_api_key_role
  become: true

- name: Inject headplane API key into config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
    regexp: '^\s+api_key:'
    line: "  api_key: \"{{ headplane_api_key_role.content | b64decode | trim }}\""
  notify: Restart diglett-dns stack

# ── Headplane OIDC (conditional -- skipped until infra.yml has run) ────────────

- name: Check if headplane OIDC credentials are available on NFS
  ansible.builtin.stat:
    path: /mnt/nas/docker/headplane-oidc.env
  register: _hp_oidc_env_stat
  become: true

- name: Read headplane OIDC credentials from NFS
  ansible.builtin.slurp:
    src: /mnt/nas/docker/headplane-oidc.env
  register: _hp_oidc_env_raw
  become: true
  when: _hp_oidc_env_stat.stat.exists

- name: Parse headplane OIDC credentials
  ansible.builtin.set_fact:
    _hp_oidc_client_id: "{{ (_hp_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADPLANE_OIDC_CLIENT_ID=(.+)$', '\\1') | first }}"
    _hp_oidc_client_secret: "{{ (_hp_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADPLANE_OIDC_CLIENT_SECRET=(.+)$', '\\1') | first }}"
  when: _hp_oidc_env_stat.stat.exists

- name: Inject OIDC block into headplane config
  ansible.builtin.blockinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
    marker: "# {mark} OIDC -- managed by Ansible"
    insertbefore: '^server:'
    block: |
      oidc:
        issuer: "{{ authentik_public_url }}/application/o/headplane/"
        client_id: "{{ _hp_oidc_client_id }}"
        client_secret: "{{ _hp_oidc_client_secret }}"
        headscale_api_key: "{{ headplane_api_key_role.content | b64decode | trim }}"
        disable_api_key_login: false
  notify: Restart diglett-dns stack
  when: _hp_oidc_env_stat.stat.exists and authentik_public_url is defined

# ── Headscale OIDC (conditional -- skipped until infra.yml has run) ────────────

- name: Check if headscale OIDC credentials are available on NFS
  ansible.builtin.stat:
    path: /mnt/nas/docker/headscale-oidc.env
  register: _hs_oidc_env_stat
  become: true

- name: Read headscale OIDC credentials from NFS
  ansible.builtin.slurp:
    src: /mnt/nas/docker/headscale-oidc.env
  register: _hs_oidc_env_raw
  become: true
  when: _hs_oidc_env_stat.stat.exists

- name: Parse headscale OIDC credentials
  ansible.builtin.set_fact:
    _hs_oidc_client_id: "{{ (_hs_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADSCALE_OIDC_CLIENT_ID=(.+)$', '\\1') | first }}"
    _hs_oidc_client_secret: "{{ (_hs_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADSCALE_OIDC_CLIENT_SECRET=(.+)$', '\\1') | first }}"
  when: _hs_oidc_env_stat.stat.exists

- name: Inject OIDC issuer into headscale config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headscale/config.yaml
    regexp: '^\s+issuer:'
    line: "  issuer: \"{{ authentik_public_url }}/application/o/headscale/\""
  notify: Restart diglett-dns stack
  when: _hs_oidc_env_stat.stat.exists and authentik_public_url is defined

- name: Inject OIDC client ID into headscale config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headscale/config.yaml
    regexp: '^\s+client_id:'
    line: "  client_id: \"{{ _hs_oidc_client_id }}\""
  notify: Restart diglett-dns stack
  when: _hs_oidc_env_stat.stat.exists

- name: Inject OIDC client secret into headscale config
  ansible.builtin.lineinfile:
    path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headscale/config.yaml
    regexp: '^\s+client_secret:'
    line: "  client_secret: \"{{ _hs_oidc_client_secret }}\""
  notify: Restart diglett-dns stack
  when: _hs_oidc_env_stat.stat.exists

- name: Enable IP forwarding (required for tailscale exit node)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  become: true

- name: Disable systemd-resolved stub listener (frees port 53)
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  become: true
  register: resolved_stub

- name: Configure systemd-resolved upstream DNS
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNS='
    line: "DNS={{ dns_fallback }}"
  become: true
  register: resolved_dns

- name: Restart systemd-resolved to apply stub/DNS config
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  become: true
  when: resolved_stub.changed or resolved_dns.changed

# With DNSStubListener=no, the default /etc/resolv.conf symlink points at the
# now-dead stub (127.0.0.53). Repoint it at the non-stub config so the host
# uses 8.8.8.8/8.8.4.4 directly. AdGuard serves LAN clients; the host itself
# does not need to route through AdGuard for its own resolution.
- name: Point /etc/resolv.conf at systemd-resolved non-stub config
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  become: true

- name: Deploy DNS stack
  ansible.builtin.include_tasks: ../../../tasks/compose-deploy.yml
  vars:
    compose_project_src: /home/{{ ansible_user }}/homelab/services/diglett-dns
