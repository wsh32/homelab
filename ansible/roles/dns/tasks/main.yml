---
# DNS role — deploys the services/dns/ Docker Compose stack to diglett-dns.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/dns
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/dns/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/dns/"
    dest: /home/{{ ansible_user }}/homelab/services/dns/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"

- name: Check current mount source for /mnt/nas/docker
  ansible.builtin.shell: awk '$2 == "/mnt/nas/docker" {print $1}' /proc/mounts
  register: current_mount_src
  changed_when: false

- name: Check if /mnt/nas/docker is accessible (detects stale mounts)
  ansible.builtin.command: timeout 5 stat /mnt/nas/docker
  register: mount_accessible
  changed_when: false
  failed_when: false
  become: true

- name: Force unmount if stale or wrong source
  ansible.builtin.command: umount -f -l /mnt/nas/docker
  become: true
  changed_when: true
  failed_when: false
  when: >
    (current_mount_src.stdout != '' and mount_accessible.rc != 0) or
    (current_mount_src.stdout != '' and current_mount_src.stdout != nas_ip + ':/mnt/apps/docker')

- name: Ensure NFS mount point exists
  ansible.builtin.file:
    path: /mnt/nas/docker
    state: directory
    mode: "0755"
  become: true

- name: Mount Alakazam NFS share
  ansible.posix.mount:
    path: /mnt/nas/docker
    src: "{{ nas_ip }}:/mnt/apps/docker"
    fstype: nfs
    opts: soft,timeo=30,nfsvers=4
    state: mounted
  become: true

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/adguardhome/work
    - /mnt/nas/docker/headscale
    - /mnt/nas/docker/headscale-ui
  become: true

- name: Set headscale-ui data directory ownership to container user (1000:1000)
  ansible.builtin.file:
    path: /mnt/nas/docker/headscale-ui
    owner: "1000"
    group: "1000"
  become: true

- name: Generate Fernet key for headscale-ui if not present
  ansible.builtin.shell: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  register: generated_fernet_key
  args:
    creates: /mnt/nas/docker/headscale-ui/fernet.key

- name: Write Fernet key to NFS (persists across VM recreations)
  ansible.builtin.copy:
    content: "{{ generated_fernet_key.stdout }}"
    dest: /mnt/nas/docker/headscale-ui/fernet.key
    mode: "0600"
  when: generated_fernet_key is changed
  no_log: true

- name: Ensure Fernet key is owned by ansible_user
  ansible.builtin.file:
    path: /mnt/nas/docker/headscale-ui/fernet.key
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true

- name: Read Fernet key from NFS
  ansible.builtin.slurp:
    src: /mnt/nas/docker/headscale-ui/fernet.key
  register: fernet_key_raw
  no_log: true

- name: Read HEADSCALE_SERVER_URL from headscale.env
  ansible.builtin.slurp:
    src: /etc/headscale.env
  register: headscale_env_raw
  become: true

- name: Write /etc/headscale-ui.env
  ansible.builtin.copy:
    content: |
      HS_SERVER={{ headscale_env_raw.content | b64decode | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\1') | first }}
      KEY={{ fernet_key_raw.content | b64decode | trim }}
    dest: /etc/headscale-ui.env
    mode: "0600"
    owner: root
    group: root
  become: true
  no_log: true

- name: Disable systemd-resolved stub listener (frees port 53)
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  become: true
  notify: Restart systemd-resolved

- name: Pull Docker images
  community.docker.docker_compose_v2_pull:
    project_src: /home/{{ ansible_user }}/homelab/services/dns
  become: true

- name: Start DNS stack
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user }}/homelab/services/dns
    state: present
    pull: never
  become: true
  notify: Restart dns stack
