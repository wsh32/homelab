---
# DNS role — deploys the services/dns/ Docker Compose stack to diglett-dns.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/ubuntu/homelab/services/dns
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  become: true

- name: Sync services/dns/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/dns/"
    dest: /home/ubuntu/homelab/services/dns/
    delete: true
    recursive: true

- name: Ensure NFS mount point exists
  ansible.builtin.file:
    path: /mnt/nas/docker
    state: directory
    mode: "0755"
  become: true

- name: Mount Alakazam NFS share
  ansible.posix.mount:
    path: /mnt/nas/docker
    src: alakazam:/mnt/apps/docker
    fstype: nfs
    opts: soft,timeo=30,nfsvers=4
    state: mounted
  become: true

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/adguardhome/work
    - /mnt/nas/docker/headscale
  become: true

- name: Pull Docker images
  community.docker.docker_compose_v2_pull:
    project_src: /home/ubuntu/homelab/services/dns
  become: true

- name: Start DNS stack
  community.docker.docker_compose_v2:
    project_src: /home/ubuntu/homelab/services/dns
    state: present
    pull: never
  become: true
  notify: Restart dns stack
