---
# Proxmox-specific configuration for physical Proxmox VE nodes.

- name: Install power monitoring and CPU frequency packages
  ansible.builtin.apt:
    name:
      - lm-sensors
      - ipmitool
      - powerstat
      - linux-cpupower
      - cpufrequtils
    state: present
    update_cache: true
  become: true

- name: Persist schedutil CPU governor
  ansible.builtin.copy:
    content: "GOVERNOR=\"schedutil\"\n"
    dest: /etc/default/cpufrequtils
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Check current CPU governor
  ansible.builtin.command: cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor
  register: current_governor
  changed_when: false
  become: true
  failed_when: false

- name: Set CPU governor to schedutil
  ansible.builtin.command: cpupower frequency-set -g schedutil
  become: true
  when: current_governor.stdout | trim != "schedutil"

- name: Auto-detect hardware sensors
  ansible.builtin.command: sensors-detect --auto
  become: true
  changed_when: false

- name: Install powertop
  ansible.builtin.apt:
    name: powertop
    state: present
    update_cache: true
  become: true

- name: Deploy powertop-autotune systemd service
  ansible.builtin.template:
    src: powertop-autotune.service.j2
    dest: /etc/systemd/system/powertop-autotune.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd

- name: Enable and start powertop-autotune service
  ansible.builtin.systemd:
    name: powertop-autotune
    enabled: true
    state: started
    daemon_reload: true
  become: true
