---
# Deploy Headscale via Docker Compose on the VPS.

- name: Ensure headscale data directory exists
  ansible.builtin.file:
    path: /var/lib/headscale
    state: directory
    mode: "0750"
  become: true

- name: Deploy Headscale via Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/homelab/services/vps
    state: present
    pull: always
  become: true
