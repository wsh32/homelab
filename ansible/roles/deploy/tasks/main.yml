---
# Deploy role -- applied to alakazam-deploy on top of the base role.
# Installs operator tooling: Terraform, Infisical CLI, Ansible (via pipx).

- name: Install pipx and pip
  ansible.builtin.apt:
    name:
      - python3-pip
      - pipx
    state: present
    update_cache: true
  become: true

- name: Add HashiCorp GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
  become: true

- name: Install Terraform
  ansible.builtin.apt:
    name: terraform
    state: present
    update_cache: true
  become: true

- name: Add Infisical apt repository
  ansible.builtin.shell:
    cmd: curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | bash
    creates: /etc/apt/sources.list.d/infisical-infisical-cli.list
  become: true

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present
    update_cache: true
  become: true

- name: Install Ansible via pipx
  community.general.pipx:
    name: ansible
    install_deps: true
    state: present

- name: Ensure pipx bin dir is on PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '\.local/bin.*PATH'
    state: present

- name: Install Bitwarden CLI via snap
  community.general.snap:
    name: bw
    state: present
  become: true

- name: Create tailscale2 state directory
  ansible.builtin.file:
    path: /var/lib/tailscale2
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Install tailscale2 systemd service (hosted tailnet, userspace mode)
  ansible.builtin.copy:
    dest: /etc/systemd/system/tailscale2.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Tailscale node agent (hosted tailnet)
      After=network-pre.target
      Wants=network-pre.target

      [Service]
      ExecStart=/usr/sbin/tailscaled \
        --state=/var/lib/tailscale2/tailscaled.state \
        --socket=/var/run/tailscale2.sock \
        --tun=userspace-networking \
        --outbound-http-proxy-listen=localhost:1055
      Restart=on-failure
      RuntimeDirectory=tailscale2
      RuntimeDirectoryMode=0755

      [Install]
      WantedBy=multi-user.target
  become: true
  notify: Reload systemd

- name: Enable and start tailscale2 service
  ansible.builtin.systemd:
    name: tailscale2
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Configure SSH to route tailscale_hosted nodes via tailscale2 SOCKS5 proxy
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    create: true
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED BLOCK -- tailscale2-proxy"
    block: |
      # Route connections to hosted tailnet nodes through tailscale2 (userspace SOCKS5).
      # Covers MagicDNS hostnames and the 100.x Tailscale IP range.
      Host geodude *.ts.net 100.64.*
          ProxyCommand nc -X 5 -x localhost:1055 %h %p

- name: Configure SSH agent in .bashrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK -- ssh-agent"
    block: |
      if [ -z "$SSH_AUTH_SOCK" ]; then
        eval $(ssh-agent -s)
        ssh-add ~/.ssh/id_ed25519 2>/dev/null || true
      fi
