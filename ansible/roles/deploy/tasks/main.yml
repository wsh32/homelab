---
# Deploy role -- applied to alakazam-deploy on top of the base role.
# Installs operator tooling: Terraform, Infisical CLI, Ansible (via pipx).
#
# Tailscale topology on the deploy VM:
#   primary tailscaled  -- hosted Tailscale tailnet; accepts subnet routes from
#                          physical nodes so Ansible/Terraform reach VMs directly
#   tailscale2          -- Headscale (userspace); makes the deploy VM a peer on
#                          the homelab tailnet so personal devices can SSH in

- name: Install pipx and pip
  ansible.builtin.apt:
    name:
      - python3-pip
      - pipx
      - socat
    state: present
    update_cache: true
  become: true

- name: Add HashiCorp GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
  become: true

- name: Install Terraform
  ansible.builtin.apt:
    name: terraform
    state: present
    update_cache: true
  become: true

- name: Add Infisical apt repository
  ansible.builtin.shell:
    cmd: curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | bash
    creates: /etc/apt/sources.list.d/infisical-infisical-cli.list
  become: true

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present
    update_cache: true
  become: true

- name: Install Ansible via pipx
  community.general.pipx:
    name: ansible
    install_deps: true
    state: present

- name: Ensure pipx bin dir is on PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '\.local/bin.*PATH'
    state: present

- name: Install Bitwarden CLI via snap
  community.general.snap:
    name: bw
    state: present
  become: true

# ── Primary tailscale: hosted tailnet ────────────────────────────────────────

- name: Check primary tailscale enrollment status
  ansible.builtin.command: tailscale status --json
  register: _ts_status
  changed_when: false
  failed_when: false
  become: true

- name: Set primary tailscale enrolled fact
  ansible.builtin.set_fact:
    _ts_enrolled: "{{ _ts_status.rc == 0 and (_ts_status.stdout | from_json).get('BackendState') == 'Running' }}"

- name: Generate hosted tailnet auth key for primary tailscale
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/keys"
    method: POST
    headers:
      Authorization: "Bearer {{ tailscale_api_token }}"
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: false
            preauthorized: true
            tags: ["tag:infra"]
      expirySeconds: 300
    status_code: 200
  register: _ts_key
  no_log: true
  when: not _ts_enrolled

- name: Enroll primary tailscale in hosted tailnet
  ansible.builtin.command: >-
    tailscale up
    --authkey={{ _ts_key.json.key }}
    --hostname=alakazam-deploy
    --advertise-tags=tag:infra
    --accept-routes
    --ssh
  become: true
  no_log: true
  when: not _ts_enrolled

# ── tailscale2: Headscale (userspace) ────────────────────────────────────────

- name: Create tailscale2 state directory
  ansible.builtin.file:
    path: /var/lib/tailscale2
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Install tailscale2 systemd service (Headscale, userspace mode)
  ansible.builtin.copy:
    dest: /etc/systemd/system/tailscale2.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Tailscale node agent (Headscale tailnet)
      After=network-pre.target
      Wants=network-pre.target

      [Service]
      ExecStart=/usr/sbin/tailscaled \
        --state=/var/lib/tailscale2/tailscaled.state \
        --socket=/var/run/tailscale2.sock \
        --tun=userspace-networking \
        --outbound-http-proxy-listen=localhost:1055
      Restart=on-failure
      RuntimeDirectory=tailscale2
      RuntimeDirectoryMode=0755

      [Install]
      WantedBy=multi-user.target
  become: true
  notify: Reload systemd

- name: Enable and start tailscale2 service
  ansible.builtin.systemd:
    name: tailscale2
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Check tailscale2 enrollment status
  ansible.builtin.command: tailscale --socket=/var/run/tailscale2.sock status --json
  register: _ts2_status
  changed_when: false
  failed_when: false
  become: true

- name: Set tailscale2 enrolled fact
  ansible.builtin.set_fact:
    _ts2_enrolled: "{{ _ts2_status.rc == 0 and (_ts2_status.stdout | from_json).get('BackendState') == 'Running' }}"

- name: Enroll tailscale2 in Headscale
  ansible.builtin.command: >-
    tailscale --socket=/var/run/tailscale2.sock up
    --login-server={{ headscale_public_url }}
    --authkey={{ headscale_preauth_key }}
    --hostname=alakazam-deploy
    --accept-routes=false
  become: true
  no_log: true
  when:
    - not _ts2_enrolled
    - headscale_preauth_key | default('REPLACE_ME') != 'REPLACE_ME'

# ── Remove legacy socat relay (no longer needed) ──────────────────────────────

- name: Stop and disable legacy socat-geodude-ssh service
  ansible.builtin.systemd:
    name: socat-geodude-ssh
    state: stopped
    enabled: false
  become: true
  failed_when: false

- name: Remove legacy socat-geodude-ssh service file
  ansible.builtin.file:
    path: /etc/systemd/system/socat-geodude-ssh.service
    state: absent
  become: true
  notify: Reload systemd

# ── SSH config ────────────────────────────────────────────────────────────────

- name: Remove legacy per-host SSH stanzas written by older deploy role versions
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    marker: "# {mark} ANSIBLE MANAGED BLOCK -- tailscale2-{{ item }}"
    state: absent
  loop: "{{ groups['tailscale_hosted'] | default([]) }}"

- name: Remove legacy hosted-tailnet SSH ProxyCommand stanza
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    marker: "# {mark} ANSIBLE MANAGED BLOCK -- tailscale2-proxy"
    state: absent

- name: Add tailscale2 alias to .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: "alias tailscale2='tailscale --socket=/var/run/tailscale2.sock'"
    regexp: "alias tailscale2="
    state: present

- name: Configure SSH agent in .bashrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK -- ssh-agent"
    block: |
      if [ -z "$SSH_AUTH_SOCK" ]; then
        eval $(ssh-agent -s)
        ssh-add ~/.ssh/id_ed25519 2>/dev/null || true
      fi
