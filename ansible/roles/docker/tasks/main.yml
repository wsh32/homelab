---
# Docker role — applied to VMs running Docker Compose services.

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  become: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
  become: true

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add debian user to docker group
  ansible.builtin.user:
    name: debian
    groups: docker
    append: true
  become: true

- name: Configure Docker daemon (log rotation, storage driver)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2"
      }
    mode: "0644"
  become: true
  notify: Restart docker

- name: UFW — allow Docker internal traffic
  community.general.ufw:
    rule: allow
    interface: docker0
    direction: in
  become: true
  ignore_errors: true  # docker0 may not exist yet
