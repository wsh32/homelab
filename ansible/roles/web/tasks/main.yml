---
- name: Create local web data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - /var/lib/tenderloin-web
    - /var/lib/docs-web
    - /var/lib/scramble-web
    - /var/lib/scramble-data
    - /var/lib/scramble-dist
  become: true

- name: Create .ssh directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.ssh
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"

- name: Generate SSH deploy key for git-sync
  community.crypto.openssh_keypair:
    path: /home/{{ ansible_user }}/.ssh/diglett_web_id_ed25519
    type: ed25519
    comment: diglett-web
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  register: deploy_key

- name: Read public key
  ansible.builtin.slurp:
    src: /home/{{ ansible_user }}/.ssh/diglett_web_id_ed25519.pub
  register: deploy_key_pub

- name: Register SSH key on GitHub account
  ansible.builtin.uri:
    url: https://api.github.com/user/keys
    method: POST
    headers:
      Authorization: "Bearer {{ github_token }}"
      Accept: application/vnd.github+json
    body_format: json
    body:
      title: diglett-web
      key: "{{ deploy_key_pub.content | b64decode | trim }}"
    status_code: [201, 422]  # 422 = key already registered
  delegate_to: localhost
  when: deploy_key.changed and (github_token | default('')) not in ['', 'REPLACE_ME']

- name: Add github.com to ubuntu known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
    path: /home/{{ ansible_user }}/.ssh/known_hosts
    state: present

- name: Write tenderloin.ai Cloudflare Tunnel token
  ansible.builtin.copy:
    dest: /etc/tenderloin-tunnel.env
    content: "TUNNEL_TOKEN={{ tenderloin_tunnel_token }}\n"
    owner: root
    group: root
    mode: "0600"
  become: true
  when: tenderloin_tunnel_token is defined

- name: Get Infisical access token via Universal Auth
  ansible.builtin.uri:
    url: "{{ infisical_host }}/api/v1/auth/universal-auth/login"
    method: POST
    body_format: json
    body:
      clientId: "{{ infisical_client_id }}"
      clientSecret: "{{ infisical_client_secret }}"
    status_code: 200
  register: _inf_token
  delegate_to: localhost
  no_log: true
  when:
    - infisical_client_id is defined
    - infisical_client_secret is defined
    - infisical_project_id is defined

- name: Set Infisical facts for upsert
  ansible.builtin.set_fact:
    _inf_project_id: "{{ infisical_project_id }}"
    _inf_environment: "{{ infisical_environment | default('prod') }}"
  when: _inf_token is not skipped

- name: Get SCRAMBLE_JWT_SECRET from Infisical
  ansible.builtin.uri:
    url: "{{ infisical_host }}/api/v3/secrets/raw/SCRAMBLE_JWT_SECRET?workspaceId={{ _inf_project_id }}&environment={{ _inf_environment }}&secretPath=/"
    headers:
      Authorization: "Bearer {{ _inf_token.json.accessToken }}"
    status_code: [200, 404]
  register: _scramble_jwt_get
  delegate_to: localhost
  no_log: true
  when: _inf_token is not skipped

- name: Set SCRAMBLE_JWT_SECRET fact from Infisical
  ansible.builtin.set_fact:
    scramble_jwt_secret: "{{ _scramble_jwt_get.json.secret.secretValue }}"
  no_log: true
  when:
    - _scramble_jwt_get is not skipped
    - _scramble_jwt_get.status == 200

- name: Generate SCRAMBLE_JWT_SECRET
  ansible.builtin.set_fact:
    scramble_jwt_secret: "{{ lookup('ansible.builtin.password', '/dev/null', length=64, chars=['ascii_letters', 'digits']) }}"
  no_log: true
  when:
    - _scramble_jwt_get is not skipped
    - _scramble_jwt_get.status == 404

- name: Store SCRAMBLE_JWT_SECRET in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/infisical-upsert.yml"
  vars:
    _inf_upsert_name: SCRAMBLE_JWT_SECRET
    _inf_upsert_value: "{{ scramble_jwt_secret }}"
  when:
    - _scramble_jwt_get is not skipped
    - _scramble_jwt_get.status == 404

- name: Verify SCRAMBLE_JWT_SECRET is available
  ansible.builtin.assert:
    that:
      - scramble_jwt_secret is defined
      - scramble_jwt_secret | length > 0
    fail_msg: "SCRAMBLE_JWT_SECRET could not be fetched or generated -- check Infisical credentials (infisical_client_id/secret/project_id)."

- name: Write scramble backend environment
  ansible.builtin.copy:
    dest: /etc/scramble.env
    content: "SCRAMBLE_JWT_SECRET={{ scramble_jwt_secret }}\n"
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/diglett-web
    state: directory
    mode: "0755"

- name: Sync services/diglett-web/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/diglett-web/"
    dest: /home/{{ ansible_user }}/homelab/services/diglett-web/
    delete: true
    recursive: true

- name: Start Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user }}/homelab/services/diglett-web
    state: present
    pull: always
  become: true
