---
# Network role -- configures static IP on Proxmox nodes via /etc/network/interfaces.
# Uses ifreload -a (ifupdown2) to apply changes without a full reboot.
#
# Required host variables (set in inventory):
#   static_ip:            "192.168.0.5/24"
#   proxmox_bridge_port:  "eno1"  (physical NIC bridged to vmbr0)

- name: Ensure ifupdown2 is installed (provides ifreload)
  ansible.builtin.apt:
    name: ifupdown2
    state: present
  become: true

- name: Ensure ethtool is installed
  ansible.builtin.apt:
    name: ethtool
    state: present
  become: true
  when: disable_nic_offload | default(false)

- name: Configure /etc/network/interfaces
  ansible.builtin.template:
    src: interfaces.j2
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  notify: Reload network

- name: Disable TSO/GSO/GRO on physical NIC (e1000e/I219 hang workaround)
  ansible.builtin.command: ethtool -K {{ proxmox_bridge_port }} tso off gso off gro off
  become: true
  when: disable_nic_offload | default(false)
  changed_when: false
