---
# Base role — applied to every Ubuntu VM after first boot.
# cloud-init handles the initial package install and Tailscale auth;
# this role handles ongoing configuration and day-2 concerns.

- name: Ensure base packages are present
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - neovim
      - tmux
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - nfs-common
      - avahi-daemon
      - fail2ban
      - ufw
    state: present
    update_cache: true
  become: true

- name: Set timezone to America/Los_Angeles
  community.general.timezone:
    name: America/Los_Angeles
  become: true

- name: Configure UFW — allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
  become: true

- name: Configure fail2ban for SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled  = true
      maxretry = 5
      bantime  = 1h
    mode: "0644"
  become: true
  notify: Restart fail2ban

- name: Disable password authentication in SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  become: true
  notify: Restart sshd

- name: Set nvim as default editor
  ansible.builtin.alternatives:
    name: editor
    path: /usr/bin/nvim
  become: true
  ignore_errors: true  # non-critical

- name: Ensure NFS mount directory exists
  ansible.builtin.file:
    path: /mnt/nas
    state: directory
    mode: "0755"
  become: true

- name: Ensure Tailscale is running and up to date
  ansible.builtin.apt:
    name: tailscale
    state: latest
    update_cache: true
  become: true
  notify: Restart tailscale
