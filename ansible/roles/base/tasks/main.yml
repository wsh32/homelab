---
# Base role -- applied to every Ubuntu VM after first boot.
# cloud-init handles the initial package install and Tailscale auth;
# this role handles ongoing configuration and day-2 concerns.

- name: Stop and disable automatic apt services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
    - unattended-upgrades.service
  become: true
  failed_when: false

- name: Ensure base packages are present
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - neovim
      - tmux
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - nfs-common
      - rsync
      - cron
      - avahi-daemon
    state: present
    update_cache: true
    lock_timeout: 300
  become: true

- name: Set timezone to America/Los_Angeles
  community.general.timezone:
    name: America/Los_Angeles
  become: true

- name: Check if netplan is available
  ansible.builtin.stat:
    path: /usr/sbin/netplan
  register: _netplan_bin

- name: Re-apply netplan to ensure systemd-resolved picks up DNS config
  ansible.builtin.command: netplan apply
  become: true
  changed_when: false
  when: _netplan_bin.stat.exists

- name: Disable password authentication in SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  become: true
  notify: Restart sshd

- name: Set nvim as default editor
  ansible.builtin.alternatives:
    name: editor
    path: /usr/bin/nvim
  become: true
  ignore_errors: true  # non-critical

- name: Ensure NFS mount directory exists
  ansible.builtin.file:
    path: /mnt/nas
    state: directory
    mode: "0755"
  become: true

- name: Download Tailscale apt signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release | lower }}.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  become: true

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release | lower }} main"
    filename: tailscale
    state: present
  become: true

- name: Sync SSH authorized keys from GitHub hourly
  ansible.builtin.cron:
    name: sync-github-ssh-keys
    minute: "0"
    job: >-
      curl -fsSL https://github.com/wsh32.keys
      -o /home/{{ ansible_user }}/.ssh/authorized_keys
      && chmod 600 /home/{{ ansible_user }}/.ssh/authorized_keys
    user: root
  become: true

- name: Ensure Tailscale is running and up to date
  ansible.builtin.apt:
    name: tailscale
    state: latest
    update_cache: true
    lock_timeout: 300
  become: true
  notify: Restart tailscale
