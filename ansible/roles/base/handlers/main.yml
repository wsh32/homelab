---
- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted
  become: true

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  become: true

- name: Restart tailscale
  ansible.builtin.service:
    name: tailscaled
    state: restarted
  become: true
