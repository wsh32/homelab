---
# Radarr initialization role.
# - Waits for Radarr to be healthy
# - Sets auth method to External (reverse-proxy auth)
# - Harvests API key from config.xml and pushes to Infisical
# - Migrates root folder from /movies to /data/movies
# - Adds qBittorrent and SABnzbd as download clients

- name: Wait for Radarr
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/system/status"
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    status_code: [200, 401]
  register: radarr_status
  until: radarr_status.status in [200, 401]
  retries: 40
  delay: 10

# ── Auth method ──────────────────────────────────────────────────────────────
# AuthenticationMethod=External tells Radarr that auth is handled by the
# reverse proxy (Traefik + Authentik forwardAuth) -- no double-login.

- name: Set Radarr auth method to External
  ansible.builtin.replace:
    path: /mnt/nas/docker/radarr/config.xml
    regexp: '<AuthenticationMethod>[^<]*</AuthenticationMethod>'
    replace: '<AuthenticationMethod>External</AuthenticationMethod>'
  become: true
  register: _radarr_auth_method

- name: Restart Radarr if auth method changed
  ansible.builtin.command: docker restart radarr
  become: true
  changed_when: true
  when: _radarr_auth_method.changed

# ── Harvest API key ──────────────────────────────────────────────────────────

- name: Record pre-harvest Radarr key presence
  ansible.builtin.set_fact:
    _radarr_key_in_infisical: "{{ radarr_api_key != '' }}"

- name: Read Radarr API key from config.xml
  ansible.builtin.shell: grep -oP '(?<=<ApiKey>)[^<]+' /mnt/nas/docker/radarr/config.xml
  register: _radarr_key_file
  become: true
  changed_when: false

- name: Set Radarr API key from config
  ansible.builtin.set_fact:
    radarr_api_key: "{{ _radarr_key_file.stdout | trim }}"
    _radarr_key_new: "{{ (_radarr_key_file.stdout | trim) != radarr_api_key }}"
  when: (_radarr_key_file.stdout | default('') | trim) != ''

- name: Push Radarr API key to Infisical
  ansible.builtin.uri:
    url: "{{ infisical_host }}/api/v3/secrets/raw/RADARR_API_KEY"
    method: "{{ 'PATCH' if _radarr_key_in_infisical else 'POST' }}"
    headers:
      Authorization: "Bearer {{ _inf_token.json.accessToken }}"
    body_format: json
    body:
      workspaceId: "{{ _inf_project_id }}"
      environment: "{{ _inf_environment }}"
      secretPath: "/"
      secretValue: "{{ radarr_api_key }}"
      type: shared
    status_code: [200, 201]
  no_log: true
  when: _radarr_key_new | default(false) and radarr_api_key != ''

# ── Root folder migration ────────────────────────────────────────────────────

- name: Get Radarr root folders
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/rootfolder"
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    return_content: true
  register: radarr_folders

- name: Delete legacy Radarr /movies root folder
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/rootfolder/{{ item.id }}"
    method: DELETE
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    status_code: 200
  loop: "{{ radarr_folders.json | selectattr('path', 'equalto', '/movies') | list }}"

- name: Add /data/movies root folder to Radarr
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/rootfolder"
    method: POST
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    body_format: json
    body:
      path: /data/movies
    status_code: 201
  when: radarr_folders.json | selectattr('path', 'equalto', '/data/movies') | list | length == 0

- name: Trigger Radarr library rescan
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/command"
    method: POST
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    body_format: json
    body:
      name: RescanMovie
    status_code: 201
  when: radarr_folders.json | selectattr('path', 'equalto', '/movies') | list | length > 0

# ── Download clients ─────────────────────────────────────────────────────────

- name: Get existing Radarr download clients
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/downloadclient"
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    return_content: true
  register: radarr_dlclients_check

- name: Add qBittorrent to Radarr
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/downloadclient"
    method: POST
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    body_format: json
    body:
      name: qBittorrent
      enable: true
      protocol: torrent
      priority: 1
      implementation: QBittorrent
      configContract: QBittorrentSettings
      fields:
        - name: host
          value: "gluetun"
        - name: port
          value: "{{ qbittorrent_webui_port }}"
        - name: movieCategory
          value: radarr
        - name: recentMoviePriority
          value: 0
        - name: olderMoviePriority
          value: 0
        - name: initialState
          value: 0
    status_code: 201
  when: radarr_dlclients_check.json | selectattr('name', 'equalto', 'qBittorrent') | list | length == 0

- name: Upsert SABnzbd in Radarr
  vars:
    _existing: "{{ radarr_dlclients_check.json | selectattr('name', 'equalto', 'SABnzbd') | list }}"
  ansible.builtin.uri:
    url: "{{ radarr_url }}/api/v3/downloadclient{{ '/' ~ _existing[0].id if _existing | length > 0 else '' }}"
    method: "{{ 'PUT' if _existing | length > 0 else 'POST' }}"
    headers:
      X-Api-Key: "{{ radarr_api_key }}"
    body_format: json
    body:
      id: "{{ _existing[0].id | default(omit) }}"
      name: SABnzbd
      enable: true
      protocol: usenet
      priority: 1
      implementation: Sabnzbd
      configContract: SabnzbdSettings
      fields:
        - name: host
          value: sabnzbd
        - name: port
          value: 8080
        - name: apiKey
          value: "{{ sabnzbd_api_key }}"
        - name: movieCategory
          value: movies
        - name: recentMoviePriority
          value: -100
        - name: olderMoviePriority
          value: -100
    status_code: [201, 202]
