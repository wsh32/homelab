---
_svc: "{{ dict(services | default([]) | map(attribute='name') | zip(services | default([]))) }}"
bazarr_port: "{{ (_svc['bazarr'] | default({})).port | default(6767) }}"
bazarr_url: "http://localhost:{{ bazarr_port }}"
radarr_port: "{{ (_svc['radarr'] | default({})).port | default(7878) }}"
radarr_url: "http://localhost:{{ radarr_port }}"
sonarr_port: "{{ (_svc['sonarr'] | default({})).port | default(8989) }}"
sonarr_url: "http://localhost:{{ sonarr_port }}"
