---
# Bazarr initialization role.
# - Pre-seeds config.ini (skips if already exists)
# - Reads API key from config.yaml and pushes to Infisical
# - Patches config.yaml with current arr API keys and providers
# - Creates English language profile and sets as default
# - Restarts Bazarr if config changed

- name: Create Bazarr config directory on NFS
  ansible.builtin.file:
    path: /mnt/nas/docker/bazarr/config
    state: directory
  become: true

- name: Pre-seed Bazarr config.ini (skips if already exists)
  ansible.builtin.copy:
    dest: /mnt/nas/docker/bazarr/config/config.ini
    force: false
    content: |
      [auth]
      apikey = {{ bazarr_api_key }}
      type = None

      [sonarr]
      ip = sonarr
      port = 8989
      apikey = {{ sonarr_api_key }}
      ssl = False
      base_url = /
      use_sonarr = True
      full_update = Daily
      full_update_hour = 4

      [radarr]
      ip = radarr
      port = 7878
      apikey = {{ radarr_api_key }}
      ssl = False
      base_url = /
      use_radarr = True
      full_update = Daily
      full_update_hour = 4

      [general]
      ip = 0.0.0.0
      port = 6767
      base_url = /
      debug = False
      branch = master
      auto_update = True
      single_language = False
      minimum_score = 90
      use_postprocessing = False
      postprocessing_cmd =
      use_sonarr = True
      use_radarr = True
      path_mappings = []
      path_mappings_movie = []
  become: true

- name: Read Bazarr API key from config.yaml
  ansible.builtin.shell: >-
    python3 -c "import yaml; d=yaml.safe_load(open('/mnt/nas/docker/bazarr/config/config.yaml')); print(d.get('auth',{}).get('apikey',''))"
  register: _bazarr_key_file
  changed_when: false
  failed_when: false
  become: true

- name: Sync Bazarr API key from config.yaml into fact
  ansible.builtin.set_fact:
    bazarr_api_key: "{{ _bazarr_key_file.stdout | trim }}"
  when: (_bazarr_key_file.stdout | trim) != ''

- name: Upsert BAZARR_API_KEY in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/infisical-upsert.yml"
  vars:
    _inf_upsert_name: BAZARR_API_KEY
    _inf_upsert_value: "{{ bazarr_api_key }}"
  when: bazarr_api_key != ''

- name: Update BAZARR_API_KEY in /etc/homelab.env
  ansible.builtin.lineinfile:
    path: /etc/homelab.env
    regexp: '^BAZARR_API_KEY='
    line: "BAZARR_API_KEY={{ bazarr_api_key }}"
  become: true
  when: bazarr_api_key != ''

- name: Get current Bazarr enabled providers
  ansible.builtin.uri:
    url: "{{ bazarr_url }}/api/system/settings"
    headers:
      X-Api-Key: "{{ bazarr_api_key }}"
    status_code: 200
  register: _bazarr_settings
  when: bazarr_api_key != ''

- name: Patch Bazarr config.yaml with current API keys and providers
  ansible.builtin.shell: |
    python3 << 'EOF'
    import yaml

    with open('/mnt/nas/docker/bazarr/config/config.yaml') as f:
        cfg = yaml.safe_load(f)

    changed = False

    desired_providers = {{ bazarr_providers | to_json }}
    if sorted(cfg.get('general', {}).get('enabled_providers', [])) != sorted(desired_providers):
        cfg.setdefault('general', {})['enabled_providers'] = desired_providers
        changed = True

    if cfg.get('sonarr', {}).get('apikey') != '{{ sonarr_api_key }}':
        cfg.setdefault('sonarr', {})['apikey'] = '{{ sonarr_api_key }}'
        changed = True

    if cfg.get('radarr', {}).get('apikey') != '{{ radarr_api_key }}':
        cfg.setdefault('radarr', {})['apikey'] = '{{ radarr_api_key }}'
        changed = True

    if changed:
        with open('/mnt/nas/docker/bazarr/config/config.yaml', 'w') as f:
            yaml.dump(cfg, f, default_flow_style=False, allow_unicode=True)
        print('changed')
    else:
        print('ok')
    EOF
  register: _bazarr_config_patch
  changed_when: _bazarr_config_patch.stdout | trim == 'changed'
  become: true
  when:
    - bazarr_api_key != ''
    - sonarr_api_key != ''
    - radarr_api_key != ''

- name: Get Bazarr language profiles
  ansible.builtin.uri:
    url: "{{ bazarr_url }}/api/system/languages/profiles"
    headers:
      X-Api-Key: "{{ bazarr_api_key }}"
    return_content: true
  register: _bazarr_lang_profiles
  when: bazarr_api_key != ''

- name: Create Bazarr language profile -- English
  ansible.builtin.uri:
    url: "{{ bazarr_url }}/api/system/settings"
    method: POST
    headers:
      X-Api-Key: "{{ bazarr_api_key }}"
      Content-Type: "application/x-www-form-urlencoded"
    body: "languages-profiles={{ [{'profileId': 1, 'name': 'English', 'cutoff': 1, 'items': [{'id': 1, 'language': 'en', 'hi': 'False', 'forced': 'False', 'audio_exclude': 'False', 'audio_only_include': 'False'}], 'mustContain': '[]', 'mustNotContain': '[]', 'originalFormat': none, 'tag': none}] | to_json | urlencode }}"
    status_code: [200, 204]
  register: _bazarr_profile_create
  when:
    - bazarr_api_key != ''
    - _bazarr_lang_profiles is not skipped
    - (_bazarr_lang_profiles.content | from_json) | selectattr('name', 'equalto', 'English') | list | length == 0

- name: Get Bazarr language profiles (after possible creation)
  ansible.builtin.uri:
    url: "{{ bazarr_url }}/api/system/languages/profiles"
    headers:
      X-Api-Key: "{{ bazarr_api_key }}"
    return_content: true
  register: _bazarr_lang_profiles_current
  when: bazarr_api_key != ''

- name: Patch Bazarr config.yaml -- set default language profile
  ansible.builtin.shell: |
    python3 << 'EOF'
    import yaml, json

    with open('/mnt/nas/docker/bazarr/config/config.yaml') as f:
        cfg = yaml.safe_load(f)

    profiles = json.loads({{ _bazarr_lang_profiles_current.content | to_json }})
    profile = next((p for p in profiles if p['name'] == 'English'), None)
    if not profile:
        print('ok')
        exit(0)

    profile_id = str(profile['profileId'])
    changed = False

    for key in ('serie_default_profile', 'movie_default_profile'):
        if str(cfg.get('general', {}).get(key, '')) != profile_id:
            cfg.setdefault('general', {})[key] = profile_id
            changed = True

    for key in ('serie_default_enabled', 'movie_default_enabled'):
        if not cfg.get('general', {}).get(key):
            cfg.setdefault('general', {})[key] = True
            changed = True

    if changed:
        with open('/mnt/nas/docker/bazarr/config/config.yaml', 'w') as f:
            yaml.dump(cfg, f, default_flow_style=False, allow_unicode=True)
        print('changed')
    else:
        print('ok')
    EOF
  register: _bazarr_profile_patch
  changed_when: _bazarr_profile_patch.stdout | trim == 'changed'
  become: true
  when:
    - bazarr_api_key != ''
    - _bazarr_lang_profiles_current is not skipped

- name: Restart Bazarr to apply config changes
  ansible.builtin.command: docker restart bazarr
  become: true
  changed_when: true
  when: _bazarr_config_patch is changed or _bazarr_profile_patch is changed
