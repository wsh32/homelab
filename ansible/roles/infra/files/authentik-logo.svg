<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="47"/>
    </clipPath>
  </defs>

  <!-- Top half: red -->
  <path d="M 3 50 A 47 47 0 0 1 97 50 Z" fill="#CC0000"/>

  <!-- Bottom half: white -->
  <path d="M 3 50 A 47 47 0 0 0 97 50 Z" fill="#f8f8f8"/>

  <!-- Center band -->
  <rect x="3" y="45" width="94" height="10" fill="#111" clip-path="url(#c)"/>

  <!-- Center button -->
  <circle cx="50" cy="50" r="14" fill="#111"/>
  <circle cx="50" cy="50" r="9" fill="#f8f8f8"/>
  <ellipse cx="47" cy="47" rx="2.5" ry="2" fill="white" opacity="0.6"/>

