<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="50" r="47"/>
    </clipPath>
  </defs>

  <!-- Bottom half: white -->
  <path d="M 3 50 A 47 47 0 0 0 97 50 Z" fill="#f0f0f5"/>

  <!-- Top half: Master Ball purple -->
  <path d="M 3 50 A 47 47 0 0 1 97 50 Z" fill="#7B4FA8"/>

  <!-- Pink decorative arcs -->
  <path d="M 9 44 Q 16 20 40 14" fill="none" stroke="#E0558A" stroke-width="6.5" stroke-linecap="round" clip-path="url(#c)"/>
  <path d="M 91 44 Q 84 20 60 14" fill="none" stroke="#E0558A" stroke-width="6.5" stroke-linecap="round" clip-path="url(#c)"/>

  <!-- White oval accents flanking M -->
  <ellipse cx="31" cy="25" rx="4.5" ry="5.5" fill="white" clip-path="url(#c)"/>
  <ellipse cx="69" cy="25" rx="4.5" ry="5.5" fill="white" clip-path="url(#c)"/>

  <!-- White M -->
  <text x="50" y="36" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="23" fill="white" text-anchor="middle" dominant-baseline="middle">M</text>

  <!-- Center band -->
  <rect x="3" y="45" width="94" height="10" fill="#111" clip-path="url(#c)"/>

  <!-- Center button -->
  <circle cx="50" cy="50" r="14" fill="#111"/>
  <circle cx="50" cy="50" r="11" fill="#E0558A"/>
  <circle cx="50" cy="50" r="7" fill="#f8f8fc"/>
  <ellipse cx="47.5" cy="47" rx="2.2" ry="1.6" fill="white" opacity="0.6"/>

  <!-- Outer border -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#111" stroke-width="2.5"/>
</svg>
