---
# Infra role — deploys the services/machamp-infra/ Docker Compose stack to machamp-infra.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/machamp-infra
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/machamp-infra/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/machamp-infra/"
    dest: /home/{{ ansible_user }}/homelab/services/machamp-infra/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"
      - "--exclude=.env"   # preserve the /etc/homelab.env symlink created below

- name: Mount NFS share
  ansible.builtin.include_tasks: ../../../tasks/nfs-mount.yml
  vars:
    nfs_mount_path: /mnt/nas/docker
    nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

- name: Create local data directories (VM disk — not NFS, avoids soft-mount corruption)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    # PostgreSQL alpine image runs as uid 70 (alpine), not 999 (debian).
    - { path: /var/lib/postgres,    owner: "70",  group: "70",  mode: "0750" }
    - { path: /var/lib/vaultwarden, owner: "0",   group: "0",   mode: "0755" }
  become: true

- name: Create NFS sentinel directory
  ansible.builtin.file:
    path: /mnt/nas/docker/infisical-backups
    state: directory
    mode: "0755"
  become: true

- name: Create NFS backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/postgres-backup
    - /mnt/nas/docker/vaultwarden-backup
  become: true

- name: Create Traefik and step-ca NFS directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "0755"
  loop:
    - { path: /mnt/nas/docker/traefik/acme, owner: "0" }
    # step-ca runs as uid 1000 and writes its config/certs here on first init
    - { path: /mnt/nas/docker/step-ca, owner: "1000" }
  become: true

- name: Create Authentik NFS media directories (owned by uid 1000 — authentik container user)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - /mnt/nas/docker/authentik/media
    - /mnt/nas/docker/authentik/media/public
    - /mnt/nas/docker/authentik/custom-templates
  become: true

- name: Check for inconsistent state (data dir exists but NFS sentinel missing)
  ansible.builtin.shell: |
    sentinel=/mnt/nas/docker/infisical-backups/.secrets.env
    if [ -d /var/lib/postgres ] && [ "$(ls -A /var/lib/postgres 2>/dev/null)" ] \
        && [ ! -f "$sentinel" ]; then
      echo "INCONSISTENT"
    fi
  register: state_check
  changed_when: false
  become: true

- name: Fail on inconsistent state — secrets and data dir are out of sync
  ansible.builtin.fail:
    msg: >
      PostgreSQL data directory exists but the NFS secrets sentinel is missing.
      Regenerating secrets would break the existing database.
      To recover: restore the sentinel from backup, or wipe the data dir
      (sudo rm -rf /var/lib/postgres) if this is a fresh install with no real
      data, then re-run.
  when: state_check.stdout == 'INCONSISTENT'

- name: Generate bootstrap secrets (idempotent — skipped if NFS sentinel exists)
  ansible.builtin.shell: |
    nfs_secrets=/mnt/nas/docker/infisical-backups/.secrets.env
    local_env=/etc/homelab.env
    if [ ! -f "$nfs_secrets" ]; then
      tmp=$(mktemp)
      printf "POSTGRES_PASSWORD=%s\n"       "$(openssl rand -hex 16)" > "$tmp"
      printf "INFISICAL_AUTH_SECRET=%s\n"   "$(openssl rand -hex 32)" >> "$tmp"
      printf "INFISICAL_ENCRYPTION_KEY=%s\n" "$(openssl rand -hex 16)" >> "$tmp"
      printf "VAULTWARDEN_ADMIN_TOKEN=%s\n" "$(openssl rand -hex 32)" >> "$tmp"
      printf "VAULTWARDEN_SIGNUPS_ALLOWED=true\n"                      >> "$tmp"
      printf "AUTHENTIK_DB_PASSWORD=%s\n"      "$(openssl rand -hex 16)" >> "$tmp"
      printf "AUTHENTIK_SECRET_KEY=%s\n"       "$(openssl rand -hex 32)" >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_PASSWORD=%s\n" "$(openssl rand -hex 16)" >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_EMAIL=%s\n"  "akadmin@homelab.local"    >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_TOKEN=%s\n"  "$(openssl rand -hex 32)"  >> "$tmp"
      chmod 600 "$tmp"
      cp "$tmp" "$nfs_secrets"
      mv "$tmp" "$local_env"
      echo changed
    elif [ ! -f "$local_env" ]; then
      cp "$nfs_secrets" "$local_env"
      chmod 600 "$local_env"
      echo changed
    fi
  register: secrets_result
  changed_when: "'changed' in secrets_result.stdout"
  no_log: true
  become: true

- name: Write AUTHENTIK_HOST to homelab.env (sets canonical public URL for OIDC token issuers)
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_HOST='
    line: "AUTHENTIK_HOST={{ authentik_public_url }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  no_log: true
  when: authentik_public_url is defined

- name: Override Authentik admin email from secrets.yml
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_BOOTSTRAP_EMAIL='
    line: "AUTHENTIK_BOOTSTRAP_EMAIL={{ authentik_admin_email }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  no_log: true
  when: authentik_admin_email is defined

- name: Override Authentik admin password from secrets.yml
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_BOOTSTRAP_PASSWORD='
    line: "AUTHENTIK_BOOTSTRAP_PASSWORD={{ authentik_admin_password }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  no_log: true
  when: authentik_admin_password is defined

- name: Ensure /etc/homelab.env has correct permissions
  ansible.builtin.file:
    path: /etc/homelab.env
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Link /etc/homelab.env as compose .env for variable substitution
  ansible.builtin.file:
    src: /etc/homelab.env
    dest: /home/{{ ansible_user }}/homelab/services/machamp-infra/.env
    state: link
    force: true
  become: true

- name: Write Cloudflare Tunnel token to /etc/cloudflare-tunnel.env
  ansible.builtin.copy:
    dest: /etc/cloudflare-tunnel.env
    content: "TUNNEL_TOKEN={{ cloudflare_tunnel_token }}\n"
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  when: cloudflare_tunnel_token is defined

- name: Check if postgres data directory is empty
  ansible.builtin.find:
    paths: /var/lib/postgres
    file_type: any
    hidden: true
  register: postgres_data_contents
  become: true

- name: Find postgres backups on NFS
  ansible.builtin.find:
    paths: /mnt/nas/docker/postgres-backup
    patterns: "dump_*.sql.gz"
    file_type: file
  register: postgres_backups
  become: true

- name: Restore postgres from NFS backup (data dir empty, backup present)
  when:
    - postgres_data_contents.files | length == 0
    - postgres_backups.files | length > 0
  block:
    - name: Set latest postgres backup path
      ansible.builtin.set_fact:
        _latest_pg_backup: "{{ (postgres_backups.files | sort(attribute='mtime') | last).path }}"

    - name: Start postgres container for restore
      community.docker.docker_compose_v2:
        project_src: /home/{{ ansible_user }}/homelab/services/machamp-infra
        services:
          - postgres
        state: present
        pull: missing
      become: true

    - name: Wait for postgres to be ready before restore
      ansible.builtin.shell: docker exec postgres pg_isready -U postgres
      become: true
      register: pg_ready_restore
      retries: 30
      delay: 3
      until: pg_ready_restore.rc == 0
      changed_when: false

    - name: Restore all databases from NFS dump
      ansible.builtin.shell: |
        gunzip -c {{ _latest_pg_backup }} | docker exec -i postgres psql -U postgres
      become: true
      no_log: true

- name: Check if vaultwarden database exists
  ansible.builtin.stat:
    path: /var/lib/vaultwarden/db.sqlite3
  register: vaultwarden_db_check
  become: true

- name: Check if vaultwarden litestream backup exists on NFS
  ansible.builtin.stat:
    path: /mnt/nas/docker/vaultwarden-backup/db.sqlite3
  register: vaultwarden_backup_check
  become: true

- name: Restore vaultwarden from litestream backup (db missing, backup present)
  ansible.builtin.shell: |
    docker run --rm \
      -v /var/lib/vaultwarden:/data \
      -v /mnt/nas/docker/vaultwarden-backup:/backup \
      -v /home/{{ ansible_user }}/homelab/services/machamp-infra/litestream.yml:/etc/litestream.yml:ro \
      litestream/litestream:0.5.11 \
      restore -config /etc/litestream.yml /data/db.sqlite3
  become: true
  when:
    - not vaultwarden_db_check.stat.exists
    - vaultwarden_backup_check.stat.exists

- name: Deploy infra stack
  ansible.builtin.include_tasks: ../../../tasks/compose-deploy.yml
  vars:
    compose_project_src: /home/{{ ansible_user }}/homelab/services/machamp-infra

- name: Ensure step-ca root cert is world-readable (required by ca-page nginx container)
  ansible.builtin.file:
    path: /mnt/nas/docker/step-ca/certs/root_ca.crt
    mode: "o+r"
  become: true
  # The file is written by the step-ca container on first init; skip gracefully if not yet present.
  failed_when: false

- name: Wait for Traefik port 443
  ansible.builtin.wait_for:
    host: localhost
    port: 443
    timeout: 30
  failed_when: false
  become: true

- name: Check TLS cert issuer on Traefik
  ansible.builtin.shell: |
    echo | openssl s_client -connect localhost:443 -servername infisical.home 2>/dev/null \
      | openssl x509 -noout -issuer 2>/dev/null
  register: traefik_cert_issuer
  changed_when: false
  failed_when: false
  become: true

- name: Clear stale acme.json (Traefik serving a non-step-ca cert)
  ansible.builtin.shell: truncate -s 0 /mnt/nas/docker/traefik/acme/acme.json
  become: true
  register: acme_cleared
  # Only act when Traefik returned something — empty means ACME still pending, don't interfere
  when:
    - traefik_cert_issuer.stdout != ''
    - "'Team Rocket' not in traefik_cert_issuer.stdout"

- name: Restart Traefik to re-trigger ACME after clearing stale cert
  community.docker.docker_container:
    name: traefik
    state: started
    restart: true
  become: true
  when: acme_cleared.changed

- name: Check if Vaultwarden admin token is already Argon2-hashed
  ansible.builtin.shell: |
    grep '^VAULTWARDEN_ADMIN_TOKEN=' /etc/homelab.env | cut -d= -f2- | grep -q '^\$argon2' && echo hashed || echo plain
  register: vw_token_state
  changed_when: false
  no_log: true
  become: true

- name: Wait for Vaultwarden container to be running (needed for hash command)
  ansible.builtin.shell: docker inspect --format='{{"{{"}} .State.Running {{"}}"}}' vaultwarden
  register: vw_running
  retries: 15
  delay: 5
  until: vw_running.stdout == 'true'
  changed_when: false
  become: true
  when: vw_token_state.stdout == 'plain'

- name: Hash Vaultwarden admin token with Argon2 PHC (idempotent — skipped if already hashed)
  ansible.builtin.shell: |
    token=$(grep '^VAULTWARDEN_ADMIN_TOKEN=' /etc/homelab.env | cut -d= -f2-)
    hashed=$(echo -n "$token" | docker exec -i vaultwarden /vaultwarden hash --preset owasp 2>/dev/null)
    python3 - "$hashed" <<'PYEOF'
    import sys, re
    hashed = sys.argv[1]
    for path in ['/etc/homelab.env', '/mnt/nas/docker/infisical-backups/.secrets.env']:
        try:
            with open(path, 'r') as f:
                content = f.read()
            with open(path, 'w') as f:
                f.write(re.sub(r'^VAULTWARDEN_ADMIN_TOKEN=.*$', 'VAULTWARDEN_ADMIN_TOKEN=' + hashed, content, flags=re.MULTILINE))
        except OSError:
            pass
    PYEOF
    echo changed
  register: vw_hash_result
  changed_when: "'changed' in vw_hash_result.stdout"
  no_log: true
  become: true
  when: vw_token_state.stdout == 'plain'

- name: Restart Vaultwarden to apply hashed admin token
  community.docker.docker_container:
    name: vaultwarden
    state: started
    restart: true
  become: true
  when: vw_hash_result.changed | default(false)

- name: Wait for postgres to be ready
  ansible.builtin.shell: docker exec postgres pg_isready -U postgres
  become: true
  register: pg_ready
  retries: 30
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Wait for Infisical to be healthy, unlocking migration table on each retry (up to 5 minutes)
  ansible.builtin.shell: |
    # Unlock any stuck knex migration lock before each health check attempt.
    docker exec postgres psql -U postgres -d infisical \
      -c "UPDATE knex_migrations_lock SET is_locked = 0 WHERE is_locked = 1;" \
      2>/dev/null || true
    curl -sf http://localhost:8080/api/status
  become: true
  register: infisical_health
  retries: 60
  delay: 5
  until: infisical_health.rc == 0

# ── Authentik OIDC bootstrap ──────────────────────────────────────────────────

- name: Wait for Authentik to be healthy (up to 15 minutes — migrations can be slow on first boot)
  ansible.builtin.uri:
    url: "http://localhost:9000/-/health/ready/"
    status_code: 200
  register: authentik_health
  retries: 180
  delay: 5
  until: authentik_health.status == 200
  changed_when: false

- name: Read AUTHENTIK_BOOTSTRAP_TOKEN from /etc/homelab.env
  ansible.builtin.shell: grep '^AUTHENTIK_BOOTSTRAP_TOKEN=' /etc/homelab.env | cut -d= -f2-
  register: _authentik_token_raw
  changed_when: false
  no_log: true
  become: true

- name: Set Authentik API token fact
  ansible.builtin.set_fact:
    _authentik_token: "{{ _authentik_token_raw.stdout | trim }}"
  no_log: true

- name: Wait for Authentik API to be ready (post-migration setup and blueprints can take extra time)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _api_ready
  retries: 60
  delay: 5
  until: _api_ready.status == 200
  changed_when: false
  no_log: true

- name: Check if Headscale OIDC provider already exists in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/?name=headscale"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _existing_provider_result
  no_log: true

- name: Set provider existence facts
  ansible.builtin.set_fact:
    _provider_exists: "{{ _existing_provider_result.json.pagination.count > 0 }}"
    _existing_provider: "{{ _existing_provider_result.json.results[0] | default({}) }}"
  no_log: true

- name: Get Authentik self-signed certificate for RS256 token signing
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/crypto/certificatekeypairs/?has_key=true&page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _certs_result
  no_log: true

- name: Set signing key fact (first available cert with a private key)
  ansible.builtin.set_fact:
    _signing_key_pk: "{{ _certs_result.json.results[0].pk }}"
  no_log: true

- name: Get built-in OIDC scope property mappings
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _scope_mappings_result
  no_log: true
  when: not _provider_exists

- name: Extract standard scope mapping PKs (openid, email, profile)
  ansible.builtin.set_fact:
    _scope_pks: >-
      {{
        _scope_mappings_result.json.results
        | selectattr('managed', 'in', [
            'goauthentik.io/providers/oauth2/scope-openid',
            'goauthentik.io/providers/oauth2/scope-email',
            'goauthentik.io/providers/oauth2/scope-profile'
          ])
        | map(attribute='pk')
        | list
      }}
  when: not _provider_exists

- name: Get default implicit-consent authorization flow
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/flows/instances/?designation=authorization&slug=default-provider-authorization-implicit-consent"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _auth_flow_result
  no_log: true
  when: not _provider_exists

- name: Get default invalidation flow
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/flows/instances/?designation=invalidation&slug=default-provider-invalidation-flow"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _invalidation_flow_result
  no_log: true
  when: not _provider_exists

- name: Create Headscale OAuth2 provider in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "headscale"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      client_type: "confidential"
      redirect_uris:
        - matching_mode: "strict"
          url: "{{ headscale_public_url }}/oidc/callback"
      sub_mode: "user_email"
      signing_key: "{{ _signing_key_pk }}"
      property_mappings: "{{ _scope_pks }}"
      include_claims_in_id_token: true
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
    status_code: 201
  register: _new_provider
  no_log: true
  when: not _provider_exists

- name: Create Headscale application in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Headscale"
      slug: "headscale"
      provider: "{{ _new_provider.json.pk }}"
    status_code: [201, 400]  # 400 = application slug already exists, treat as idempotent
  no_log: true
  when: not _provider_exists

- name: Set OIDC client credentials from new provider
  ansible.builtin.set_fact:
    _oidc_client_id: "{{ _new_provider.json.client_id }}"
    _oidc_client_secret: "{{ _new_provider.json.client_secret }}"
  no_log: true
  when: not _provider_exists

- name: Ensure existing provider uses RS256 signing key (idempotent patch)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      signing_key: "{{ _signing_key_pk }}"
    status_code: 200
  no_log: true
  when: _provider_exists

- name: Set OIDC client credentials from existing provider
  ansible.builtin.set_fact:
    _oidc_client_id: "{{ _existing_provider.client_id }}"
    _oidc_client_secret: "{{ _existing_provider.client_secret }}"
  no_log: true
  when: _provider_exists

- name: Write OIDC credentials to NFS for diglett-dns to consume
  ansible.builtin.copy:
    dest: /mnt/nas/docker/headscale-oidc.env
    content: |
      HEADSCALE_OIDC_CLIENT_ID={{ _oidc_client_id }}
      HEADSCALE_OIDC_CLIENT_SECRET={{ _oidc_client_secret }}
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  changed_when: false
