# ── arr services: Authentik proxy providers (forwardAuth) ─────────────────────
# Creates one Proxy Provider per arr service in forward_auth_single mode, then
# registers them all with the embedded outpost so the Traefik forwardAuth
# middleware (services-vm.yml) can enforce authentication.

- name: Define arr proxy service definitions
  ansible.builtin.set_fact:
    _arr_proxy_services:
      - name: prowlarr
        slug: prowlarr
        external_host: "https://prowlarr.home"
      - name: radarr
        slug: radarr
        external_host: "https://radarr.home"
      - name: sonarr
        slug: sonarr
        external_host: "https://sonarr.home"
      - name: bazarr
        slug: bazarr
        external_host: "https://bazarr.home"
      - name: jellyseerr
        slug: jellyseerr
        external_host: "https://jellyseerr.home"
      - name: qbittorrent
        slug: qbittorrent
        external_host: "https://qbittorrent.home"

- name: Check which arr proxy providers already exist
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/?name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _arr_provider_check
  loop: "{{ _arr_proxy_services }}"

- name: Create missing arr proxy providers
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.0.name }}"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      mode: "forward_single"
      external_host: "{{ item.0.external_host }}"
    status_code: 201
  loop: "{{ _arr_proxy_services | zip(_arr_provider_check.results) | list }}"
  # ?name= is a contains match — use selectattr for exact name check.
  when: (item.1.json.results | selectattr('name', 'equalto', item.0.name) | list | length) == 0

# Re-fetch after creation so PKs are available whether providers are new or pre-existing.
- name: Look up arr proxy provider PKs
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/?name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _arr_provider_lookup
  loop: "{{ _arr_proxy_services }}"

- name: Check which arr applications already exist
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/?slug={{ item.slug }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _arr_app_check
  loop: "{{ _arr_proxy_services }}"

- name: Create missing arr Authentik applications
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.0.slug | capitalize }}"
      slug: "{{ item.0.slug }}"
      # Filter by exact name — the ?name= API param does a contains match.
      provider: "{{ (item.1.json.results | selectattr('name', 'equalto', item.0.name) | first).pk }}"
    status_code: 201
  loop: "{{ _arr_proxy_services | zip(_arr_provider_lookup.results) | list }}"
  when:
    - (item.1.json.results | selectattr('name', 'equalto', item.0.name) | list | length) > 0
    # ?slug= is a contains match — use selectattr for exact slug check.
    - (_arr_app_check.results[loop_index].json.results | selectattr('slug', 'equalto', item.0.slug) | list | length) == 0
  loop_control:
    index_var: loop_index

- name: Get embedded Authentik outpost
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/outposts/instances/?managed=goauthentik.io/outposts/embedded"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _embedded_outpost

- name: Build merged provider list for embedded outpost
  ansible.builtin.set_fact:
    _outpost_provider_pks: >-
      {{
        (_embedded_outpost.json.results[0].providers | default([])) +
        (_arr_provider_lookup.results
          | selectattr('json.pagination.count', '>', 0)
          | map(attribute='json.results')
          | map('first')
          | map(attribute='pk')
          | list)
        | unique
      }}

- name: Add arr proxy providers to embedded outpost
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/outposts/instances/{{ _embedded_outpost.json.results[0].pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      providers: "{{ _outpost_provider_pks }}"
    status_code: 200

