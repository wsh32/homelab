---
# Infra role — deploys the services/machamp-infra/ Docker Compose stack to machamp-infra.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/machamp-infra
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/machamp-infra/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/machamp-infra/"
    dest: /home/{{ ansible_user }}/homelab/services/machamp-infra/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"
      - "--exclude=.env"   # preserve the /etc/homelab.env symlink created below

- name: Mount NFS share
  ansible.builtin.include_tasks: ../../../tasks/nfs-mount.yml
  vars:
    nfs_mount_path: /mnt/nas/docker
    nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

- name: Create local data directories (VM disk — not NFS, avoids soft-mount corruption)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    # MongoDB and PostgreSQL both run as uid 999 in their official images.
    - { path: /var/lib/infisical/mongo, owner: "999", group: "999", mode: "0750" }
    - { path: /var/lib/authentik/pg,    owner: "999", group: "999", mode: "0750" }
    - { path: /var/lib/vaultwarden,     owner: "0",   group: "0",   mode: "0755" }
  become: true

- name: Create NFS backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/infisical-backups
    - /mnt/nas/docker/vaultwarden-backup
    - /mnt/nas/docker/authentik-backups
  become: true

- name: Create Authentik NFS media directories (owned by uid 1000 — authentik container user)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - /mnt/nas/docker/authentik/media
    - /mnt/nas/docker/authentik/media/public
    - /mnt/nas/docker/authentik/custom-templates
  become: true

- name: Generate bootstrap secrets (idempotent — skipped if NFS sentinel exists)
  ansible.builtin.shell: |
    nfs_secrets=/mnt/nas/docker/infisical-backups/.secrets.env
    local_env=/etc/homelab.env
    if [ ! -f "$nfs_secrets" ]; then
      tmp=$(mktemp)
      printf "MONGO_ROOT_USER=infisical\n"                          > "$tmp"
      printf "MONGO_ROOT_PASSWORD=%s\n" "$(openssl rand -hex 16)"  >> "$tmp"
      printf "INFISICAL_AUTH_SECRET=%s\n" "$(openssl rand -hex 32)"  >> "$tmp"
      printf "INFISICAL_ENCRYPTION_KEY=%s\n" "$(openssl rand -hex 16)" >> "$tmp"
      printf "VAULTWARDEN_ADMIN_TOKEN=%s\n" "$(openssl rand -hex 32)"  >> "$tmp"
      printf "VAULTWARDEN_SIGNUPS_ALLOWED=true\n"                   >> "$tmp"
      printf "AUTHENTIK_DB_USER=authentik\n"                        >> "$tmp"
      printf "AUTHENTIK_DB_NAME=authentik\n"                        >> "$tmp"
      printf "AUTHENTIK_DB_PASSWORD=%s\n" "$(openssl rand -hex 16)" >> "$tmp"
      printf "AUTHENTIK_SECRET_KEY=%s\n" "$(openssl rand -hex 32)"  >> "$tmp"
      chmod 600 "$tmp"
      cp "$tmp" "$nfs_secrets"
      mv "$tmp" "$local_env"
      echo changed
    elif [ ! -f "$local_env" ]; then
      cp "$nfs_secrets" "$local_env"
      chmod 600 "$local_env"
      echo changed
    fi
  register: secrets_result
  changed_when: "'changed' in secrets_result.stdout"
  no_log: true
  become: true

- name: Ensure /etc/homelab.env has correct permissions
  ansible.builtin.file:
    path: /etc/homelab.env
    owner: root
    group: root
    mode: "0600"
  become: true

- name: Link /etc/homelab.env as compose .env for variable substitution
  ansible.builtin.file:
    src: /etc/homelab.env
    dest: /home/{{ ansible_user }}/homelab/services/machamp-infra/.env
    state: link
    force: true
  become: true

- name: Deploy infra stack
  ansible.builtin.include_tasks: ../../../tasks/compose-deploy.yml
  vars:
    compose_project_src: /home/{{ ansible_user }}/homelab/services/machamp-infra
