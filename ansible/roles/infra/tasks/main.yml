---
# Infra role -- deploys the services/diglett-infra/ Docker Compose stack to diglett-infra.
# Requires: base role (already run), Docker installed via cloud-init at VM creation.

- name: Create services directory
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/homelab/services/diglett-infra
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync services/diglett-infra/ from deploy VM
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../services/diglett-infra/"
    dest: /home/{{ ansible_user }}/homelab/services/diglett-infra/
    delete: true
    recursive: true
    rsync_opts:
      - "--chown={{ ansible_user }}:{{ ansible_user }}"
      - "--exclude=.env"   # preserve the /etc/homelab.env symlink created below
      - "--exclude=traefik/dynamic/services-vm.yml"   # rendered by template task below

- name: Render Traefik services-vm.yml from network.yml
  ansible.builtin.template:
    src: services-vm.yml.j2
    dest: /home/{{ ansible_user }}/homelab/services/diglett-infra/traefik/dynamic/services-vm.yml
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: Mount NFS share
  ansible.builtin.include_tasks: ../../../tasks/nfs-mount.yml
  vars:
    nfs_mount_path: /mnt/nas/docker
    nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

- name: Create local data directories (VM disk -- not NFS, avoids soft-mount corruption)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    # PostgreSQL alpine image runs as uid 70 (alpine), not 999 (debian).
    - { path: /var/lib/postgres,       owner: "70",   group: "70",   mode: "0750" }
    - { path: /var/lib/vaultwarden,    owner: "0",    group: "0",    mode: "0755" }
  become: true

- name: Create NFS sentinel directory
  ansible.builtin.file:
    path: /mnt/nas/docker/infisical-backups
    state: directory
    mode: "0755"
  become: true

- name: Create NFS backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mnt/nas/docker/postgres-backup
    - /mnt/nas/docker/vaultwarden-backup
  become: true

- name: Create Traefik and step-ca NFS directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "0755"
  loop:
    - { path: /mnt/nas/docker/traefik/acme, owner: "1000" }
    # step-ca runs as uid 1000 and writes its config/certs here on first init
    - { path: /mnt/nas/docker/step-ca, owner: "1000" }
  become: true

- name: Create Authentik NFS media directories (owned by uid 1000 -- authentik container user)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - /mnt/nas/docker/authentik/media
    - /mnt/nas/docker/authentik/media/public
    - /mnt/nas/docker/authentik/custom-templates
  become: true

- name: Check for inconsistent state (data dir exists but NFS sentinel missing)
  ansible.builtin.shell: |
    sentinel=/mnt/nas/docker/infisical-backups/.secrets.env
    if [ -d /var/lib/postgres ] && [ "$(ls -A /var/lib/postgres 2>/dev/null)" ] \
        && [ ! -f "$sentinel" ]; then
      echo "INCONSISTENT"
    fi
  register: state_check
  changed_when: false
  become: true

- name: Fail on inconsistent state -- secrets and data dir are out of sync
  ansible.builtin.fail:
    msg: >
      PostgreSQL data directory exists but the NFS secrets sentinel is missing.
      Regenerating secrets would break the existing database.
      To recover: restore the sentinel from backup, or wipe the data dir
      (sudo rm -rf /var/lib/postgres) if this is a fresh install with no real
      data, then re-run.
  when: state_check.stdout == 'INCONSISTENT'

- name: Generate bootstrap secrets (idempotent -- skipped if NFS sentinel exists)
  ansible.builtin.shell: |
    nfs_secrets=/mnt/nas/docker/infisical-backups/.secrets.env
    local_env=/etc/homelab.env
    if [ ! -f "$nfs_secrets" ]; then
      tmp=$(mktemp)
      printf "POSTGRES_PASSWORD=%s\n"          "$(openssl rand -hex 16)" > "$tmp"
      printf "INFISICAL_AUTH_SECRET=%s\n"      "$(openssl rand -hex 32)" >> "$tmp"
      printf "INFISICAL_ENCRYPTION_KEY=%s\n"   "$(openssl rand -hex 16)" >> "$tmp"
      printf "VAULTWARDEN_ADMIN_TOKEN=%s\n"    "$(openssl rand -hex 32)" >> "$tmp"
      printf "VAULTWARDEN_SIGNUPS_ALLOWED=true\n"                         >> "$tmp"
      printf "VAULTWARDEN_SVC_EMAIL=%s\n"      "infra@team.rocket"         >> "$tmp"
      printf "VAULTWARDEN_SVC_PASSWORD=%s\n"   "$(openssl rand -hex 24)"  >> "$tmp"
      printf "AUTHENTIK_DB_PASSWORD=%s\n"      "$(openssl rand -hex 16)"  >> "$tmp"
      printf "AUTHENTIK_SECRET_KEY=%s\n"       "$(openssl rand -hex 32)"  >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_PASSWORD=%s\n" "$(openssl rand -hex 16)" >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_EMAIL=%s\n"  "admin@team.rocket"        >> "$tmp"
      printf "AUTHENTIK_BOOTSTRAP_TOKEN=%s\n"  "$(openssl rand -hex 32)"  >> "$tmp"
      chmod 600 "$tmp"
      cp "$tmp" "$nfs_secrets"
      mv "$tmp" "$local_env"
      echo changed
    elif [ ! -f "$local_env" ]; then
      cp "$nfs_secrets" "$local_env"
      chmod 600 "$local_env"
      echo changed
    fi
  register: secrets_result
  changed_when: "'changed' in secrets_result.stdout"
  become: true

- name: Write AUTHENTIK_HOST to homelab.env (sets canonical public URL for OIDC token issuers)
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_HOST='
    line: "AUTHENTIK_HOST={{ authentik_public_url }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  when: authentik_public_url is defined

- name: Override Authentik admin email from secrets.yml
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_BOOTSTRAP_EMAIL='
    line: "AUTHENTIK_BOOTSTRAP_EMAIL={{ authentik_admin_email }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  when: authentik_admin_email is defined

- name: Override Authentik admin password from secrets.yml
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^AUTHENTIK_BOOTSTRAP_PASSWORD='
    line: "AUTHENTIK_BOOTSTRAP_PASSWORD={{ authentik_admin_password }}"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  when: authentik_admin_password is defined

- name: Ensure /etc/homelab.env has correct permissions
  ansible.builtin.file:
    path: /etc/homelab.env
    owner: root
    group: root
    mode: "0600"
  become: true


- name: Link /etc/homelab.env as compose .env for variable substitution
  ansible.builtin.file:
    src: /etc/homelab.env
    dest: /home/{{ ansible_user }}/homelab/services/diglett-infra/.env
    state: link
    force: true
  become: true

- name: Write Cloudflare Tunnel token to /etc/cloudflare-tunnel.env
  ansible.builtin.copy:
    dest: /etc/cloudflare-tunnel.env
    content: "TUNNEL_TOKEN={{ cloudflare_tunnel_token }}\n"
    owner: root
    group: root
    mode: "0600"
  become: true
  when: cloudflare_tunnel_token is defined

- name: Check if postgres data directory is empty
  ansible.builtin.find:
    paths: /var/lib/postgres
    file_type: any
    hidden: true
  register: postgres_data_contents
  become: true

- name: Find postgres backups on NFS
  ansible.builtin.find:
    paths: /mnt/nas/docker/postgres-backup
    patterns: "dump_*.sql.gz"
    file_type: file
  register: postgres_backups
  become: true

- name: Restore postgres from NFS backup (data dir empty, backup present)
  when:
    - postgres_data_contents.files | length == 0
    - postgres_backups.files | length > 0
  block:
    - name: Set latest postgres backup path
      ansible.builtin.set_fact:
        _latest_pg_backup: "{{ (postgres_backups.files | sort(attribute='mtime') | last).path }}"

    - name: Start postgres container for restore
      community.docker.docker_compose_v2:
        project_src: /home/{{ ansible_user }}/homelab/services/diglett-infra
        services:
          - postgres
        state: present
        pull: missing
      become: true

    - name: Wait for postgres to be ready before restore
      ansible.builtin.shell: docker exec postgres pg_isready -U postgres
      become: true
      register: pg_ready_restore
      retries: 30
      delay: 3
      until: pg_ready_restore.rc == 0
      changed_when: false

    - name: Restore all databases from NFS dump
      ansible.builtin.shell: |
        gunzip -c {{ _latest_pg_backup }} | docker exec -i postgres psql -U postgres
      become: true

- name: Check if vaultwarden database exists
  ansible.builtin.stat:
    path: /var/lib/vaultwarden/db.sqlite3
  register: vaultwarden_db_check
  become: true

- name: Check if vaultwarden litestream backup exists on NFS
  ansible.builtin.stat:
    path: /mnt/nas/docker/vaultwarden-backup/db.sqlite3
  register: vaultwarden_backup_check
  become: true

- name: Restore vaultwarden from litestream backup (db missing, backup present)
  ansible.builtin.shell: |
    docker run --rm \
      -v /var/lib/vaultwarden:/data \
      -v /mnt/nas/docker/vaultwarden-backup:/backup \
      -v /home/{{ ansible_user }}/homelab/services/diglett-infra/litestream.yml:/etc/litestream.yml:ro \
      litestream/litestream:0.5.11 \
      restore -config /etc/litestream.yml /data/db.sqlite3
  become: true
  when:
    - not vaultwarden_db_check.stat.exists
    - vaultwarden_backup_check.stat.exists

- name: Get docker group GID
  ansible.builtin.getent:
    database: group
    key: docker
  become: true

- name: Patch Traefik group_add GID in docker-compose.yml
  ansible.builtin.replace:
    path: /home/{{ ansible_user }}/homelab/services/diglett-infra/docker-compose.yml
    regexp: '(- )"[^"]*"(\s+# docker group GID)'
    replace: '\g<1>"{{ getent_group.docker[1] }}"\g<2>'
  become: true

- name: Deploy infra stack
  ansible.builtin.include_tasks: ../../../tasks/compose-deploy.yml
  vars:
    compose_project_src: /home/{{ ansible_user }}/homelab/services/diglett-infra

- name: Ensure step-ca root cert is world-readable (required by ca-page nginx container)
  ansible.builtin.file:
    path: /mnt/nas/docker/step-ca/certs/root_ca.crt
    mode: "o+r"
  become: true
  # The file is written by the step-ca container on first init; skip gracefully if not yet present.
  failed_when: false

- name: Wait for Traefik port 443
  ansible.builtin.wait_for:
    host: localhost
    port: 443
    timeout: 30
  failed_when: false
  become: true

- name: Check TLS cert issuer on Traefik
  ansible.builtin.shell: |
    echo | openssl s_client -connect localhost:443 -servername infisical.home 2>/dev/null \
      | openssl x509 -noout -issuer 2>/dev/null
  register: traefik_cert_issuer
  changed_when: false
  failed_when: false
  become: true

- name: Clear stale acme.json (Traefik serving a non-step-ca cert)
  ansible.builtin.shell: truncate -s 0 /mnt/nas/docker/traefik/acme/acme.json
  become: true
  register: acme_cleared
  # Only act when Traefik returned something -- empty means ACME still pending, don't interfere
  when:
    - traefik_cert_issuer.stdout != ''
    - "'Team Rocket' not in traefik_cert_issuer.stdout"

- name: Restart Traefik to re-trigger ACME after clearing stale cert
  community.docker.docker_container:
    name: traefik
    state: started
    restart: true
  become: true
  when: acme_cleared.changed

- name: Check if Vaultwarden admin token is already Argon2-hashed
  ansible.builtin.shell: |
    grep '^VAULTWARDEN_ADMIN_TOKEN=' /etc/homelab.env | cut -d= -f2- | grep -q '^\$argon2' && echo hashed || echo plain
  register: vw_token_state
  changed_when: false
  become: true

- name: Wait for Vaultwarden container to be running (needed for hash command)
  ansible.builtin.shell: docker inspect --format='{{"{{"}} .State.Running {{"}}"}}' vaultwarden
  register: vw_running
  retries: 15
  delay: 5
  until: vw_running.stdout == 'true'
  changed_when: false
  become: true
  when: vw_token_state.stdout == 'plain'

- name: Hash Vaultwarden admin token with Argon2 PHC (idempotent -- skipped if already hashed)
  ansible.builtin.shell: |
    token=$(grep '^VAULTWARDEN_ADMIN_TOKEN=' /etc/homelab.env | cut -d= -f2-)
    hashed=$(echo -n "$token" | docker exec -i vaultwarden /vaultwarden hash --preset owasp 2>/dev/null)
    python3 - "$hashed" <<'PYEOF'
    import sys, re
    hashed = sys.argv[1]
    for path in ['/etc/homelab.env', '/mnt/nas/docker/infisical-backups/.secrets.env']:
        try:
            with open(path, 'r') as f:
                content = f.read()
            with open(path, 'w') as f:
                f.write(re.sub(r'^VAULTWARDEN_ADMIN_TOKEN=.*$', 'VAULTWARDEN_ADMIN_TOKEN=' + hashed, content, flags=re.MULTILINE))
        except OSError:
            pass
    PYEOF
    echo changed
  register: vw_hash_result
  changed_when: "'changed' in vw_hash_result.stdout"
  become: true
  when: vw_token_state.stdout == 'plain'

- name: Restart Vaultwarden to apply hashed admin token
  community.docker.docker_container:
    name: vaultwarden
    state: started
    restart: true
  become: true
  when: vw_hash_result.changed | default(false)

# ── Vaultwarden service account ───────────────────────────────────────────────
# Creates a headless service account used by Ansible to retrieve secrets from
# the vault without operator credentials. Credentials are stored in /etc/homelab.env.

- name: Wait for Vaultwarden to accept HTTP connections (after admin token restart)
  ansible.builtin.shell: |
    vw_ip=$(docker inspect vaultwarden | python3 -c \
      "import json,sys; nets=json.load(sys.stdin)[0]['NetworkSettings']['Networks']; \
       print(next(iter(nets.values()))['IPAddress'])")
    curl -sf "http://$vw_ip/alive"
  become: true
  register: _vw_alive
  retries: 20
  delay: 3
  until: _vw_alive.rc == 0
  changed_when: false

- name: Write Vaultwarden service account registration script
  ansible.builtin.copy:
    dest: /tmp/vw_register.py
    owner: root
    mode: "0700"
    content: |
      #!/usr/bin/env python3
      """Register a Vaultwarden account using the Bitwarden protocol.
      Prints 'registered' on success, 'exists' if the account is already present.
      Env vars: VW_EMAIL, VW_PASSWORD, VW_URL (http://<container-ip>)
      """
      import base64, hashlib, json, os, sys
      from urllib import request as urllib_request, error as urllib_error
      from cryptography.hazmat.primitives import hashes, hmac as crypto_hmac
      from cryptography.hazmat.primitives.asymmetric import rsa
      from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes
      from cryptography.hazmat.primitives.kdf.hkdf import HKDFExpand
      from cryptography.hazmat.primitives.serialization import (
          Encoding, NoEncryption, PrivateFormat, PublicFormat
      )
      from cryptography.hazmat.backends import default_backend

      email    = os.environ["VW_EMAIL"].lower()
      password = os.environ["VW_PASSWORD"].encode()
      vw_url   = os.environ["VW_URL"].rstrip("/")
      kdf_iters = 600000
      backend   = default_backend()

      # PBKDF2 master key + master password hash
      master_key = hashlib.pbkdf2_hmac("sha256", password, email.encode(), kdf_iters)
      master_pw_hash = base64.b64encode(
          hashlib.pbkdf2_hmac("sha256", master_key, password, 1)
      ).decode()

      # Stretch master key (Bitwarden HKDF-Expand)
      enc_key = HKDFExpand(hashes.SHA256(), 32, b"enc", backend).derive(master_key)
      mac_key = HKDFExpand(hashes.SHA256(), 32, b"mac", backend).derive(master_key)

      def aes_cbc_hmac_encrypt(ek, mk, pt):
          iv  = os.urandom(16)
          pad = 16 - (len(pt) % 16)
          padded = pt + bytes([pad]) * pad
          enc = Cipher(algorithms.AES(ek), modes.CBC(iv), backend=backend).encryptor()
          ct  = enc.update(padded) + enc.finalize()
          mac = crypto_hmac.HMAC(mk, hashes.SHA256(), backend=backend)
          mac.update(iv + ct)
          md  = mac.finalize()
          return (
              f"2.{base64.b64encode(iv).decode()}"
              f"|{base64.b64encode(ct).decode()}"
              f"|{base64.b64encode(md).decode()}"
          )

      # Random 512-bit account symmetric key, encrypted with stretched master key
      sym_key     = os.urandom(64)
      account_key = aes_cbc_hmac_encrypt(enc_key, mac_key, sym_key)

      # RSA key pair -- private key encrypted with account symmetric key
      rsa_priv  = rsa.generate_private_key(65537, 2048, backend=backend)
      pub_der   = rsa_priv.public_key().public_bytes(Encoding.DER, PublicFormat.SubjectPublicKeyInfo)
      priv_der  = rsa_priv.private_bytes(Encoding.DER, PrivateFormat.PKCS8, NoEncryption())
      enc_priv  = aes_cbc_hmac_encrypt(sym_key[:32], sym_key[32:], priv_der)

      payload = {
          "name": "infra@team.rocket",
          "email": email,
          "masterPasswordHash": master_pw_hash,
          "masterPasswordHint": "",
          "key": account_key,
          "keys": {
              "publicKey": base64.b64encode(pub_der).decode(),
              "encryptedPrivateKey": enc_priv,
          },
          "kdf": 0,
          "kdfIterations": kdf_iters,
          "kdfMemory": None,
          "kdfParallelism": None,
      }

      req = urllib_request.Request(
          f"{vw_url}/identity/accounts/register",
          data=json.dumps(payload).encode(),
          headers={"Content-Type": "application/json"},
      )
      try:
          urllib_request.urlopen(req)
          print("registered")
      except urllib_error.HTTPError as e:
          body = e.read().decode()
          if e.code == 400 and any(
              k in body.lower() for k in ["already", "taken", "user already exists"]
          ):
              print("exists")
          else:
              sys.stderr.write(f"HTTP {e.code}: {body}\n")
              sys.exit(1)
  become: true

- name: Install python3-cryptography (required by registration script)
  ansible.builtin.apt:
    name: python3-cryptography
    state: present
  become: true

- name: Resolve Vaultwarden container IP
  ansible.builtin.shell: |
    docker inspect vaultwarden | python3 -c \
      "import json,sys; nets=json.load(sys.stdin)[0]['NetworkSettings']['Networks']; \
       print(next(iter(nets.values()))['IPAddress'])"
  register: _vw_container_ip
  changed_when: false
  become: true

- name: Register Vaultwarden service account (idempotent)
  ansible.builtin.shell: |
    set -e
    svc_email=$(grep '^VAULTWARDEN_SVC_EMAIL='    /etc/homelab.env | cut -d= -f2-)
    svc_password=$(grep '^VAULTWARDEN_SVC_PASSWORD=' /etc/homelab.env | cut -d= -f2-)
    VW_EMAIL="$svc_email" \
    VW_PASSWORD="$svc_password" \
    VW_URL="http://{{ _vw_container_ip.stdout | trim }}" \
    python3 /tmp/vw_register.py 2>/tmp/vw_reg_err.txt
  register: _vw_svc_reg
  changed_when: "'registered' in _vw_svc_reg.stdout"
  failed_when: false
  become: true
  no_log: true

- name: Show Vaultwarden registration error output (safe -- contains no credentials)
  ansible.builtin.shell: cat /tmp/vw_reg_err.txt 2>/dev/null || true
  become: true
  register: _vw_reg_err
  changed_when: false

- name: Display registration error
  ansible.builtin.debug:
    msg: "{{ _vw_reg_err.stdout }}"
  when: _vw_reg_err.stdout | length > 0

- name: Fail if registration returned non-zero
  ansible.builtin.fail:
    msg: "Vaultwarden service account registration failed -- see error above"
  when: _vw_svc_reg.rc != 0

- name: Remove service account registration script
  ansible.builtin.file:
    path: /tmp/vw_register.py
    state: absent
  become: true

- name: Disable Vaultwarden self-registration now that service account exists
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^VAULTWARDEN_SIGNUPS_ALLOWED='
    line: "VAULTWARDEN_SIGNUPS_ALLOWED=false"
  loop:
    - /etc/homelab.env
    - /mnt/nas/docker/infisical-backups/.secrets.env
  become: true
  when: _vw_svc_reg.changed

- name: Restart Vaultwarden to apply disabled signups
  community.docker.docker_container:
    name: vaultwarden
    state: started
    restart: true
  become: true
  when: _vw_svc_reg.changed

- name: Install step-ca root certificate so bw CLI trusts vault.home TLS
  ansible.builtin.copy:
    src: /mnt/nas/docker/step-ca/certs/root_ca.crt
    dest: /usr/local/share/ca-certificates/step-ca.crt
    remote_src: true
    owner: root
    mode: "0644"
  become: true
  failed_when: false
  register: _step_ca_cert

- name: Update CA certificates to trust step-ca root
  ansible.builtin.command: update-ca-certificates
  become: true
  changed_when: true
  when: _step_ca_cert.changed

- name: Install Bitwarden CLI via snap (used by infra.yml PIA seeding)
  community.general.snap:
    name: bw
    state: present
  become: true

- name: Wait for postgres to be ready
  ansible.builtin.shell: docker exec postgres pg_isready -U postgres
  become: true
  register: pg_ready
  retries: 30
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: Wait for Infisical to be healthy, unlocking migration table on each retry (up to 5 minutes)
  ansible.builtin.shell: |
    # Unlock any stuck knex migration lock before each health check attempt.
    docker exec postgres psql -U postgres -d infisical \
      -c "UPDATE knex_migrations_lock SET is_locked = 0 WHERE is_locked = 1;" \
      2>/dev/null || true
    curl -sf http://localhost:8080/api/status
  become: true
  register: infisical_health
  retries: 60
  delay: 5
  until: infisical_health.rc == 0

# ── Authentik OIDC bootstrap ──────────────────────────────────────────────────

- name: Wait for Authentik to be healthy (up to 15 minutes -- migrations can be slow on first boot)
  ansible.builtin.uri:
    url: "http://localhost:9000/-/health/ready/"
    status_code: 200
  register: authentik_health
  retries: 180
  delay: 5
  until: authentik_health.status == 200
  changed_when: false

- name: Read AUTHENTIK_BOOTSTRAP_TOKEN from /etc/homelab.env
  ansible.builtin.shell: grep '^AUTHENTIK_BOOTSTRAP_TOKEN=' /etc/homelab.env | cut -d= -f2-
  register: _authentik_token_raw
  changed_when: false
  become: true

- name: Set Authentik API token fact
  ansible.builtin.set_fact:
    _authentik_token: "{{ _authentik_token_raw.stdout | trim }}"

- name: Wait for Authentik API to be ready (post-migration setup and blueprints can take extra time)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _api_ready
  retries: 60
  delay: 5
  until: _api_ready.status == 200
  changed_when: false

- name: Check if Headscale OIDC provider already exists in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/?name=headscale"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _existing_provider_result

- name: Set provider existence facts
  ansible.builtin.set_fact:
    _provider_exists: "{{ _existing_provider_result.json.pagination.count > 0 }}"
    _existing_provider: "{{ _existing_provider_result.json.results[0] | default({}) }}"

- name: Get Authentik self-signed certificate for RS256 token signing
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/crypto/certificatekeypairs/?has_key=true&page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _certs_result

- name: Set signing key fact (first available cert with a private key)
  ansible.builtin.set_fact:
    _signing_key_pk: "{{ _certs_result.json.results[0].pk }}"

- name: Get built-in OIDC scope property mappings
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _scope_mappings_result
  when: not _provider_exists

- name: Extract standard scope mapping PKs (openid, email, profile)
  ansible.builtin.set_fact:
    _scope_pks: >-
      {{
        _scope_mappings_result.json.results
        | selectattr('managed', 'in', [
            'goauthentik.io/providers/oauth2/scope-openid',
            'goauthentik.io/providers/oauth2/scope-email',
            'goauthentik.io/providers/oauth2/scope-profile'
          ])
        | map(attribute='pk')
        | list
      }}
  when: not _provider_exists

- name: Get default implicit-consent authorization flow
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/flows/instances/?designation=authorization&slug=default-provider-authorization-implicit-consent"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _auth_flow_result

- name: Get default invalidation flow
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/flows/instances/?designation=invalidation&slug=default-provider-invalidation-flow"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _invalidation_flow_result

- name: Create Headscale OAuth2 provider in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "headscale"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      client_type: "confidential"
      redirect_uris:
        - matching_mode: "strict"
          url: "{{ headscale_public_url }}/oidc/callback"
      sub_mode: "user_email"
      signing_key: "{{ _signing_key_pk }}"
      property_mappings: "{{ _scope_pks }}"
      include_claims_in_id_token: true
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 201
  register: _new_provider
  when: not _provider_exists

- name: Create Headscale application in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Headscale"
      slug: "headscale"
      provider: "{{ _new_provider.json.pk }}"
    status_code: [201, 400]  # 400 = application slug already exists, treat as idempotent
  when: not _provider_exists

- name: Set OIDC client credentials
  ansible.builtin.set_fact:
    _oidc_client_id: "{{ _new_provider.json.client_id }}"
    _oidc_client_secret: "{{ _new_provider.json.client_secret }}"
  when: not _provider_exists

- name: Set OIDC client credentials from existing provider
  ansible.builtin.set_fact:
    _oidc_client_id: "{{ _existing_provider.client_id }}"
    _oidc_client_secret: "{{ _existing_provider.client_secret }}"
  when: _provider_exists

- name: Ensure Headscale OAuth2 provider allows authorization_code grant
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 200
  when: _provider_exists

- name: Write headscale OIDC credentials to NFS
  ansible.builtin.copy:
    dest: /mnt/nas/docker/headscale-oidc.env
    content: |
      HEADSCALE_OIDC_CLIENT_ID={{ _oidc_client_id }}
      HEADSCALE_OIDC_CLIENT_SECRET={{ _oidc_client_secret }}
    owner: ubuntu
    group: ubuntu
    mode: "0600"

# ── Headplane OIDC bootstrap ──────────────────────────────────────────────────

- name: Check if headplane OIDC provider already exists in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/?name=headplane"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _hp_existing_result

- name: Set headplane provider existence facts
  ansible.builtin.set_fact:
    _hp_provider_exists: "{{ _hp_existing_result.json.pagination.count > 0 }}"
    _hp_existing_provider: "{{ _hp_existing_result.json.results[0] | default({}) }}"

- name: Get built-in OIDC scope property mappings (headplane)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _hp_scope_mappings_result
  when: not _hp_provider_exists

- name: Extract standard scope mapping PKs for headplane (openid, email, profile)
  ansible.builtin.set_fact:
    _hp_scope_pks: >-
      {{
        _hp_scope_mappings_result.json.results
        | selectattr('managed', 'in', [
            'goauthentik.io/providers/oauth2/scope-openid',
            'goauthentik.io/providers/oauth2/scope-email',
            'goauthentik.io/providers/oauth2/scope-profile'
          ])
        | map(attribute='pk')
        | list
      }}
  when: not _hp_provider_exists

- name: Create headplane OAuth2 provider in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "headplane"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      client_type: "confidential"
      redirect_uris:
        - matching_mode: "strict"
          url: "https://headplane.home/admin/oidc/callback"
        - matching_mode: "strict"
          url: "https://headplane.wsh/admin/oidc/callback"
      sub_mode: "user_email"
      signing_key: "{{ _signing_key_pk }}"
      property_mappings: "{{ _hp_scope_pks }}"
      include_claims_in_id_token: true
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 201
  register: _hp_new_provider
  when: not _hp_provider_exists

- name: Create headplane application in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Headplane"
      slug: "headplane"
      provider: "{{ _hp_new_provider.json.pk }}"
      meta_launch_url: "{{ headplane_public_url }}/admin"
    status_code: 201
  register: _hp_new_app
  when: not _hp_provider_exists

- name: Set headplane OIDC credentials from new provider
  ansible.builtin.set_fact:
    _hp_oidc_client_id: "{{ _hp_new_provider.json.client_id }}"
    _hp_oidc_client_secret: "{{ _hp_new_provider.json.client_secret }}"
  when: not _hp_provider_exists

- name: Set headplane OIDC credentials from existing provider
  ansible.builtin.set_fact:
    _hp_oidc_client_id: "{{ _hp_existing_provider.client_id }}"
    _hp_oidc_client_secret: "{{ _hp_existing_provider.client_secret }}"
  when: _hp_provider_exists

- name: Fix headplane OAuth2 provider redirect URIs to include .wsh
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _hp_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      redirect_uris: "{{ _hp_desired_uris }}"
    status_code: 200
  vars:
    _hp_desired_uris:
      - matching_mode: "strict"
        url: "https://headplane.home/admin/oidc/callback"
      - matching_mode: "strict"
        url: "https://headplane.wsh/admin/oidc/callback"
  when: >
    _hp_provider_exists and
    (_hp_existing_provider.redirect_uris | default([]) | map(attribute='url') | sort | list) != (_hp_desired_uris | map(attribute='url') | sort | list)

- name: Ensure headplane OAuth2 provider allows authorization_code grant
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _hp_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 200
  when: _hp_provider_exists

- name: Look up headplane application by slug
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/headplane/"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: [200, 404]
  register: _hp_existing_app
  when: _hp_provider_exists

- name: Set headplane app PK fact from existing app
  ansible.builtin.set_fact:
    _hp_app_pk: "{{ _hp_existing_app.json.pk }}"
  when: _hp_provider_exists and _hp_existing_app.status == 200

- name: Create headplane application in Authentik (provider existed but app missing)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Headplane"
      slug: "headplane"
      provider: "{{ _hp_existing_provider.pk }}"
      meta_launch_url: "{{ headplane_public_url }}/admin"
    status_code: 201
  register: _hp_recovered_app
  when: _hp_provider_exists and _hp_existing_app.status == 404

- name: Set headplane app PK fact from recovered app
  ansible.builtin.set_fact:
    _hp_app_pk: "{{ _hp_recovered_app.json.pk }}"
  when: _hp_provider_exists and _hp_existing_app.status == 404

- name: Set headplane app PK fact from new app
  ansible.builtin.set_fact:
    _hp_app_pk: "{{ _hp_new_app.json.pk }}"
  when: not _hp_provider_exists

- name: Write headplane OIDC credentials to NFS
  ansible.builtin.copy:
    dest: /mnt/nas/docker/headplane-oidc.env
    content: |
      HEADPLANE_OIDC_CLIENT_ID={{ _hp_oidc_client_id }}
      HEADPLANE_OIDC_CLIENT_SECRET={{ _hp_oidc_client_secret }}
    owner: ubuntu
    group: ubuntu
    mode: "0600"

# ── arr services: Authentik proxy providers (forwardAuth) ─────────────────────
# Creates one Proxy Provider per arr service in forward_auth_single mode, then
# registers them all with the embedded outpost so the Traefik forwardAuth
# middleware (services-vm.yml) can enforce authentication.

- name: Derive arr proxy services from network.yml
  ansible.builtin.set_fact:
    _arr_proxy_services: >-
      {%- set result = [] -%}
      {%- for svc in all_location_services | selectattr('authentik', 'equalto', 'proxy') -%}
        {%- set h = svc.hostname | default(svc.name) -%}
        {%- set _ = result.append({'name': svc.name, 'slug': svc.name, 'external_host': 'https://' ~ h ~ '.home'}) -%}
        {%- set _ = result.append({'name': svc.name ~ '-wsh', 'slug': svc.name ~ '-wsh', 'external_host': 'https://' ~ h ~ '.wsh'}) -%}
      {%- endfor -%}
      {{ result }}

- name: Check which arr proxy providers already exist
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/?page_size=100&name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _arr_provider_check
  loop: "{{ _arr_proxy_services }}"

- name: Create missing arr proxy providers
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.0.name }}"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      mode: "forward_single"
      external_host: "{{ item.0.external_host }}"
    status_code: 201
  loop: "{{ _arr_proxy_services | zip(_arr_provider_check.results) | list }}"
  # ?name= is a contains match -- use selectattr for exact name check.
  when: (item.1.json.results | selectattr('name', 'equalto', item.0.name) | list | length) == 0

# Re-fetch after creation so PKs are available whether providers are new or pre-existing.
- name: Look up arr proxy provider PKs
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/proxy/?page_size=100&name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _arr_provider_lookup
  loop: "{{ _arr_proxy_services }}"

- name: Create arr Authentik applications
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.0.slug | capitalize }}"
      slug: "{{ item.0.slug }}"
      # Filter by exact name -- the ?name= API param does a contains match.
      provider: "{{ (item.1.json.results | selectattr('name', 'equalto', item.0.name) | first).pk }}"
    status_code: [201, 400]
  register: _arr_app_create
  loop: "{{ _arr_proxy_services | zip(_arr_provider_lookup.results) | list }}"
  when: (item.1.json.results | selectattr('name', 'equalto', item.0.name) | list | length) > 0
  # 400 is acceptable only when the slug or provider already exists -- any other 400 is a real error.
  failed_when:
    - _arr_app_create.status == 400
    - >-
      'already exists' not in ((_arr_app_create.json.slug | default([])) + (_arr_app_create.json.provider | default([]))) | join(' ')

- name: Get embedded Authentik outpost
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/outposts/instances/?managed=goauthentik.io/outposts/embedded"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _embedded_outpost

- name: Build merged provider list for embedded outpost
  ansible.builtin.set_fact:
    _outpost_provider_pks: >-
      {{
        (_embedded_outpost.json.results[0].providers | default([])) +
        (_arr_provider_lookup.results
          | map(attribute='json.results')
          | flatten
          | map(attribute='pk')
          | list)
        | unique
      }}

- name: Add arr proxy providers to embedded outpost and set authentik_host
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/outposts/instances/{{ _embedded_outpost.json.results[0].pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      providers: "{{ _outpost_provider_pks }}"
      config:
        authentik_host: "{{ authentik_public_url }}"
        authentik_host_browser: "{{ authentik_public_url }}"
    status_code: 200

# ── Jellyfin: native OIDC provider ────────────────────────────────────────────
# Creates an OAuth2/OIDC provider for Jellyfin. Credentials are written to NFS
# for arr-init.yml to consume when configuring the jellyfin-plugin-sso plugin.

- name: Check if Jellyfin OIDC provider already exists in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/?name=jellyfin"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _jf_existing_result

- name: Set Jellyfin provider existence facts
  ansible.builtin.set_fact:
    _jf_provider_exists: "{{ _jf_existing_result.json.pagination.count > 0 }}"
    _jf_existing_provider: "{{ _jf_existing_result.json.results[0] | default({}) }}"

- name: Check if Jellyfin groups scope mapping exists
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?name=jellyfin-groups"
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _jf_groups_mapping_result

- name: Create Jellyfin groups scope mapping
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "jellyfin-groups"
      scope_name: "groups"
      description: "Include Authentik group names in groups claim for Jellyfin SSO"
      expression: "return [g.name for g in request.user.groups.all()]"
    status_code: 201
  register: _jf_groups_mapping_new
  when: _jf_groups_mapping_result.json.pagination.count == 0

- name: Update Jellyfin groups scope expression to use non-deprecated groups accessor
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/{{ _jf_groups_mapping_result.json.results[0].pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      expression: "return [g.name for g in request.user.groups.all()]"
    status_code: 200
  when: >
    _jf_groups_mapping_result.json.pagination.count > 0 and
    'ak_groups' in (_jf_groups_mapping_result.json.results[0].expression | default(''))

- name: Set Jellyfin groups mapping PK
  ansible.builtin.set_fact:
    _jf_groups_mapping_pk: >-
      {{ (_jf_groups_mapping_result.json.pagination.count > 0)
         | ternary(_jf_groups_mapping_result.json.results[0].pk,
                   _jf_groups_mapping_new.json.pk) }}

- name: Add groups scope mapping to Jellyfin OIDC provider
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _jf_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      property_mappings: >-
        {{ (_jf_existing_provider.property_mappings | default([]))
           + ([_jf_groups_mapping_pk]
              if _jf_groups_mapping_pk not in (_jf_existing_provider.property_mappings | default([]))
              else []) }}
    status_code: 200
  when: >
    _jf_provider_exists and
    _jf_groups_mapping_pk not in (_jf_existing_provider.property_mappings | default([]))

- name: Get built-in OIDC scope property mappings (Jellyfin)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _jf_scope_mappings_result
  when: not _jf_provider_exists

- name: Extract standard scope mapping PKs for Jellyfin (openid, email, profile)
  ansible.builtin.set_fact:
    _jf_scope_pks: >-
      {{
        _jf_scope_mappings_result.json.results
        | selectattr('managed', 'in', [
            'goauthentik.io/providers/oauth2/scope-openid',
            'goauthentik.io/providers/oauth2/scope-email',
            'goauthentik.io/providers/oauth2/scope-profile'
          ])
        | map(attribute='pk')
        | list
        + [_jf_groups_mapping_pk]
      }}
  when: not _jf_provider_exists

- name: Create Jellyfin OAuth2/OIDC provider in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "jellyfin"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      client_type: "confidential"
      redirect_uris:
        - matching_mode: "strict"
          url: "https://jellyfin.home/sso/OID/redirect/authentik"
        - matching_mode: "strict"
          url: "https://jellyfin.wsh/sso/OID/redirect/authentik-public"
      sub_mode: "user_email"
      signing_key: "{{ _signing_key_pk }}"
      property_mappings: "{{ _jf_scope_pks }}"
      include_claims_in_id_token: true
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
      require_pkce: false
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 201
  register: _jf_new_provider
  when: not _jf_provider_exists

- name: Create Jellyfin application in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Jellyfin"
      slug: "jellyfin"
      provider: "{{ _jf_new_provider.json.pk }}"
    status_code: [201, 400]
  when: not _jf_provider_exists

- name: Set Jellyfin OIDC credentials from new provider
  ansible.builtin.set_fact:
    _jf_oidc_client_id: "{{ _jf_new_provider.json.client_id }}"
    _jf_oidc_client_secret: "{{ _jf_new_provider.json.client_secret }}"
  when: not _jf_provider_exists

- name: Set Jellyfin OIDC credentials from existing provider
  ansible.builtin.set_fact:
    _jf_oidc_client_id: "{{ _jf_existing_provider.client_id }}"
    _jf_oidc_client_secret: "{{ _jf_existing_provider.client_secret }}"
  when: _jf_provider_exists

- name: Fix Jellyfin OIDC provider redirect URI (ensure uppercase SSO path)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _jf_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      redirect_uris: "{{ _jf_desired_uris }}"
    status_code: 200
  vars:
    _jf_desired_uris:
      - matching_mode: "strict"
        url: "https://jellyfin.home/sso/OID/redirect/authentik"
      - matching_mode: "strict"
        url: "https://jellyfin.wsh/sso/OID/redirect/authentik-public"
  when: >
    _jf_provider_exists and
    (_jf_existing_provider.redirect_uris | default([]) | map(attribute='url') | sort | list) != (_jf_desired_uris | map(attribute='url') | sort | list)

- name: Disable PKCE requirement on Jellyfin OIDC provider (plugin 4.x lacks PKCE support)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _jf_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      require_pkce: false
    status_code: 200
  when: >
    _jf_provider_exists and
    (_jf_existing_provider.require_pkce | default(false))

- name: Ensure Jellyfin OIDC provider allows authorization_code grant
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _jf_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      grant_types:
        - authorization_code
        - refresh_token
    status_code: 200
  when: >
    _jf_provider_exists and
    ('authorization_code' not in (_jf_existing_provider.grant_types | default([])))

- name: Write Jellyfin OIDC credentials to NFS
  ansible.builtin.copy:
    dest: /mnt/nas/docker/jellyfin-oidc.env
    content: |
      JELLYFIN_OIDC_CLIENT_ID={{ _jf_oidc_client_id }}
      JELLYFIN_OIDC_CLIENT_SECRET={{ _jf_oidc_client_secret }}
    owner: ubuntu
    group: ubuntu
    mode: "0600"

# ── Seerr: native OIDC provider ───────────────────────────────────────────────

- name: Check if Seerr OIDC provider already exists in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/?name=seerr"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _seerr_existing_result

- name: Set Seerr provider existence facts
  ansible.builtin.set_fact:
    _seerr_provider_exists: "{{ _seerr_existing_result.json.pagination.count > 0 }}"
    _seerr_existing_provider: "{{ _seerr_existing_result.json.results[0] | default({}) }}"

- name: Get built-in OIDC scope property mappings (Seerr)
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/propertymappings/provider/scope/?page_size=100"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _seerr_scope_mappings_result
  when: not _seerr_provider_exists

- name: Extract standard scope mapping PKs for Seerr (openid, email, profile)
  ansible.builtin.set_fact:
    _seerr_scope_pks: >-
      {{
        _seerr_scope_mappings_result.json.results
        | selectattr('managed', 'in', [
            'goauthentik.io/providers/oauth2/scope-openid',
            'goauthentik.io/providers/oauth2/scope-email',
            'goauthentik.io/providers/oauth2/scope-profile'
          ])
        | map(attribute='pk')
        | list
      }}
  when: not _seerr_provider_exists

- name: Create Seerr OAuth2 provider in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "seerr"
      authorization_flow: "{{ _auth_flow_result.json.results[0].pk }}"
      invalidation_flow: "{{ _invalidation_flow_result.json.results[0].pk }}"
      client_type: "confidential"
      redirect_uris:
        - matching_mode: "strict"
          url: "https://seerr.home/login"
        - matching_mode: "strict"
          url: "https://seerr.home/profile/settings/linked-accounts"
        - matching_mode: "strict"
          url: "https://seerr.wsh/login"
        - matching_mode: "strict"
          url: "https://seerr.wsh/profile/settings/linked-accounts"
      sub_mode: "user_email"
      signing_key: "{{ _signing_key_pk }}"
      property_mappings: "{{ _seerr_scope_pks }}"
      include_claims_in_id_token: true
      grant_types:
        - authorization_code
        - refresh_token
      require_pkce: false
      access_token_validity: "hours=1"
      refresh_token_validity: "days=30"
    status_code: 201
  register: _seerr_new_provider
  when: not _seerr_provider_exists

- name: Create Seerr application in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "Seerr"
      slug: "seerr"
      provider: "{{ _seerr_new_provider.json.pk }}"
      meta_launch_url: "https://seerr.home"
    status_code: 201
  when: not _seerr_provider_exists

- name: Set Seerr OIDC credentials from new provider
  ansible.builtin.set_fact:
    _seerr_oidc_client_id: "{{ _seerr_new_provider.json.client_id }}"
    _seerr_oidc_client_secret: "{{ _seerr_new_provider.json.client_secret }}"
  when: not _seerr_provider_exists

- name: Fix Seerr OIDC provider redirect URIs to include .wsh
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/providers/oauth2/{{ _seerr_existing_provider.pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      redirect_uris: "{{ _seerr_desired_uris }}"
    status_code: 200
  vars:
    _seerr_desired_uris:
      - matching_mode: "strict"
        url: "https://seerr.home/login"
      - matching_mode: "strict"
        url: "https://seerr.home/profile/settings/linked-accounts"
      - matching_mode: "strict"
        url: "https://seerr.wsh/login"
      - matching_mode: "strict"
        url: "https://seerr.wsh/profile/settings/linked-accounts"
  when: >
    _seerr_provider_exists and
    (_seerr_existing_provider.redirect_uris | default([]) | map(attribute='url') | sort | list) != (_seerr_desired_uris | map(attribute='url') | sort | list)

- name: Set Seerr OIDC credentials from existing provider
  ansible.builtin.set_fact:
    _seerr_oidc_client_id: "{{ _seerr_existing_provider.client_id }}"
    _seerr_oidc_client_secret: "{{ _seerr_existing_provider.client_secret }}"
  when: _seerr_provider_exists

- name: Write Seerr OIDC credentials to NFS
  ansible.builtin.copy:
    dest: /mnt/nas/docker/seerr-oidc.env
    content: |
      SEERR_OIDC_CLIENT_ID={{ _seerr_oidc_client_id }}
      SEERR_OIDC_CLIENT_SECRET={{ _seerr_oidc_client_secret }}
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  changed_when: false

# ── Authentik groups ──────────────────────────────────────────────────────────
# Groups are declared in ansible/vars/group_config.yml.
# Parent groups are created first so their PKs are available when creating
# children. Children inherit their parent's app access in Authentik.

- name: Create parent groups in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      is_superuser: false
    status_code: [201, 400]
  loop: "{{ authentik_groups }}"

- name: Look up all group PKs
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/?name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _all_group_results
  loop: "{{ authentik_groups }}"

- name: Build group name → PK map
  ansible.builtin.set_fact:
    _group_pk_map: >-
      {{
        _group_pk_map | default({}) | combine({
          item.item.name: item.json.results[0].pk
        })
      }}
  loop: "{{ _all_group_results.results }}"
  when: item.json.pagination.count > 0

- name: Look up child groups to check current parent
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/{{ _group_pk_map[item.1] }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _child_group_results
  loop: "{{ authentik_groups | selectattr('children', 'defined') | subelements('children') }}"
  when:
    - item.0.name in (_group_pk_map | default({}))
    - item.1 in (_group_pk_map | default({}))

- name: Set parent on child groups
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/{{ _group_pk_map[item.item.1] }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      parent: "{{ _group_pk_map[item.item.0.name] }}"
    status_code: 200
  loop: "{{ _child_group_results.results }}"
  when:
    - not item.skipped | default(false)
    - (item.json.parent | default(None)) != _group_pk_map[item.item.0.name]

# ── Application group bindings ────────────────────────────────────────────────
# Driven by authentik_app_bindings in ansible/vars/group_config.yml.
# Syncs bindings to exactly match group_config.yml: deletes stale bindings,
# creates missing ones. Skips apps not yet in Authentik (not yet OIDC-wired).

- name: Fetch each application by slug for binding sync
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/{{ item.slug }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: [200, 404]
  register: _app_lookup_results
  loop: "{{ authentik_app_bindings }}"

- name: Build app slug → PK map
  ansible.builtin.set_fact:
    _app_pk_map: >-
      {{
        _app_pk_map | default({}) | combine(
          {item.item.slug: item.json.pk}
          if item.status == 200 else {}
        )
      }}
  loop: "{{ _app_lookup_results.results }}"

- name: Write binding sync script
  ansible.builtin.copy:
    dest: /tmp/_sync_bindings.py
    mode: "0600"
    content: |
      import json, sys, urllib.request, urllib.parse

      base = "http://localhost:9000/api/v3"
      token = sys.argv[1]
      app_pk_map   = json.loads(sys.argv[2])   # slug → app pk
      group_pk_map = json.loads(sys.argv[3])   # name → group pk
      desired_raw  = json.loads(sys.argv[4])   # [{slug, groups: [name, ...]}, ...]

      headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

      def api(method, path, body=None):
          url = base + path
          data = json.dumps(body).encode() if body else None
          req = urllib.request.Request(url, data=data, headers=headers, method=method)
          try:
              with urllib.request.urlopen(req) as r:
                  raw = r.read()
                  return r.status, json.loads(raw) if raw else {}
          except urllib.error.HTTPError as e:
              raw = e.read()
              print(f"HTTP {e.code} {method} {path}: {raw.decode()}", file=sys.stderr)
              return e.code, {}

      # Build desired set: {app_pk: {group_pk, ...}}
      desired = {}
      for entry in desired_raw:
          slug = entry["slug"]
          if slug not in app_pk_map:
              print(f"skipping {slug}: not in Authentik", file=sys.stderr)
              continue
          app_pk = app_pk_map[slug]
          desired[app_pk] = set()
          for gname in entry["groups"]:
              if gname not in group_pk_map:
                  print(f"skipping group {gname}: not in Authentik", file=sys.stderr)
                  continue
              desired[app_pk].add(group_pk_map[gname])

      changed = False
      for app_pk, wanted_groups in desired.items():
          # Fetch all existing bindings for this app
          status, data = api("GET", f"/policies/bindings/?target={app_pk}&page_size=100")
          existing = data.get("results", [])

          # Delete stale / duplicate bindings (not a group binding, wrong group, or duplicate)
          seen_groups = set()
          for b in existing:
              gpk = b.get("group")
              if gpk not in wanted_groups or gpk in seen_groups:
                  api("DELETE", f"/policies/bindings/{b['pk']}/")
                  print(f"deleted binding {b['pk']} (group={gpk})")
                  changed = True
              else:
                  seen_groups.add(gpk)

          # Create missing bindings
          for gpk in wanted_groups:
              if gpk not in seen_groups:
                  api("POST", "/policies/bindings/", {"target": app_pk, "group": gpk, "enabled": True, "order": 0})
                  print(f"created binding app={app_pk} group={gpk}")
                  changed = True

      print("changed" if changed else "ok")

- name: Sync application group bindings
  ansible.builtin.command:
    argv:
      - python3
      - /tmp/_sync_bindings.py
      - "{{ _authentik_token }}"
      - "{{ _app_pk_map | to_json }}"
      - "{{ _group_pk_map | to_json }}"
      - "{{ authentik_app_bindings | to_json }}"
  register: _binding_sync
  changed_when: "'changed' in _binding_sync.stdout"

- name: Remove binding sync script
  ansible.builtin.file:
    path: /tmp/_sync_bindings.py
    state: absent
