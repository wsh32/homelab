# ── Authentik groups ──────────────────────────────────────────────────────────
# Groups are declared in ansible/vars/group_config.yml.
# Parent groups are created first so their PKs are available when creating
# children. Children inherit their parent's app access in Authentik.

- name: Create parent groups in Authentik
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      is_superuser: false
    status_code: [201, 400]
  loop: "{{ authentik_groups }}"

- name: Look up all group PKs
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/?name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _all_group_results
  loop: "{{ authentik_groups }}"

- name: Build group name → PK map
  ansible.builtin.set_fact:
    _group_pk_map: >-
      {{
        _group_pk_map | default({}) | combine({
          item.item.name: item.json.results[0].pk
        })
      }}
  loop: "{{ _all_group_results.results }}"
  when: item.json.pagination.count > 0

- name: Set parent on child groups
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/groups/{{ _group_pk_map[item.1] }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      parent: "{{ _group_pk_map[item.0.name] }}"
    status_code: 200
  loop: "{{ authentik_groups | selectattr('children', 'defined') | subelements('children') }}"
  when:
    - item.0.name in (_group_pk_map | default({}))
    - item.1 in (_group_pk_map | default({}))

# ── Application group bindings ────────────────────────────────────────────────
# Driven by authentik_app_bindings in ansible/vars/group_config.yml.
# Uses subelements to flatten (app, group) pairs — each app can have multiple groups.
# Skips apps not yet in Authentik (not yet OIDC-wired).

- name: Look up application PKs for group bindings
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/core/applications/?slug={{ item.slug }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
    status_code: 200
  register: _app_lookup_results
  loop: "{{ authentik_app_bindings }}"

- name: Write app lookup results to temp file
  ansible.builtin.copy:
    content: "{{ _app_lookup_results.results | to_json }}"
    dest: /tmp/_authentik_app_lookup.json
    mode: "0600"

- name: Write app PK map script
  ansible.builtin.copy:
    dest: /tmp/_build_pk_map.py
    mode: "0600"
    content: |
      import json, sys
      with open('/tmp/_authentik_app_lookup.json') as f:
          results = json.load(f)
      pk_map = {}
      for r in results:
          slug = r['item']['slug']
          app_results = r.get('json', {}).get('results', [])
          if app_results:
              pk_map[slug] = app_results[0]['pk']
          else:
              sys.stderr.write(f"skipping {slug}: not found in Authentik\n")
      print(json.dumps(pk_map))

- name: Build app slug → PK map
  ansible.builtin.shell: python3 /tmp/_build_pk_map.py
  register: _pk_map_raw
  changed_when: false

- name: Remove temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/_authentik_app_lookup.json
    - /tmp/_build_pk_map.py

- name: Set app PK map fact
  ansible.builtin.set_fact:
    _app_pk_map: "{{ _pk_map_raw.stdout | from_json }}"

- name: Bind groups to applications
  ansible.builtin.uri:
    url: "http://localhost:9000/api/v3/policies/bindings/"
    method: POST
    headers:
      Authorization: "Bearer {{ _authentik_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      target: "{{ _app_pk_map[item.0.slug] }}"
      group: "{{ _group_pk_map[item.1] }}"
      enabled: true
      order: 0
    status_code: [201, 400]
  loop: "{{ authentik_app_bindings | subelements('groups') }}"
  when:
    - item.0.slug in (_app_pk_map | default({}))
    - item.1 in (_group_pk_map | default({}))
