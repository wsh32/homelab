---
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    physical:
      children:
        proxmox:
          # Ansible manages static IP on these nodes via /etc/network/interfaces.
          # proxmox_bridge_port: verify with `ip link show` on each machine —
          # it's the physical NIC bridged to vmbr0 (e.g. eno1, enp2s0, enp3s0).
          hosts:
            anton:
              ansible_host: 192.168.0.5
              static_ip: 192.168.0.5/24
              proxmox_bridge_port: eno1  # TODO: verify with `ip link show`
            nuc:
              ansible_host: 192.168.0.6
              static_ip: 192.168.0.6/24
              proxmox_bridge_port: eno1  # TODO: verify with `ip link show`

        nas:
          # TrueNAS nodes — static IP set in TrueNAS UI, not managed by Ansible.
          hosts:
            storinator:
              ansible_host: 192.168.0.4
            gringotts:
              ansible_host: 192.168.0.8  # offsite; only reachable via Tailscale

        other:
          hosts:
            orangepi:
              ansible_host: 192.168.0.7
              ansible_user: root  # Orange Pi default
              # static_ip: 192.168.0.7/24  # TODO: configure once OS is chosen

    nuc_vms:
      vars:
        proxmox_node: nuc
      hosts:
        nuc-infisical:
          ansible_host: 192.168.0.21

    anton_vms:
      vars:
        proxmox_node: anton
      hosts:
        # Populated as VMs are added

    vms:
      children:
        nuc_vms:
        anton_vms:
