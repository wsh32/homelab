---
# IPs in this file must match network.yml at the repo root.
# network.yml is the source of truth — update there first, then here.
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    physical:
      children:
        proxmox:
          # bridge_port for static IP config is defined in network.yml (physical.<host>.bridge_port).
          # The network role reads it from there via the playbook vars_files.
          hosts:
            anton:
              ansible_host: 192.168.0.5
              static_ip: 192.168.0.5/24
            nuc:
              ansible_host: 192.168.0.6
              static_ip: 192.168.0.6/24

        nas:
          # TrueNAS nodes — static IP set in TrueNAS UI, not managed by Ansible.
          hosts:
            storinator:
              ansible_host: 192.168.0.4
            gringotts:
              ansible_host: 192.168.0.8  # offsite; only reachable via Tailscale

        other:
          hosts:
            orangepi:
              ansible_host: 192.168.0.7
              ansible_user: root  # Orange Pi default

    vps:
      hosts:
        vps:
          ansible_host: "{{ vps_ip }}"  # set via -e vps_ip=<ip> or from terraform output
          ansible_user: root

    nuc_vms:
      vars:
        proxmox_node: nuc
        ansible_user: debian
      hosts:
        nuc-dns:
          ansible_host: 192.168.0.2
        nuc-infisical:
          ansible_host: 192.168.0.21
        nuc-deploy:
          ansible_host: 192.168.0.23
        # nuc-haos is managed separately (HAOS, no SSH access via Ansible)

    anton_vms:
      vars:
        proxmox_node: anton
        ansible_user: debian
      hosts:
        anton-ollama:
          ansible_host: 192.168.0.10
        anton-services:
          ansible_host: 192.168.0.11
        anton-openclaw:
          ansible_host: 192.168.0.12
        anton-debian:
          ansible_host: 192.168.0.13

    vms:
      children:
        nuc_vms:
        anton_vms:
