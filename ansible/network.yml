---
# Configure static IP on Proxmox physical nodes.
# Safe to re-run -- ifreload -a applies changes without dropping connections
# as long as the IP address is not changing.
#
# Usage:
#   ansible-playbook ansible/network.yml
#   ansible-playbook ansible/network.yml --limit machamp
#
# IPs and bridge ports are read from network.yml at the repo root.

- name: Configure static IP on Proxmox nodes
  hosts: proxmox
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../network.yml"

  pre_tasks:
    - name: Build flat nodes dict from all locations
      ansible.builtin.set_fact:
        _all_nodes: >-
          {{ locations.values() | map(attribute='nodes') | map('dict2items') | flatten | items2dict }}

    - name: Verify host is defined in network.yml
      ansible.builtin.assert:
        that:
          - inventory_hostname in _all_nodes
          - _all_nodes[inventory_hostname].bridge_port is defined
        fail_msg: >
          {{ inventory_hostname }} must have an entry with bridge_port set
          in network.yml under a location's 'nodes'. Find it with:
          ssh root@{{ ansible_host }} ip link show

    - name: Set network facts from network.yml
      ansible.builtin.set_fact:
        proxmox_bridge_port: "{{ _all_nodes[inventory_hostname].bridge_port }}"
        disable_nic_offload: "{{ _all_nodes[inventory_hostname].get('disable_nic_offload', false) }}"

    - name: Set VM bridge IP fact
      ansible.builtin.set_fact:
        ts_bridge_ip: "{{ _all_nodes[inventory_hostname].vm_bridge_ip }}"
      when: _all_nodes[inventory_hostname].vm_bridge_ip is defined

  roles:
    - role: network
