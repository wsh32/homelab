---
# Configure static IP on Proxmox physical nodes.
# Safe to re-run — ifreload -a applies changes without dropping connections
# as long as the IP address is not changing.
#
# Usage:
#   ansible-playbook ansible/network.yml
#   ansible-playbook ansible/network.yml --limit anton
#
# IPs and bridge ports are read from network.yml at the repo root.

- name: Configure static IP on Proxmox nodes
  hosts: proxmox
  gather_facts: false
  vars_files:
    - ../../network.yml

  pre_tasks:
    - name: Verify host is defined in network.yml
      ansible.builtin.assert:
        that:
          - inventory_hostname in physical
          - physical[inventory_hostname].bridge_port is defined
        fail_msg: >
          {{ inventory_hostname }} must have an entry with bridge_port set
          in network.yml under 'physical'. Find it with:
          ssh root@{{ ansible_host }} ip link show

    - name: Set network facts from network.yml
      ansible.builtin.set_fact:
        proxmox_bridge_port: "{{ physical[inventory_hostname].bridge_port }}"

  roles:
    - role: network
