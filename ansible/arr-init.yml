      when: prowlarr_apps.json | selectattr('name', 'equalto', 'Radarr') | list | length == 0

    - name: Link Prowlarr to Sonarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: Sonarr
          syncLevel: fullSync
          implementationName: Sonarr
          implementation: Sonarr
          configContract: SonarrSettings
          fields:
            - name: prowlarrUrl
              value: "http://prowlarr:9696"
            - name: baseUrl
              value: "http://sonarr:8989"
            - name: apiKey
              value: "{{ sonarr_api_key }}"
            - name: syncCategories
              value: [5000, 5010, 5020, 5030, 5040, 5045, 5050, 5060, 5070, 5080, 5090]
        status_code: 201
      when: prowlarr_apps.json | selectattr('name', 'equalto', 'Sonarr') | list | length == 0

    # ── Block 7: Radarr — add qBittorrent download client ───────────────────

    - name: Get existing Radarr download clients
      ansible.builtin.uri:
        url: "{{ radarr_url }}/api/v3/downloadclient"
        headers:
          X-Api-Key: "{{ radarr_api_key }}"
        return_content: true
      register: radarr_dlclients_check

    - name: Add qBittorrent to Radarr
      ansible.builtin.uri:
        url: "{{ radarr_url }}/api/v3/downloadclient"
        method: POST
