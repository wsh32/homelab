    # ── Block 8: Sonarr -- add qBittorrent download client ───────────────────

    - name: Get existing Sonarr download clients
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/downloadclient"
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        return_content: true
      register: sonarr_dlclients_check

    - name: Add qBittorrent to Sonarr
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/downloadclient"
