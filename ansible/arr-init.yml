          X-Api-Key: "{{ radarr_api_key }}"
        status_code: 200
      loop: "{{ radarr_folders.json | selectattr('path', 'equalto', '/movies') | list }}"

    - name: Add /data/movies root folder to Radarr
      ansible.builtin.uri:
        url: "{{ radarr_url }}/api/v3/rootfolder"
        method: POST
