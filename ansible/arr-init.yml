      when: radarr_dlclients_check.json | selectattr('name', 'equalto', 'qBittorrent') | list | length == 0

    # ── Block 8: Sonarr — add qBittorrent download client ───────────────────

    - name: Get existing Sonarr download clients
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/downloadclient"
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        return_content: true
      register: sonarr_dlclients_check

    - name: Add qBittorrent to Sonarr
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/downloadclient"
        method: POST
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        body_format: json
        body:
          name: qBittorrent
          enable: true
          protocol: torrent
          priority: 1
          implementation: QBittorrent
          configContract: QBittorrentSettings
          fields:
            - name: host
              value: "gluetun"
            - name: port
              value: "{{ qbittorrent_webui_port }}"
            - name: tvCategory
              value: sonarr
            - name: recentTvPriority
              value: 0
            - name: olderTvPriority
              value: 0
            - name: initialState
              value: 0
        status_code: 201
      when: sonarr_dlclients_check.json | selectattr('name', 'equalto', 'qBittorrent') | list | length == 0

    # ── Block 9: Jellyseerr initialization and configuration ─────────────────
    # Jellyseerr's POST /api/v1/auth/jellyfin calls GET /Users without a token.
    # After wizard completion Jellyfin requires auth for that endpoint, so
    # Jellyseerr sees an empty user list and returns NO_ADMIN_USER.
    #
    # Fix: authenticate with Jellyfin to get the admin user ID, write it
    # directly into Jellyseerr's SQLite database, mark settings.json as
    # initialized, then restart the container to apply.

    - name: Read Jellyseerr settings.json
      ansible.builtin.shell: |
        python3 -c "
        import json, sys
        try:
            d = json.load(open('/mnt/nas/docker/jellyseerr/settings.json'))
            k   = d.get('main', {}).get('apiKey', '') or d.get('apiKey', '')
            cid = d.get('clientId', '')
            print(k + '|' + cid)
        except Exception:
            print('|')
        "
      register: _jellyseerr_settings_raw
      changed_when: false

    - name: Set Jellyseerr API key and client ID from settings.json
      ansible.builtin.set_fact:
        jellyseerr_api_key: "{{ _jellyseerr_settings_raw.stdout.split('|')[0] | trim }}"
        _jellyseerr_client_id: "{{ _jellyseerr_settings_raw.stdout.split('|')[1] | trim }}"
      when: (_jellyseerr_settings_raw.stdout | trim) not in ['', '|']

    - name: Ensure Jellyseerr container is running
      ansible.builtin.command: docker start jellyseerr
      become: true
      changed_when: false
      failed_when: false
      when: jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'

    - name: Check Jellyseerr initialization status
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/public"
        status_code: 200
        return_content: true
      register: jellyseerr_public
      until: jellyseerr_public.status == 200
      retries: 20
      delay: 5
      when: jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'

    - name: Authenticate with Jellyfin to get admin user ID for Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyfin_url }}/Users/AuthenticateByName"
        method: POST
        headers:
          X-Emby-Authorization: >-
            MediaBrowser Client="Ansible", Device="ansible-init",
            DeviceId="{{ _jellyseerr_client_id | default('ansible-init') }}",
            Version="1.0"
        body_format: json
        body:
          Username: admin
          Pw: "{{ jellyfin_admin_password }}"
        status_code: 200
        return_content: true
      register: _jellyfin_auth_for_jellyseerr
      no_log: true
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))

    - name: Stop Jellyseerr before DB write to release SQLite lock
      ansible.builtin.command: docker stop jellyseerr
      become: true
      changed_when: true
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped

    - name: Write Jellyseerr DB init script to temp file
      ansible.builtin.copy:
        dest: /tmp/jellyseerr-db-init.py
        mode: "0644"
        content: |
          import json, os, sqlite3, sys
          jf_uid    = os.environ['JF_UID']
          jf_token  = os.environ['JF_TOKEN']
          jf_client = os.environ['JF_CLIENT']
          db_path   = '/app/config/db/db.sqlite3'
          try:
              conn   = sqlite3.connect(db_path, timeout=30)
              cursor = conn.cursor()
              cursor.execute('PRAGMA table_info(user)')
              schema = cursor.fetchall()
              # schema rows: (cid, name, type, notnull, dflt_value, pk)
              # Build a set of NOT NULL columns that have no default value —
              # we must supply a value for these or the INSERT will fail.
              notnull_no_default = {
                  row[1] for row in schema
                  if row[3] == 1 and row[4] is None and row[5] == 0
              }
              fields = {'id': 1, 'email': 'admin@team.rocket', 'avatar': '',
                        'jellyfinUserId': jf_uid, 'jellyfinUsername': 'admin',
                        'jellyfinAuthToken': jf_token, 'jellyfinDeviceId': jf_client,
                        'permissions': 2}
              # Fill any remaining NOT NULL / no-default columns with safe defaults
              # so the INSERT never fails on constraint violations we haven't seen yet.
              type_defaults = {'INTEGER': 0, 'REAL': 0.0}
              for row in schema:
                  col_name, col_type, notnull, dflt, pk = row[1], row[2], row[3], row[4], row[5]
                  if col_name not in fields and notnull and dflt is None and pk == 0:
                      fields[col_name] = type_defaults.get(col_type.upper(), '')
              col_names    = ', '.join(fields.keys()) + ', createdAt, updatedAt'
              placeholders = ', '.join(['?'] * len(fields)) + ", datetime('now'), datetime('now')"
              cursor.execute(
                  'INSERT OR REPLACE INTO user (' + col_names + ') VALUES (' + placeholders + ')',
                  list(fields.values()))
              conn.commit()
              conn.close()
              print('Upserted Jellyseerr admin user at id=1')
          except Exception as e:
              print('DB error: ' + str(e), file=sys.stderr)
              sys.exit(1)
          with open('/app/config/settings.json') as f:
              settings = json.load(f)
          settings.setdefault('main', {})['initialized'] = True
          settings['jellyfin'] = {
              'hostname': 'jellyfin',
              'port': 8096,
              'useSsl': False,
              'urlBase': '',
              'externalHostname': '',
              'serverId': '',
              'serverName': 'TeamRocket',
          }
          with open('/app/config/settings.json', 'w') as f:
              json.dump(settings, f, indent=2)
          print('Marked Jellyseerr as initialized with Jellyfin config')
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped

    - name: Get Jellyseerr DB file owner for docker run
      ansible.builtin.stat:
        path: /mnt/nas/docker/jellyseerr/db/db.sqlite3
      register: _jellyseerr_db_stat
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped

    - name: Write Jellyfin admin user into Jellyseerr database
      become: true
      ansible.builtin.shell:
        cmd: >-
          docker run --rm
          --user "{{ _jellyseerr_db_stat.stat.uid }}:{{ _jellyseerr_db_stat.stat.gid }}"
          -v /mnt/nas/docker/jellyseerr:/app/config
          -v /tmp/jellyseerr-db-init.py:/init.py:ro
          -e "JF_UID={{ _jellyfin_auth_for_jellyseerr.json.User.Id }}"
          -e "JF_TOKEN={{ _jellyfin_auth_for_jellyseerr.json.AccessToken }}"
          -e "JF_CLIENT={{ _jellyseerr_client_id | default('jellyseerr') }}"
          python:3-alpine python3 /init.py
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped
        and _jellyfin_auth_for_jellyseerr.json.User.Id is defined
        and _jellyseerr_db_stat is not skipped
      changed_when: true
      no_log: true

    - name: Restart Jellyseerr to apply DB initialization
      ansible.builtin.command: docker restart jellyseerr
      become: true
      changed_when: true
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped

    - name: Wait for Jellyseerr after restart
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/public"
        status_code: 200
      register: jellyseerr_post_restart
      until: jellyseerr_post_restart.status == 200
      retries: 20
      delay: 5
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and not (jellyseerr_public.json.initialized | default(false))
        and _jellyfin_auth_for_jellyseerr is not skipped

    - name: Re-read Jellyseerr API key after any restart
      ansible.builtin.shell: |
        python3 -c "
        import json, sys
        try:
            d = json.load(open('/mnt/nas/docker/jellyseerr/settings.json'))
            print(d.get('main', {}).get('apiKey', '') or d.get('apiKey', ''))
        except Exception:
            print('')
        "
      register: _jellyseerr_key_refreshed
      changed_when: false

    - name: Update Jellyseerr API key fact after restart
      ansible.builtin.set_fact:
        jellyseerr_api_key: "{{ _jellyseerr_key_refreshed.stdout | trim }}"
      when: (_jellyseerr_key_refreshed.stdout | trim) != ''

    - name: Get existing Radarr instances in Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/radarr"
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        return_content: true
      register: jellyseerr_radarr_list
      when: jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'

    - name: Add Radarr to Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/radarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: Radarr
          hostname: radarr
          port: 7878
          apiKey: "{{ radarr_api_key }}"
          useSsl: false
          baseUrl: ""
          activeProfileId: 1
          activeProfileName: "Any"
          activeDirectory: /data/movies
          minimumAvailability: released
          is4k: false
          isDefault: true
          externalUrl: "http://radarr.home"
        status_code: 201
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and jellyseerr_radarr_list is not skipped
        and (jellyseerr_radarr_list.json | selectattr('name', 'equalto', 'Radarr') | list | length == 0)

    - name: Get existing Sonarr instances in Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/sonarr"
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        return_content: true
      register: jellyseerr_sonarr_list
      when: jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'

    - name: Add Sonarr to Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/sonarr"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          name: Sonarr
          hostname: sonarr
          port: 8989
          apiKey: "{{ sonarr_api_key }}"
          useSsl: false
          baseUrl: ""
          activeProfileId: 1
          activeProfileName: "Any"
          activeDirectory: /data/tv
          minimumAvailability: released
          enableSeasonFolders: true
          is4k: false
          isDefault: true
          externalUrl: "http://sonarr.home"
        status_code: 201
      when: >
        jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'
        and jellyseerr_sonarr_list is not skipped
        and (jellyseerr_sonarr_list.json | selectattr('name', 'equalto', 'Sonarr') | list | length == 0)

    - name: Disable local account sign-up in Jellyseerr
      ansible.builtin.uri:
        url: "{{ jellyseerr_url }}/api/v1/settings/main"
        method: POST
        headers:
          X-Api-Key: "{{ jellyseerr_api_key }}"
        body_format: json
        body:
          localLogin: false
        status_code: 200
      when: jellyseerr_api_key != '' and jellyseerr_api_key != 'placeholder'

    - name: Push Jellyseerr API key to Infisical
      ansible.builtin.uri:
        url: "{{ infisical_host }}/api/v3/secrets/raw/JELLYSEERR_API_KEY"
        method: POST
        headers:
          Authorization: "Bearer {{ _inf_token.json.accessToken }}"
        body_format: json
        body:
          workspaceId: "{{ _inf_project_id }}"
          environment: "{{ _inf_environment }}"
          secretPath: "/"
          secretValue: "{{ jellyseerr_api_key }}"
          type: shared
        status_code: [200, 201]
      no_log: true
      when: _jellyseerr_key_new and jellyseerr_api_key != 'placeholder' and jellyseerr_api_key != ''

    - name: Fetch all secrets from Infisical after Jellyseerr key
      ansible.builtin.uri:
        url: "{{ infisical_host }}/api/v3/secrets/raw?workspaceId={{ _inf_project_id }}&environment={{ _inf_environment }}&secretPath=/"
        headers:
          Authorization: "Bearer {{ _inf_token.json.accessToken }}"
        status_code: 200
      register: _infisical_refreshed3
      no_log: true
      when: _jellyseerr_key_new and jellyseerr_api_key != 'placeholder' and jellyseerr_api_key != ''

    - name: Write final /etc/homelab.env
      ansible.builtin.copy:
        dest: /etc/homelab.env
        mode: "0600"
        owner: root
        group: root
        content: |
          {% for s in _infisical_refreshed3.json.secrets %}
          {{ s.secretKey }}={{ s.secretValue }}
          {% endfor %}
      become: true
      no_log: true
      when: _jellyseerr_key_new and jellyseerr_api_key != 'placeholder' and jellyseerr_api_key != ''

    # ── Block 10: Recyclarr — run one-shot sync ──────────────────────────────
    # Recyclarr is stateless for sync purposes; use a local VM temp dir to
    # avoid needing write access to the NFS docker share root.

    - name: Create local Recyclarr config temp directory
      ansible.builtin.file:
        path: /tmp/recyclarr-config
        state: directory
        mode: "0755"

    - name: Copy Recyclarr config to VM
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../services/machamp-services/config/recyclarr/"
        dest: /tmp/recyclarr-config/
        mode: "0644"

    - name: Run Recyclarr sync
      become: true
      community.docker.docker_container:
        name: recyclarr-init
        image: ghcr.io/recyclarr/recyclarr:7
        volumes:
          - /tmp/recyclarr-config:/config
        env:
          RADARR_API_KEY: "{{ radarr_api_key }}"
          SONARR_API_KEY: "{{ sonarr_api_key }}"
        command: sync
        detach: false
        cleanup: true
        auto_remove: true
      register: recyclarr_result
      ignore_errors: true

    - name: Show Recyclarr sync output
      ansible.builtin.debug:
        var: recyclarr_result.container.Output
      when: recyclarr_result is defined
