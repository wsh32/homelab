        status_code: 201
      when: sonarr_folders.json | selectattr('path', 'equalto', '/tv') | list | length > 0

    # ── Block 6: Prowlarr -- link Radarr and Sonarr ──────────────────────────

    - name: Get existing Prowlarr applications
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        return_content: true
      register: prowlarr_apps

    - name: Link Prowlarr to Radarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: Radarr
          syncLevel: fullSync
          implementationName: Radarr
          implementation: Radarr
          configContract: RadarrSettings
          fields:
            - name: prowlarrUrl
              value: "http://prowlarr:9696"
            - name: baseUrl
              value: "http://radarr:7878"
            - name: apiKey
              value: "{{ radarr_api_key }}"
            - name: syncCategories
              value: [2000, 2010, 2020, 2030, 2040, 2045, 2050, 2060]
        status_code: 201
      when: prowlarr_apps.json | selectattr('name', 'equalto', 'Radarr') | list | length == 0

    - name: Link Prowlarr to Sonarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: Sonarr
          syncLevel: fullSync
          implementationName: Sonarr
          implementation: Sonarr
          configContract: SonarrSettings
