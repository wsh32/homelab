          X-Api-Key: "{{ radarr_api_key }}"
        body_format: json
        body:
          path: /data/movies
        status_code: 201
      when: radarr_folders.json | selectattr('path', 'equalto', '/data/movies') | list | length == 0

    - name: Trigger Radarr library rescan
      ansible.builtin.uri:
        url: "{{ radarr_url }}/api/v3/command"
        method: POST
        headers:
          X-Api-Key: "{{ radarr_api_key }}"
        body_format: json
        body:
          name: RescanMovie
        status_code: 201
      when: radarr_folders.json | selectattr('path', 'equalto', '/movies') | list | length > 0

    # ── Block 5: Volume migration — Sonarr ──────────────────────────────────

    - name: Get Sonarr root folders
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/rootfolder"
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        return_content: true
      register: sonarr_folders

    - name: Delete legacy Sonarr /tv root folder
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/rootfolder/{{ item.id }}"
        method: DELETE
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        status_code: 200
      loop: "{{ sonarr_folders.json | selectattr('path', 'equalto', '/tv') | list }}"

    - name: Add /data/tv root folder to Sonarr
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/rootfolder"
        method: POST
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        body_format: json
        body:
          path: /data/tv
        status_code: 201
      when: sonarr_folders.json | selectattr('path', 'equalto', '/data/tv') | list | length == 0

    - name: Trigger Sonarr library rescan
      ansible.builtin.uri:
        url: "{{ sonarr_url }}/api/v3/command"
        method: POST
        headers:
          X-Api-Key: "{{ sonarr_api_key }}"
        body_format: json
        body:
          name: RescanSeries
        status_code: 201
      when: sonarr_folders.json | selectattr('path', 'equalto', '/tv') | list | length > 0

    # ── Block 6: Prowlarr — link Radarr and Sonarr ──────────────────────────

    - name: Get existing Prowlarr applications
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        return_content: true
      register: prowlarr_apps

    - name: Link Prowlarr to Radarr
      ansible.builtin.uri:
        url: "{{ prowlarr_url }}/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ prowlarr_api_key }}"
        body_format: json
        body:
          name: Radarr
          syncLevel: fullSync
          implementationName: Radarr
          implementation: Radarr
          configContract: RadarrSettings
          fields:
            - name: prowlarrUrl
              value: "http://prowlarr:9696"
            - name: baseUrl
              value: "http://radarr:7878"
            - name: apiKey
              value: "{{ radarr_api_key }}"
            - name: syncCategories
              value: [2000, 2010, 2020, 2030, 2040, 2045, 2050, 2060]
