---
# Ensure every managed host is joined to the Headscale network.
# Generates a fresh 1-hour reusable pre-auth key on each run,
# expires all previous keys first, and tags enrolled nodes as tag:infra.
#
# Usage:
#   ansible-playbook ansible/headscale.yml

- name: Generate Headscale pre-auth key
  hosts: diglett-dns
  gather_facts: false

  tasks:
    - name: Read headscale server URL
      ansible.builtin.slurp:
        src: /etc/headscale.env
      register: _headscale_env
      become: true

    - name: Set headscale server URL fact
      ansible.builtin.set_fact:
        headscale_server_url: >-
          {{ _headscale_env.content | b64decode
             | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\1') | first }}

    - name: List existing pre-auth keys
      community.docker.docker_container_exec:
        container: headscale
        command: headscale preauthkeys list --output json
      register: _existing_keys
      become: true

    - name: Expire all existing pre-auth keys
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys expire --id {{ item }}"
      loop: "{{ _existing_keys.stdout | from_json | map(attribute='id') | list }}"
      become: true

    - name: Generate fresh pre-auth key (1h expiry, reusable, tag:infra)
      community.docker.docker_container_exec:
        container: headscale
        command: >-
          headscale preauthkeys create
          --reusable
          --expiration 1h
          --tags tag:infra
          --output json
      register: _new_key
      become: true

    - name: Set pre-auth key fact
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (_new_key.stdout | from_json).key }}"

- name: Join all hosts to Headscale
  hosts: all:!localhost
  gather_facts: false

  vars:
    headscale_preauth_key: "{{ hostvars['diglett-dns'].headscale_preauth_key }}"
    headscale_server_url: "{{ hostvars['diglett-dns'].headscale_server_url }}"

  tasks:
    - name: Check if tailscale is installed
      ansible.builtin.stat:
        path: /usr/bin/tailscale
      register: _ts_binary
      become: true

    - name: Install tailscale via official install script
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com/install.sh | sh
        creates: /usr/bin/tailscale
      become: true
      when: not _ts_binary.stat.exists

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
      become: true

    - name: Install sqlite3
      ansible.builtin.apt:
        name: sqlite3
        state: present
      become: true

    - name: Recover headscale SQLite database if malformed
      ansible.builtin.shell: |
        set -e
        DB=/mnt/nas/docker/headscale/db.sqlite
        sqlite3 "$DB" "PRAGMA integrity_check;" 2>&1 | grep -q '^ok$' && exit 0
        sqlite3 "$DB" ".recover" | sqlite3 "${DB}.recovered"
        mv "$DB" "${DB}.bak"
        mv "${DB}.recovered" "$DB"
      args:
        executable: /bin/bash
      register: _db_recover
      changed_when: "'ok' not in _db_recover.stdout"
      become: true
      run_once: true
      delegate_to: diglett-dns

    - name: Restart headscale after database recovery
      community.docker.docker_container:
        name: headscale
        state: started
        restart: true
      become: true
      run_once: true
      delegate_to: diglett-dns
      when: _db_recover.changed

    - name: Look up existing headscale node by hostname
      community.docker.docker_container_exec:
        container: headscale
        command: headscale nodes list --output json
      register: _nodes_list
      become: true
      delegate_to: diglett-dns

    - name: Delete existing headscale node for this host
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale nodes delete --identifier {{ item }} --force"
      loop: >-
        {{
          _nodes_list.stdout | from_json
          | selectattr('given_name', 'equalto', inventory_hostname)
          | map(attribute='id') | list
        }}
      become: true
      delegate_to: diglett-dns

    - name: Resolve headscale hostname from deploy host
      ansible.builtin.command: >-
        getent hosts {{ headscale_server_url | urlsplit('hostname') }}
      register: _headscale_resolved
      delegate_to: localhost
      run_once: true
      changed_when: false

    - name: Pin headscale hostname in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "{{ headscale_server_url | urlsplit('hostname') }}"
        line: "{{ _headscale_resolved.stdout.split()[0] }}  {{ headscale_server_url | urlsplit('hostname') }}"
        state: present
      become: true

    - name: Join tailscale network
      ansible.builtin.command: >-
        tailscale up
        --login-server={{ headscale_server_url }}
        --auth-key={{ headscale_preauth_key }}
        --accept-routes
        {{ '--advertise-exit-node' if tailscale_exit_node | default(false) else '' }}
        {{ '--advertise-routes=' + (tailscale_advertise_routes | join(',')) if tailscale_advertise_routes | default([]) | length > 0 else '' }}
        --hostname={{ inventory_hostname }}
        --force-reauth
        --reset
      become: true
      async: 120
      poll: 5

    - name: Check Tailscale IP in headscale DB
      ansible.builtin.command: >-
        sqlite3 /mnt/nas/docker/headscale/db.sqlite
        "SELECT ipv4 FROM nodes WHERE hostname = '{{ inventory_hostname }}'"
      become: true
      delegate_to: diglett-dns
      register: _current_ip
      changed_when: false
      when: tailscale_ip is defined

    - name: Stop headscale to release DB lock
      community.docker.docker_container:
        name: headscale
        state: stopped
      become: true
      delegate_to: diglett-dns
      run_once: true

    - name: Assign static Tailscale IP in headscale DB
      ansible.builtin.command:
        argv:
          - sqlite3
          - -cmd
          - .timeout 10000
          - /mnt/nas/docker/headscale/db.sqlite
          - >-
            UPDATE nodes
            SET ipv4 = '{{ tailscale_ip }}'
            WHERE hostname = '{{ inventory_hostname }}'
              AND ipv4 != '{{ tailscale_ip }}'
      become: true
      delegate_to: diglett-dns
      register: _ip_assigned
      when:
        - tailscale_ip is defined
        - _current_ip.stdout | trim != tailscale_ip

    - name: Start headscale after IP update
      community.docker.docker_container:
        name: headscale
        state: started
      become: true
      delegate_to: diglett-dns
      run_once: true

    - name: Restart tailscaled to pick up corrected Tailscale IP
      ansible.builtin.systemd:
        name: tailscaled
        state: restarted
      become: true
      when:
        - tailscale_ip is defined
        - _current_ip.stdout | trim != tailscale_ip
