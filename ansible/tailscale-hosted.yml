---
# Configure physical nodes on the Tailscale hosted tailnet.
#
# Nodes on the hosted tailnet (diglett, machamp, geodude) advertise VM bridge
# subnets so Tailscale members can reach VMs directly without running Headscale.
# This separates the physical recovery path from the Headscale failure domain.
#
# Prerequisites:
#   - tailscale_api_token: Tailscale API access token (Settings → Keys → Access tokens)
#   - tailscale_tailnet: your tailnet name (e.g. "example.com" or "user.github")
#   Both must be in ansible/secrets.yml (gitignored) or passed via --extra-vars.
#
# On first run for a node:
#   The playbook generates a short-lived auth key and enrolls the node.
#   Remote nodes (connect_via_tailscale: true) are reached via MagicDNS hostname,
#   so Tailscale must already be running on the operator's machine with MagicDNS enabled.
#   For geodude: manually join it to Tailscale first (so the hostname resolves),
#   then run this playbook to apply the correct settings.
#
# Usage:
#   ansible-playbook ansible/tailscale-hosted.yml
#   ansible-playbook ansible/tailscale-hosted.yml --limit geodude

# ── Play 1: Push ACL to Tailscale ────────────────────────────────────────────
- name: Push Tailscale ACL
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/secrets.yml"

  tasks:
    - name: Get current ACL ETag
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/acl"
        method: GET
        headers:
          Authorization: "Bearer {{ tailscale_api_token }}"
          Accept: "application/hujson"
        status_code: 200
      register: _acl_current
      no_log: true

    - name: Push ACL file to Tailscale API
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/acl"
        method: POST
        headers:
          Authorization: "Bearer {{ tailscale_api_token }}"
          Content-Type: "application/hujson"
          If-Match: "{{ _acl_current.etag }}"
        body: "{{ lookup('file', playbook_dir + '/../services/tailscale/acl.hujson') }}"
        status_code: 200
      no_log: true

# ── Play 2: Enroll / configure nodes ─────────────────────────────────────────
- name: Configure Tailscale on hosted nodes
  hosts: tailscale_hosted
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/secrets.yml"

  tasks:
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      become: true

    - name: Install tailscale via official install script
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com/install.sh | sh
        creates: /usr/bin/tailscale
      become: true

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
      become: true

    - name: Check Tailscale connection status
      ansible.builtin.command: tailscale status --json
      register: _ts_status
      changed_when: false
      failed_when: false
      become: true

    - name: Set enrolled fact
      ansible.builtin.set_fact:
        _ts_enrolled: "{{ _ts_status.rc == 0 and (_ts_status.stdout | from_json).get('BackendState') == 'Running' }}"

    - name: Generate short-lived auth key
      ansible.builtin.uri:
        url: "https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/keys"
        method: POST
        headers:
          Authorization: "Bearer {{ tailscale_api_token }}"
        body_format: json
        body:
          capabilities:
            devices:
              create:
                reusable: false
                ephemeral: false
                preauthorized: true
                tags: ["tag:infra"]
          expirySeconds: 300
        status_code: 200
      register: _ts_key
      no_log: true
      delegate_to: localhost
      when: not _ts_enrolled

    - name: Enroll in Tailscale hosted tailnet
      ansible.builtin.command: >-
        tailscale up
        --auth-key={{ _ts_key.json.key }}
        --hostname={{ inventory_hostname }}
        --advertise-tags=tag:infra
        {% if ts_bridge_subnet is defined %}--advertise-routes={{ ts_bridge_subnet }}{% endif %}
        {% if tailscale_ssh | default(false) %}--ssh{% endif %}
        --accept-routes=false
      become: true
      no_log: true
      when: not _ts_enrolled

    - name: Apply Tailscale settings (already enrolled nodes)
      ansible.builtin.command: >-
        tailscale up
        --hostname={{ inventory_hostname }}
        --advertise-tags=tag:infra
        {% if ts_bridge_subnet is defined %}--advertise-routes={{ ts_bridge_subnet }}{% endif %}
        {% if tailscale_ssh | default(false) %}--ssh{% endif %}
        --accept-routes=false
        --reset
      become: true
      when: _ts_enrolled

