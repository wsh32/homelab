---
# Deploy the DNS stack (AdGuard Home + Headscale + cloudflared) to diglett-dns,
# then bootstrap Headscale (create infra user, pre-auth key, webui API key).
# Idempotent: safe to re-run.
#
# Prerequisites:
#   - diglett-dns VM must be up and cloud-init must have completed
#   - /etc/headscale.env and /etc/headscale-ui.env must exist (written by Terraform cloud-init)
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage:
#   ansible-playbook ansible/dns.yml

- name: Deploy DNS stack
  hosts: diglett-dns
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  roles:
    - role: dns

- name: Bootstrap Headscale
  hosts: diglett-dns
  gather_facts: false

  tasks:
    - name: Wait for Headscale to be ready
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Create Headscale infra user
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users create infra
      failed_when: false  # idempotent: no-op if user already exists
      become: true

    - name: Get infra user ID
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users list --output json
      register: users_result
      become: true

    - name: Parse infra user ID
      ansible.builtin.set_fact:
        headscale_user_id: "{{ (users_result.stdout | from_json) | selectattr('name', 'equalto', 'infra') | map(attribute='id') | first }}"

    - name: Generate reusable pre-auth key (1 year expiry)
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys create --user {{ headscale_user_id }} --reusable --expiration 8760h --output json"
      register: preauthkey_result
      become: true

    - name: Parse pre-auth key
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (preauthkey_result.stdout | from_json).key }}"

    - name: Check if webui API key is already provisioned
      ansible.builtin.stat:
        path: /mnt/nas/docker/headscale-ui/key.txt
      register: webui_key_stat
      become: true

    - name: Generate headscale API key for webui
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale apikeys create --output json"
      register: webui_apikey_result
      become: true
      when: not webui_key_stat.stat.exists

    - name: Parse webui API key
      ansible.builtin.set_fact:
        headscale_webui_api_key: "{{ (webui_apikey_result.stdout | from_json).key }}"
      no_log: true
      when: not webui_key_stat.stat.exists

    - name: Read Fernet key from NFS
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headscale-ui/fernet.key
      register: webui_fernet_key_raw
      become: true
      no_log: true
      when: not webui_key_stat.stat.exists

    - name: Parse Fernet key
      ansible.builtin.set_fact:
        headscale_webui_fernet_key: "{{ webui_fernet_key_raw.content | b64decode | trim }}"
      no_log: true
      when: not webui_key_stat.stat.exists

    - name: Fernet-encrypt API key for webui storage
      ansible.builtin.shell: |
        python3 -c "
        import os
        from cryptography.fernet import Fernet
        f = Fernet(os.environ['FERNET_KEY'].encode())
        print(f.encrypt(os.environ['API_KEY'].encode()).decode())
        "
      environment:
        FERNET_KEY: "{{ headscale_webui_fernet_key }}"
        API_KEY: "{{ headscale_webui_api_key }}"
      register: encrypted_api_key
      no_log: true
      when: not webui_key_stat.stat.exists

    - name: Write encrypted API key to webui data directory
      ansible.builtin.copy:
        content: "{{ encrypted_api_key.stdout }}"
        dest: /mnt/nas/docker/headscale-ui/key.txt
        mode: "0600"
        owner: root
        group: root
      become: true
      no_log: true
      when: not webui_key_stat.stat.exists

- name: Write pre-auth key to terraform.tfvars
  hosts: localhost
  gather_facts: false

  vars:
    preauth_key: "{{ hostvars['diglett-dns'].headscale_preauth_key }}"
    tfvars_files:
      - "{{ playbook_dir }}/../terraform/diglett/terraform.tfvars"
      - "{{ playbook_dir }}/../terraform/machamp/terraform.tfvars"

  tasks:
    - name: Write tailscale_auth_key to terraform.tfvars
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^tailscale_auth_key'
        line: 'tailscale_auth_key = "{{ preauth_key }}"'
        state: present
      loop: "{{ tfvars_files }}"

    - name: Display pre-auth key
      ansible.builtin.debug:
        msg: "Headscale pre-auth key written to terraform.tfvars: {{ preauth_key }}"
