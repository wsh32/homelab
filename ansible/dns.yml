---
# Deploy the DNS stack (AdGuard Home + Headscale + cloudflared) to diglett-dns,
# then bootstrap Headscale (create infra user, pre-auth key, webui API key).
# Idempotent: safe to re-run.
#
# Prerequisites:
#   - diglett-dns VM must be up and cloud-init must have completed
#   - /etc/headscale.env must exist (written by Terraform cloud-init)
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage:
#   ansible-playbook ansible/dns.yml

- name: Deploy DNS stack
  hosts: diglett-dns
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  roles:
    - role: dns

- name: Bootstrap Headscale
  hosts: diglett-dns
  gather_facts: false

  tasks:
    - name: Wait for Headscale to be ready
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Create Headscale infra user
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users create infra
      failed_when: false  # idempotent: no-op if user already exists
      become: true

    - name: Get infra user ID
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users list --output json
      register: users_result
      become: true

    - name: Parse infra user ID
      ansible.builtin.set_fact:
        headscale_user_id: "{{ (users_result.stdout | from_json) | selectattr('name', 'equalto', 'infra') | map(attribute='id') | first }}"

    - name: Generate reusable pre-auth key (1 year expiry)
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys create --user {{ headscale_user_id }} --reusable --expiration 8760h --output json"
      register: preauthkey_result
      become: true

    - name: Parse pre-auth key
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (preauthkey_result.stdout | from_json).key }}"

- name: Write pre-auth key to terraform.tfvars
  hosts: localhost
  gather_facts: false

  vars:
    preauth_key: "{{ hostvars['diglett-dns'].headscale_preauth_key }}"
    tfvars_files:
      - "{{ playbook_dir }}/../terraform/diglett/terraform.tfvars"
      - "{{ playbook_dir }}/../terraform/machamp/terraform.tfvars"

  tasks:
    - name: Write tailscale_auth_key to terraform.tfvars
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^tailscale_auth_key'
        line: 'tailscale_auth_key = "{{ preauth_key }}"'
        state: present
      loop: "{{ tfvars_files }}"

    - name: Display pre-auth key
      ansible.builtin.debug:
        msg: "Headscale pre-auth key written to terraform.tfvars: {{ preauth_key }}"
