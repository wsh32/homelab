---
# Deploy the DNS stack (AdGuard Home + Headscale + cloudflared) to diglett-dns,
# then bootstrap Headscale (create infra user, pre-auth key, webui API key).
# Idempotent: safe to re-run.
#
# Prerequisites:
#   - diglett-dns VM must be up and cloud-init must have completed
#   - /etc/headscale.env must exist (written by Terraform cloud-init)
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage:
#   ansible-playbook ansible/dns.yml

- name: Deploy DNS stack
  hosts: diglett-dns
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  roles:
    - role: dns

- name: Bootstrap Headscale
  hosts: diglett-dns
  gather_facts: false

  tasks:
    - name: Wait for Headscale to be ready
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Create Headscale infra user
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users create infra
      failed_when: false  # idempotent: no-op if user already exists
      become: true

    - name: Get infra user ID
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users list --output json
      register: users_result
      become: true

    - name: Parse infra user ID
      ansible.builtin.set_fact:
        headscale_user_id: "{{ (users_result.stdout | from_json) | selectattr('name', 'equalto', 'infra') | map(attribute='id') | first }}"

    - name: Generate reusable pre-auth key (1 year expiry)
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys create --user {{ headscale_user_id }} --reusable --expiration 8760h --output json"
      register: preauthkey_result
      become: true

    - name: Parse pre-auth key
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (preauthkey_result.stdout | from_json).key }}"

    - name: Wait for headscale-ui to be ready
      ansible.builtin.wait_for:
        port: 3050
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Check if headscale-ui is already bootstrapped
      ansible.builtin.stat:
        path: /mnt/nas/docker/headscale-ui/admin.key
      register: headscale_ui_bootstrapped

    - name: Generate headscale API key for headscale-ui
      community.docker.docker_container_exec:
        container: headscale
        command: headscale apikeys create --output json
      register: headscale_ui_apikey_result
      become: true
      no_log: true
      when: not headscale_ui_bootstrapped.stat.exists

    - name: Generate headscale-ui admin password
      ansible.builtin.set_fact:
        headscale_ui_admin_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
      no_log: true
      when: not headscale_ui_bootstrapped.stat.exists

    - name: Create headscale-ui admin account
      ansible.builtin.uri:
        url: http://localhost:3050/api/backend/new-default-admin
        method: POST
        body_format: json
        body:
          username: admin
          password: "{{ headscale_ui_admin_password }}"
        status_code: 200
      register: headscale_ui_admin_result
      no_log: true
      when: not headscale_ui_bootstrapped.stat.exists

    - name: Set headscale API key in headscale-ui
      ansible.builtin.uri:
        url: http://localhost:3050/api/backend/update-token-key
        method: PATCH
        body_format: json
        headers:
          Cookie: "headscale-ui.admin={{ headscale_ui_admin_result.json.data.token }}"
        body:
          apikey: "{{ headscale_ui_apikey_result.stdout | from_json }}"
        status_code: 200
      no_log: true
      when: not headscale_ui_bootstrapped.stat.exists

    - name: Store headscale-ui admin password on NFS
      ansible.builtin.copy:
        content: "{{ headscale_ui_admin_password }}"
        dest: /mnt/nas/docker/headscale-ui/admin.key
        mode: "0600"
      no_log: true
      when: not headscale_ui_bootstrapped.stat.exists

    - name: Display headscale-ui credentials for Vaultwarden
      ansible.builtin.debug:
        msg: "headscale-ui login — username: admin  password: {{ headscale_ui_admin_password }} — save this in Vaultwarden"
      when: not headscale_ui_bootstrapped.stat.exists

- name: Write pre-auth key to terraform.tfvars
  hosts: localhost
  gather_facts: false

  vars:
    preauth_key: "{{ hostvars['diglett-dns'].headscale_preauth_key }}"
    tfvars_files:
      - "{{ playbook_dir }}/../terraform/diglett/terraform.tfvars"
      - "{{ playbook_dir }}/../terraform/machamp/terraform.tfvars"

  tasks:
    - name: Write tailscale_auth_key to terraform.tfvars
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^tailscale_auth_key'
        line: 'tailscale_auth_key = "{{ preauth_key }}"'
        state: present
      loop: "{{ tfvars_files }}"

    - name: Display pre-auth key
      ansible.builtin.debug:
        msg: "Headscale pre-auth key written to terraform.tfvars: {{ preauth_key }}"
