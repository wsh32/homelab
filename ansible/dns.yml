---
# Phase 1: Deploy DNS stack and bootstrap Headscale.
# Run this before machamp VMs exist (Authentik is not yet available).
#
# Prerequisites:
#   - diglett-dns VM must be up and cloud-init must have completed
#   - /etc/headscale.env must exist (written by Terraform cloud-init)
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage:
#   ansible-playbook ansible/dns.yml                        # bootstrap only (default)
#   ansible-playbook ansible/dns.yml --tags inject-oidc     # OIDC injection only (after infra.yml)
#   ansible-playbook ansible/dns.yml --tags bootstrap,inject-oidc  # both phases

- name: Deploy DNS stack
  hosts: diglett-dns
  gather_facts: true
  tags: [bootstrap]

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  pre_tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false
      no_log: true

  roles:
    - role: dns

- name: Bootstrap Headscale
  hosts: diglett-dns
  gather_facts: false
  tags: [bootstrap]

  tasks:
    - name: Wait for Headscale to be ready
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Create Headscale infra user
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users create infra
      failed_when: false  # idempotent: no-op if user already exists
      become: true

    - name: Get headscale user list
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users list --output json
      register: users_result
      become: true

    - name: Parse infra user ID
      ansible.builtin.set_fact:
        headscale_user_id: "{{ (users_result.stdout | from_json) | selectattr('name', 'equalto', 'infra') | map(attribute='id') | first }}"

    - name: Check if tailscale auth key is cached on disk
      ansible.builtin.stat:
        path: /etc/tailscale-auth.key
      register: tailscale_auth_key_stat
      become: true

    - name: Read cached pre-auth key from disk
      ansible.builtin.slurp:
        src: /etc/tailscale-auth.key
      register: tailscale_auth_key_raw
      become: true
      no_log: true
      when: tailscale_auth_key_stat.stat.exists

    - name: List pre-auth keys in headscale DB
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys list --output json"
      register: preauthkeys_list
      become: true
      when: tailscale_auth_key_stat.stat.exists

    - name: Determine if cached key is still valid in headscale DB
      ansible.builtin.set_fact:
        _cached_key_valid: >-
          {{
            tailscale_auth_key_stat.stat.exists and
            (tailscale_auth_key_raw.content | default('') | b64decode | trim) in
            (preauthkeys_list.stdout | default('[]') | from_json | map(attribute='key') | list)
          }}

    - name: Generate reusable pre-auth key (1 year expiry)
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys create --user {{ headscale_user_id }} --reusable --expiration 8760h --output json"
      register: preauthkey_result
      become: true
      when: not _cached_key_valid

    - name: Set pre-auth key fact (newly generated)
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (preauthkey_result.stdout | from_json).key }}"
      when: not _cached_key_valid

    - name: Set pre-auth key fact (from cache)
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ tailscale_auth_key_raw.content | b64decode | trim }}"
      when: _cached_key_valid

    - name: Read headscale server URL
      ansible.builtin.slurp:
        src: /etc/headscale.env
      register: headscale_env_bootstrap
      become: true

    - name: Set headscale URL fact
      ansible.builtin.set_fact:
        headscale_server_url: "{{ headscale_env_bootstrap.content | b64decode | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\\1') | first }}"

    - name: Write tailscale auth key to disk (only when newly generated)
      ansible.builtin.copy:
        content: "{{ headscale_preauth_key }}"
        dest: /etc/tailscale-auth.key
        mode: "0600"
        owner: root
        group: root
      become: true
      no_log: true
      when: not _cached_key_valid

    - name: Install tailscale-join-headscale systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscale-join-headscale.service
        mode: "0644"
        owner: root
        group: root
        content: |
          [Unit]
          Description=Join diglett-dns to headscale after headscale is ready
          After=docker.service
          Requires=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          TimeoutStartSec=300
          ExecStartPre=/bin/bash -c 'until nc -z localhost 443; do sleep 2; done'
          ExecStartPre=ethtool -K eth0 rx-udp-gro-forwarding on rx-gro-list off
          ExecStart=/bin/bash -c '. /etc/headscale.env && tailscale up --login-server=$HEADSCALE_SERVER_URL --auth-key=$(cat /etc/tailscale-auth.key) --advertise-exit-node --hostname=diglett-dns --force-reauth'

          [Install]
          WantedBy=multi-user.target
      become: true
      register: ts_service_installed

    - name: Reload systemd after service file change
      ansible.builtin.systemd:
        daemon_reload: true
      become: true
      when: ts_service_installed.changed

    - name: Restart tailscale-join-headscale to apply updated unit
      ansible.builtin.systemd:
        name: tailscale-join-headscale
        state: restarted
      become: true
      when: ts_service_installed.changed

    - name: Enable tailscale-join-headscale service
      ansible.builtin.systemd:
        name: tailscale-join-headscale
        enabled: true
      become: true

    - name: Join diglett-dns to headscale
      ansible.builtin.command: >-
        tailscale up
        --login-server={{ headscale_server_url }}
        --auth-key={{ headscale_preauth_key }}
        --advertise-exit-node
        --hostname=diglett-dns
        --force-reauth
      become: true

    - name: Get diglett-dns tailscale IP
      ansible.builtin.command: tailscale ip -4
      register: diglett_ts_ip
      changed_when: false
      become: true

    - name: Update headscale DNS nameserver to diglett-dns tailscale IP
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headscale/config.yaml
        regexp: '^\s+- \d+\.\d+\.\d+\.\d+'
        line: "      - {{ diglett_ts_ip.stdout | trim }}  # AdGuard Home on diglett-dns"
      register: nameserver_update

    - name: Restart headscale to apply updated nameserver
      community.docker.docker_container:
        name: headscale
        state: started
        restart: true
      become: true
      when: nameserver_update.changed

    - name: Wait for headplane to be ready
      ansible.builtin.wait_for:
        port: 3001
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Check if headplane API key is already provisioned
      ansible.builtin.stat:
        path: /mnt/nas/docker/headplane/api.key
      register: headplane_api_key_stat

    - name: Generate headscale API key for headplane
      community.docker.docker_container_exec:
        container: headscale
        command: headscale apikeys create --output json
      register: headplane_apikey_result
      become: true
      no_log: true
      when: not headplane_api_key_stat.stat.exists

    - name: Extract headscale API key from result
      ansible.builtin.set_fact:
        headplane_apikey: >-
          {{ (headplane_apikey_result.stdout | from_json).key
             if (headplane_apikey_result.stdout | from_json) is mapping
             else headplane_apikey_result.stdout | from_json }}
      when: not headplane_api_key_stat.stat.exists
      no_log: true

    - name: Write headscale API key to NFS (idempotency marker)
      ansible.builtin.copy:
        content: "{{ headplane_apikey }}"
        dest: /mnt/nas/docker/headplane/api.key
        mode: "0600"
      become: true
      no_log: true
      when: not headplane_api_key_stat.stat.exists

    - name: Read headscale API key from NFS
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headplane/api.key
      register: headplane_api_key_nfs
      become: true
      no_log: true

    - name: Inject headscale API key into headplane config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+api_key:'
        line: "  api_key: \"{{ headplane_api_key_nfs.content | b64decode | trim }}\""
      no_log: true
      register: api_key_injected

    - name: Restart headplane to pick up API key
      community.docker.docker_container:
        name: headplane
        state: started
        restart: true
      become: true
      when: api_key_injected.changed

    - name: Display headplane login key for Vaultwarden
      ansible.builtin.debug:
        msg: "headplane login — navigate to :3001/admin and enter this API key: {{ headplane_api_key_nfs.content | b64decode | trim }}"
      when: not headplane_api_key_stat.stat.exists

- name: Write pre-auth key to terraform.tfvars
  hosts: localhost
  gather_facts: false
  tags: [bootstrap]

  vars:
    preauth_key: "{{ hostvars['diglett-dns'].headscale_preauth_key | default('') }}"
    tfvars_files:
      - "{{ playbook_dir }}/../terraform/diglett/terraform.tfvars"
      - "{{ playbook_dir }}/../terraform/machamp/terraform.tfvars"

  tasks:
    - name: Skip if no pre-auth key was obtained (bootstrap headscale play may have failed)
      ansible.builtin.meta: end_play
      when: preauth_key == ''

    - name: Write tailscale_auth_key to terraform.tfvars
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^tailscale_auth_key'
        line: 'tailscale_auth_key = "{{ preauth_key }}"'
        state: present
      loop: "{{ tfvars_files }}"

    - name: Display pre-auth key
      ansible.builtin.debug:
        msg: "Headscale pre-auth key written to terraform.tfvars: {{ preauth_key }}"

# ── Phase 2: Inject Authentik OIDC credentials into Headplane ────────────────
# Run after infra.yml has bootstrapped Authentik and written
# /mnt/nas/docker/headplane-oidc.env to NFS.
#
# Usage:
#   ansible-playbook ansible/dns.yml --tags phase2

- name: Inject Authentik OIDC credentials into Headplane
  hosts: diglett-dns
  gather_facts: false
  tags: [inject-oidc]

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  pre_tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false
      no_log: true

  tasks:
    - name: Mount NFS share
      ansible.builtin.include_tasks: ../tasks/nfs-mount.yml
      vars:
        nfs_mount_path: /mnt/nas/docker
        nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

    - name: Check if headplane OIDC credentials are available on NFS
      ansible.builtin.stat:
        path: /mnt/nas/docker/headplane-oidc.env
      register: _hp_oidc_env_stat
      become: true

    - name: Fail if headplane OIDC env not yet written by infra.yml
      ansible.builtin.fail:
        msg: >
          /mnt/nas/docker/headplane-oidc.env not found.
          Run ansible-playbook ansible/infra.yml first to bootstrap Authentik
          and write the OIDC credentials to NFS.
      when: not _hp_oidc_env_stat.stat.exists

    - name: Read headplane OIDC credentials from NFS
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headplane-oidc.env
      register: _hp_oidc_env_raw
      become: true
      no_log: true

    - name: Parse headplane OIDC credentials
      ansible.builtin.set_fact:
        _hp_oidc_client_id: "{{ (_hp_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADPLANE_OIDC_CLIENT_ID=(.+)$', '\\1') | first }}"
        _hp_oidc_client_secret: "{{ (_hp_oidc_env_raw.content | b64decode) | regex_search('(?m)^HEADPLANE_OIDC_CLIENT_SECRET=(.+)$', '\\1') | first }}"
      no_log: true

    - name: Inject OIDC issuer into headplane config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+issuer:'
        line: "  issuer: \"{{ authentik_public_url }}/application/o/headplane/\""
      notify: Restart headplane

    - name: Inject OIDC client ID into headplane config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+client_id:'
        line: "  client_id: \"{{ _hp_oidc_client_id }}\""
      no_log: true
      notify: Restart headplane

    - name: Inject OIDC client secret into headplane config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+client_secret:'
        line: "  client_secret: \"{{ _hp_oidc_client_secret }}\""
      no_log: true
      notify: Restart headplane

    - name: Check if headplane API key is provisioned
      ansible.builtin.stat:
        path: /mnt/nas/docker/headplane/api.key
      register: _hp_api_key_stat
      become: true

    - name: Read headplane API key
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headplane/api.key
      register: _hp_api_key_raw
      become: true
      no_log: true
      when: _hp_api_key_stat.stat.exists

    - name: Inject headscale API key into headplane OIDC config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+headscale_api_key:'
        line: "  headscale_api_key: \"{{ _hp_api_key_raw.content | b64decode | trim }}\""
      no_log: true
      notify: Restart headplane
      when: _hp_api_key_stat.stat.exists

  handlers:
    - name: Restart headplane
      community.docker.docker_container:
        name: headplane
        state: started
        restart: true
      become: true
