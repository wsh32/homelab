---
# Deploy the DNS stack (AdGuard Home + Headscale + Headplane + cloudflared) and
# bootstrap Headscale. Run before machamp VMs exist -- Authentik is not yet up.
# For OIDC injection into Headplane, run ansible/oidc.yml after infra.yml.
#
# Prerequisites:
#   - diglett-dns VM must be up and cloud-init must have completed
#   - /etc/headscale.env must exist (written by Terraform cloud-init)
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage:
#   ansible-playbook ansible/dns.yml

- name: Deploy DNS stack
  hosts: diglett-dns
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  pre_tasks:
    - name: Load local secrets file if present (ansible/secrets.yml -- gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

  roles:
    - role: dns

- name: Bootstrap Headscale
  hosts: diglett-dns
  gather_facts: false

  tasks:
    - name: Wait for Headscale to be ready
      ansible.builtin.wait_for:
        port: 443
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Create Headscale infra user
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users create infra
      failed_when: false  # idempotent: no-op if user already exists
      become: true

    - name: Get headscale user list
      community.docker.docker_container_exec:
        container: headscale
        command: headscale users list --output json
      register: users_result
      become: true

    - name: Parse infra user ID
      ansible.builtin.set_fact:
        headscale_user_id: "{{ (users_result.stdout | from_json) | selectattr('name', 'equalto', 'infra') | map(attribute='id') | first }}"

    - name: Check if tailscale auth key is cached on disk
      ansible.builtin.stat:
        path: /etc/tailscale-auth.key
      register: tailscale_auth_key_stat
      become: true

    - name: Read cached pre-auth key from disk
      ansible.builtin.slurp:
        src: /etc/tailscale-auth.key
      register: tailscale_auth_key_raw
      become: true
      when: tailscale_auth_key_stat.stat.exists

    - name: Check if cached pre-auth key is present and unexpired in headscale
      ansible.builtin.shell: |
        key=$(tr -d '\n' < /etc/tailscale-auth.key)
        docker exec headscale headscale preauthkeys list --output json | python3 -c "
        import json, sys
        from datetime import datetime, timezone
        keys = json.load(sys.stdin)
        key = sys.argv[1]
        # headscale redacts keys in list output (hskey-auth-prefix-***)
        # match by prefix: strip trailing *** and check if cached key starts with it
        match = next((k for k in keys if key.startswith(k['key'].replace('***', ''))), None)
        if not match:
            print('invalid')
            sys.exit(0)
        exp = match.get('expiration', '')
        if not exp:
            print('valid')
            sys.exit(0)
        if isinstance(exp, dict):
            exp_ts = exp.get('seconds', 0)
            if exp_ts == 0:
                print('valid')
                sys.exit(0)
            exp_dt = datetime.fromtimestamp(exp_ts, tz=timezone.utc)
        else:
            if exp.startswith('0001-'):
                print('valid')
                sys.exit(0)
            exp_dt = datetime.fromisoformat(exp.replace('Z', '+00:00'))
        now = datetime.now(timezone.utc)
        print('valid' if exp_dt > now else 'invalid')
        " "$key"
      args:
        executable: /bin/bash
      register: _key_validity_check
      changed_when: false
      become: true
      when: tailscale_auth_key_stat.stat.exists

    - name: Set cached key validity fact
      ansible.builtin.set_fact:
        _cached_key_valid: "{{ tailscale_auth_key_stat.stat.exists and (_key_validity_check.stdout | default('invalid')) == 'valid' }}"

    - name: Remove invalid cached pre-auth key
      ansible.builtin.file:
        path: /etc/tailscale-auth.key
        state: absent
      become: true
      when: tailscale_auth_key_stat.stat.exists and not _cached_key_valid

    - name: Generate reusable pre-auth key (no expiry)
      community.docker.docker_container_exec:
        container: headscale
        command: "headscale preauthkeys create --user infra --reusable --expiration 876000h --output json"
      register: preauthkey_result
      become: true
      when: not _cached_key_valid

    - name: Set pre-auth key fact (newly generated)
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ (preauthkey_result.stdout | from_json).key }}"
      when: not _cached_key_valid

    - name: Set pre-auth key fact (from cache)
      ansible.builtin.set_fact:
        headscale_preauth_key: "{{ tailscale_auth_key_raw.content | b64decode | trim }}"
      when: _cached_key_valid

    - name: Read headscale server URL
      ansible.builtin.slurp:
        src: /etc/headscale.env
      register: headscale_env_bootstrap
      become: true

    - name: Set headscale URL fact
      ansible.builtin.set_fact:
        headscale_server_url: "{{ headscale_env_bootstrap.content | b64decode | regex_search('(?m)^HEADSCALE_SERVER_URL=(.+)$', '\\1') | first }}"

    - name: Write tailscale auth key to disk (only when newly generated)
      ansible.builtin.copy:
        content: "{{ headscale_preauth_key }}"
        dest: /etc/tailscale-auth.key
        mode: "0600"
        owner: root
        group: root
      become: true
      when: not _cached_key_valid

    - name: Install tailscale-join-headscale systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscale-join-headscale.service
        mode: "0644"
        owner: root
        group: root
        content: |
          [Unit]
          Description=Join diglett-dns to headscale after headscale is ready
          After=docker.service
          Requires=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          TimeoutStartSec=300
          ExecStartPre=/bin/bash -c 'until nc -z localhost 443; do sleep 2; done'
          ExecStartPre=ethtool -K eth0 rx-udp-gro-forwarding on rx-gro-list off
          ExecStart=/bin/bash -c '. /etc/headscale.env && tailscale up --login-server=$HEADSCALE_SERVER_URL --auth-key=$(cat /etc/tailscale-auth.key) --advertise-exit-node --hostname=diglett-dns'

          [Install]
          WantedBy=multi-user.target
      become: true
      register: ts_service_installed

    - name: Reload systemd after service file change
      ansible.builtin.systemd:
        daemon_reload: true
      become: true
      when: ts_service_installed.changed

    - name: Restart tailscale-join-headscale to apply updated unit
      ansible.builtin.systemd:
        name: tailscale-join-headscale
        state: restarted
      become: true
      when: ts_service_installed.changed

    - name: Enable tailscale-join-headscale service
      ansible.builtin.systemd:
        name: tailscale-join-headscale
        enabled: true
      become: true

    - name: Wait for headplane to be ready
      ansible.builtin.wait_for:
        port: 3001
        host: "{{ ansible_host }}"
        timeout: 60

    - name: Check if headplane API key is already provisioned
      ansible.builtin.stat:
        path: /mnt/nas/docker/headplane/api.key
      register: headplane_api_key_stat

    - name: Read existing headplane API key from NFS
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headplane/api.key
      register: _existing_api_key_raw
      become: true
      when: headplane_api_key_stat.stat.exists

    - name: Validate existing API key against headscale
      community.docker.docker_container_exec:
        container: headscale
        command: headscale apikeys list --output json
      register: _apikeys_list
      become: true
      when: headplane_api_key_stat.stat.exists

    - name: Determine if stored API key is still valid
      ansible.builtin.set_fact:
        _api_key_valid: >-
          {{
            headplane_api_key_stat.stat.exists and
            (_apikeys_list.stdout | from_json
             | selectattr('prefix', 'in', (_existing_api_key_raw.content | b64decode | trim))
             | list | length > 0)
          }}

    - name: Generate headscale API key for headplane
      community.docker.docker_container_exec:
        container: headscale
        command: headscale apikeys create --expiration 0 --output json
      register: headplane_apikey_result
      become: true
      when: not _api_key_valid

    - name: Extract headscale API key from result
      ansible.builtin.set_fact:
        headplane_apikey: >-
          {{ (headplane_apikey_result.stdout | from_json).key
             if (headplane_apikey_result.stdout | from_json) is mapping
             else headplane_apikey_result.stdout | from_json }}
      when: not _api_key_valid

    - name: Write headscale API key to NFS
      ansible.builtin.copy:
        content: "{{ headplane_apikey }}"
        dest: /mnt/nas/docker/headplane/api.key
        mode: "0600"
      become: true
      when: not _api_key_valid

    - name: Read headscale API key from NFS
      ansible.builtin.slurp:
        src: /mnt/nas/docker/headplane/api.key
      register: headplane_api_key_nfs
      become: true

    - name: Inject headscale API key into headplane config
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/homelab/services/diglett-dns/headplane/config.yaml
        regexp: '^\s+api_key:'
        line: "  api_key: \"{{ headplane_api_key_nfs.content | b64decode | trim }}\""
      register: api_key_injected

    - name: Restart headplane to pick up API key
      community.docker.docker_container:
        name: headplane
        state: started
        restart: true
      become: true
      when: api_key_injected.changed

    - name: Display headplane login key for Vaultwarden
      ansible.builtin.debug:
        msg: "headplane login -- navigate to :3001/admin and enter this API key: {{ headplane_api_key_nfs.content | b64decode | trim }}"
      when: not _api_key_valid


