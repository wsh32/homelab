---
# Deploy the web stack (tenderloin.ai static site + cloudflared tunnel).
#
# Prerequisites:
#   - diglett-web VM must be up and cloud-init must have completed
#   - terraform/diglett must have been applied (writes outs/secrets.yml with tunnel token)
#
# Usage:
#   ansible-playbook ansible/web.yml

- name: Deploy web stack
  hosts: diglett-web
  gather_facts: true

  pre_tasks:
    - name: Load Terraform outputs if present (terraform/diglett/outs/secrets.yml)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../terraform/diglett/outs/secrets.yml"
      failed_when: false

    - name: Load local secrets file if present (ansible/secrets.yml -- gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

  roles:
    - role: web
