---
# Install Tailscale on physical nodes and join the network.
# Run once during initial bootstrap, before Terraform.
#
# Usage: ansible-playbook ansible/tailscale.yml --ask-become-pass
#
# Requires: TAILSCALE_AUTH_KEY env var set, or pass as extra var:
#   ansible-playbook ansible/tailscale.yml -e tailscale_auth_key=tskey-auth-...

- name: Install Tailscale on physical nodes
  hosts: physical
  gather_facts: true

  vars:
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') }}"

  tasks:
    - name: Require Tailscale auth key
      ansible.builtin.fail:
        msg: "Set TAILSCALE_AUTH_KEY env var or pass -e tailscale_auth_key=..."
      when: tailscale_auth_key == ""

    - name: Install Tailscale via official install script
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com/install.sh | sh
        creates: /usr/bin/tailscale
      become: true

    - name: Enable tailscaled service
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true
      become: true

    - name: Join Tailscale network
      ansible.builtin.command:
        cmd: >
          tailscale up
          --authkey={{ tailscale_auth_key }}
          --hostname={{ inventory_hostname }}
          --accept-routes=false
      become: true
      register: ts_up
      changed_when: ts_up.rc == 0 and "already authenticated" not in ts_up.stderr
      failed_when: ts_up.rc != 0 and "already authenticated" not in ts_up.stderr

    - name: Show Tailscale status
      ansible.builtin.command: tailscale status
      become: true
      register: ts_status
      changed_when: false

    - name: Print Tailscale status
      ansible.builtin.debug:
        msg: "{{ ts_status.stdout_lines }}"
