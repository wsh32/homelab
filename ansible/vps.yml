---
# Configure the DigitalOcean VPS.
# Run from the operator laptop after Terraform provisions the droplet:
#   ansible-playbook ansible/vps.yml -e vps_ip=<ip>

- name: Configure VPS
  hosts: vps
  gather_facts: true
  become: true

  tasks:
    - name: Sync repo to VPS
      ansible.builtin.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: /opt/homelab/
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=terraform"
          - "--exclude='*.tfvars'"
          - "--exclude='*.tfstate'"

  roles:
    - role: base
    - role: docker
    - role: headscale
