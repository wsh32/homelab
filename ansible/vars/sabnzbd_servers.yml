# Usenet news server providers for SABnzbd.
# Each entry's password_var and username_var must be set in secrets.yml
# and will be seeded into Infisical by arr-init.yml.
#
# To add a provider: append an entry here and add the corresponding
# username_var/password_var values to ansible/secrets.yml.
#
# Fields:
#   name          -- display name in SABnzbd
#   host          -- NNTP hostname
#   port          -- NNTP port (563 = SSL, 119 = plain)
#   ssl           -- 1 for SSL, 0 for plain
#   connections   -- max simultaneous connections (check your plan)
#   priority      -- 0 = highest; increase for backup providers
#   username_var  -- secrets.yml / Infisical key for the username
#   password_var  -- secrets.yml / Infisical key for the password

sabnzbd_servers:
  - name: newshosting
    host: news.newshosting.com
    port: 563
    ssl: 1
    connections: 30
    priority: 0
    username_var: NEWSHOSTING_USERNAME
    password_var: NEWSHOSTING_PASSWORD
