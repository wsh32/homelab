# Jellyfin media libraries to create on first run.
# To add a library: append an entry here -- no code changes needed.
#
# Fields:
#   name            -- display name in Jellyfin
#   collection_type -- jellyfin type: movies, tvshows, books, music, photos, homevideos, boxsets
#   path            -- path inside the Jellyfin container (/data maps to /mnt/nas/media)

jellyfin_libraries:
  - name: Movies
    collection_type: movies
    path: /data/movies

  - name: TV Shows
    collection_type: tvshows
    path: /data/tv

  - name: Books
    collection_type: books
    path: /data/books
