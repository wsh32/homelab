# Authentik groups and application access bindings.
#
# Both groups are listed explicitly on user-tier apps rather than relying on
# Authentik's group hierarchy to propagate admins → users access bindings.
#
# To add a group: add an entry under authentik_groups.
# To add access: add the slug + groups to authentik_app_bindings.
# Apps not yet in Authentik are silently skipped -- list them here ahead of
# their OIDC wiring and the binding is created automatically when it lands.

authentik_groups:
  - name: users
  - name: admins
  - name: game-admins

# slug must match the Authentik application slug.
# groups is a list -- an app can be bound to multiple groups.
authentik_app_bindings:
  # infra tier -- admins only
  - slug: headplane
    groups: [admins]
  - slug: grafana
    groups: [admins]
  - slug: prometheus
    groups: [admins]
  - slug: n8n
    groups: [admins]

  # arr/media services -- admins only (web-facing management UIs)
  - slug: prowlarr
    groups: [admins]
  - slug: radarr
    groups: [admins]
  - slug: sonarr
    groups: [admins]
  - slug: bazarr
    groups: [admins]
  - slug: qbittorrent
    groups: [admins]

  # game server -- game-admins and admins
  - slug: pelican
    groups: [game-admins, admins]

  # user tier -- all authenticated users
  - slug: jellyfin
    groups: [users, admins]
  - slug: seerr
    groups: [users, admins]
  - slug: photoprism
    groups: [users, admins]
  - slug: calibre-web
    groups: [users, admins]
  - slug: homepage
    groups: [users, admins]
