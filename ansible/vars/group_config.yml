# Authentik groups and application access bindings.
#
# Groups: define children on a group to have those children inherit its access.
#   In Authentik, children inherit FROM their parent — so listing admins as a
#   child of users means admins members also get access to all user-tier apps.
#
# To add a group: add an entry under authentik_groups.
# To add access: add the slug + groups to authentik_app_bindings.
# Apps not yet in Authentik are silently skipped — list them here ahead of
# their OIDC wiring and the binding is created automatically when it lands.

authentik_groups:
  - name: users
    children:
      - admins   # admins inherit user-tier app access
  - name: admins

# slug must match the Authentik application slug.
# groups is a list — an app can be bound to multiple groups.
authentik_app_bindings:
  # infra tier — admins only
  - slug: headplane
    groups: [admins]
  - slug: grafana
    groups: [admins]
  - slug: prometheus
    groups: [admins]
  - slug: n8n
    groups: [admins]

  # user tier — all authenticated users
  - slug: jellyfin
    groups: [users]
  - slug: photoprism
    groups: [users]
  - slug: calibre-web
    groups: [users]
  - slug: homepage
    groups: [users]
