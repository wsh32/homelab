# Newznab-compatible indexers to register in Prowlarr.
# Each entry's api_key_var must be set in secrets.yml and will be seeded
# into Infisical by arr-init.yml before the indexer is added.
#
# To add an indexer: append an entry here and add the corresponding
# api_key_var value to ansible/secrets.yml.

prowlarr_indexers:
  - name: NZBPlanet
    url: https://api.nzbplanet.net
    api_key_var: NZBPLANET_API_KEY
    categories: [2000, 2010, 2020, 2030, 2040, 2045, 2050, 5000, 5010, 5020, 5030, 5040, 5045, 5050, 5060, 5070, 5080, 5090]
