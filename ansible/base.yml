---
# Apply base hardening and configuration to all Ubuntu VMs.
# Run after Terraform provisions VMs and cloud-init completes.
#
# Usage: ansible-playbook ansible/base.yml
#        ansible-playbook ansible/base.yml --limit diglett_vms

- name: Base configuration for all VMs
  hosts: vms
  gather_facts: true

  roles:
    - role: base
    - role: docker

  tasks:
    - name: Write udev rule to name bridge NIC eth1
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/70-bridge-nic.rules
        owner: root
        group: root
        mode: "0644"
        content: |
          SUBSYSTEM=="net", ACTION=="add", KERNELS=="*:13.0", NAME="eth1"
      become: true
      when: bridge_ip is defined

    - name: Rename bridge NIC to eth1 if present under predictable name
      ansible.builtin.shell: |
        iface=$(ls /sys/bus/pci/devices/ | grep ':13\.0$' | xargs -I{} sh -c 'ls /sys/bus/pci/devices/{}/net/ 2>/dev/null' | head -1)
        if [ -n "$iface" ] && [ "$iface" != "eth1" ]; then
          ip link set "$iface" name eth1
        fi
      become: true
      when:
        - bridge_ip is defined
        - "'eth1' not in ansible_facts.interfaces"
      changed_when: true

    - name: Configure bridge NIC (eth1) via netplan
      ansible.builtin.copy:
        dest: /etc/netplan/51-bridge.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          network:
            version: 2
            ethernets:
              eth1:
                dhcp4: false
                addresses: [{{ bridge_ip }}/24]
      become: true
      when: bridge_ip is defined
      notify: Apply netplan

  handlers:
    - name: Apply netplan
      ansible.builtin.command: netplan apply
      become: true
      async: 30
      poll: 0
