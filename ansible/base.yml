---
# Apply base hardening and configuration to all Ubuntu VMs.
# Run after Terraform provisions VMs and cloud-init completes.
#
# Usage: ansible-playbook ansible/base.yml
#        ansible-playbook ansible/base.yml --limit diglett_vms

- name: Base configuration for all VMs
  hosts: vms
  gather_facts: true

  roles:
    - role: base
    - role: docker

  tasks:
    - name: Find secondary NIC MAC address
      ansible.builtin.shell: |
        primary=$(ip route show default | awk '{print $5; exit}')
        iface=$(ls /sys/bus/virtio/drivers/virtio_net/ | xargs -I{} sh -c 'ls /sys/bus/virtio/drivers/virtio_net/{}/net/ 2>/dev/null' | grep -v "^$primary$" | head -1)
        cat /sys/class/net/$iface/address
      become: true
      register: _bridge_nic_mac
      changed_when: false
      when: bridge_ip is defined

    - name: Configure bridge NIC via netplan (match by MAC, set-name eth1)
      ansible.builtin.copy:
        dest: /etc/netplan/51-bridge.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          network:
            version: 2
            ethernets:
              bridge-nic:
                match:
                  macaddress: {{ _bridge_nic_mac.stdout | trim }}
                set-name: eth1
                dhcp4: false
                addresses: [{{ bridge_ip }}/24]
      become: true
      when: bridge_ip is defined
      notify: Apply netplan

  handlers:
    - name: Apply netplan
      ansible.builtin.command: netplan apply
      become: true
      async: 30
      poll: 0
