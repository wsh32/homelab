---
# Deploy the machamp-games stack (Pelican Panel + Wings + PostgreSQL).
#
# Prerequisites:
#   - machamp-games VM must be up and cloud-init must have completed
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#   - Run ansible-playbook ansible/infra.yml first (writes pelican-oidc.env to NFS)
#
# Usage:
#   ansible-playbook ansible/games.yml

- name: Deploy games stack
  hosts: machamp-games
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  pre_tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

  tasks:
    - name: Create services directory
      ansible.builtin.file:
        path: /home/{{ ansible_user }}/homelab/services/machamp-games
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      become: true

    - name: Sync services/machamp-games/ from deploy VM
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../services/machamp-games/"
        dest: /home/{{ ansible_user }}/homelab/services/machamp-games/
        delete: true
        recursive: true
        rsync_opts:
          - "--chown={{ ansible_user }}:{{ ansible_user }}"
          - "--exclude=.env"

    - name: Mount NFS share
      ansible.builtin.include_tasks: tasks/nfs-mount.yml
      vars:
        nfs_mount_path: /mnt/nas/docker
        nfs_source_path: "{{ nas_ip }}:/mnt/apps/docker"

    - name: Create Pelican NFS directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /mnt/nas/docker/pelican/panel
        - /mnt/nas/docker/pelican/wings
        - /mnt/nas/docker/pelican/postgres
      become: true

    - name: Generate PostgreSQL password if not present in homelab.env
      ansible.builtin.shell: |
        grep -q '^POSTGRES_PASSWORD=' /etc/homelab.env || \
          echo "POSTGRES_PASSWORD=$(openssl rand -hex 32)" >> /etc/homelab.env
      become: true
      changed_when: true

    - name: Start Pelican stack
      community.docker.docker_compose_v2:
        project_src: /home/{{ ansible_user }}/homelab/services/machamp-games
        state: present
        pull: always
      become: true

    - name: Wait for Pelican Panel to be healthy
      ansible.builtin.uri:
        url: "http://localhost:80/up"
        status_code: 200
      register: _pelican_health
      retries: 60
      delay: 5
      until: _pelican_health.status == 200
      changed_when: false
