---
# Deploy the machamp-infra stack (Infisical + Vaultwarden + Authentik + Litestream)
# and bootstrap Infisical on first run.
# Idempotent: safe to re-run; bootstrap is skipped after first successful run.
#
# Prerequisites:
#   - machamp-infra VM must be up and cloud-init must have completed
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#
# Usage (first run):
#   ansible-playbook ansible/infra.yml
#   (set infisical_admin_password in ansible/secrets.yml, or pass
#    INFISICAL_ADMIN_PASSWORD=<pass> as an env var)
#
# Usage (subsequent runs — bootstrap skipped automatically):
#   ansible-playbook ansible/infra.yml

- name: Deploy infra stack
  hosts: machamp-infra
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  roles:
    - role: infra

- name: Bootstrap Infisical
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false
      no_log: true

    - name: Resolve admin password into a fact
      ansible.builtin.set_fact:
        _infisical_password: "{{ infisical_admin_password | default(lookup('env', 'INFISICAL_ADMIN_PASSWORD')) }}"
      no_log: true

    - name: Check if Infisical is already bootstrapped
      ansible.builtin.stat:
        path: /var/lib/infisical/.bootstrapped
      delegate_to: machamp-infra
      become: true
      register: bootstrap_done

    - name: Fail if no admin password available (needed only for first bootstrap)
      ansible.builtin.fail:
        msg: >
          Set infisical_admin_password in ansible/secrets.yml
          or pass INFISICAL_ADMIN_PASSWORD=<pass> as an env var.
      when: not bootstrap_done.stat.exists and _infisical_password == ''

    - name: Bootstrap Infisical via docker exec (CLI is inside the container)
      ansible.builtin.shell: |
        docker exec infisical infisical bootstrap \
          --domain http://localhost:8080 \
          --email admin@homelab.local \
          --password "{{ _infisical_password }}" \
          --organization homelab \
          --ignore-if-bootstrapped \
          --output json
      delegate_to: machamp-infra
      become: true
      register: bootstrap_result
      no_log: true
      when: not bootstrap_done.stat.exists

    - name: Display bootstrap output (add workspace_id / client_id / client_secret to terraform.tfvars)
      ansible.builtin.debug:
        msg: "{{ bootstrap_result.stdout_lines }}"
      when: not bootstrap_done.stat.exists

    - name: Write bootstrap marker on machamp-infra
      ansible.builtin.file:
        path: /var/lib/infisical/.bootstrapped
        state: touch
        mode: "0600"
        owner: root
        group: root
      delegate_to: machamp-infra
      become: true
      when: not bootstrap_done.stat.exists
