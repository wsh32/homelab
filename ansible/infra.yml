---
# Deploy the machamp-infra stack (Infisical + Vaultwarden + Authentik + Litestream)
# and bootstrap Infisical with an admin account.
#
# Bootstrap is always attempted — --ignore-if-bootstrapped makes it idempotent.
# This avoids the sentinel-outlives-data problem (e.g. postgres wiped after a
# failed deploy) that would otherwise prevent re-seeding.
#
# Prerequisites:
#   - machamp-infra VM must be up and cloud-init must have completed
#   - Alakazam NFS must be reachable at 192.168.0.4:/mnt/apps/docker
#   - ansible/secrets.yml must contain infisical_admin_email and infisical_admin_password
#
# Usage (first run or re-run):
#   ansible-playbook ansible/infra.yml
#   ansible-playbook ansible/site.yml --limit machamp-infra

- name: Deploy infra stack
  hosts: machamp-infra
  gather_facts: true

  vars:
    network: "{{ lookup('file', playbook_dir + '/../network.yml') | from_yaml }}"
    nas_ip: "{{ network.nodes.alakazam.ip }}"

  pre_tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

    - name: Load group config (Authentik app→group bindings)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/group_config.yml"

  roles:
    - role: infra

# ── Phase 1: Bootstrap Infisical ──────────────────────────────────────────────
- name: Bootstrap Infisical
  hosts: machamp-infra
  gather_facts: false

  tasks:
    - name: Load local secrets file if present (ansible/secrets.yml — gitignored)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

    - name: Resolve credentials into facts
      ansible.builtin.set_fact:
        _admin_email: "{{ infisical_admin_email | default('admin@homelab.local') }}"
        _admin_password: "{{ infisical_admin_password | default(lookup('env', 'INFISICAL_ADMIN_PASSWORD')) }}"

    - name: Fail if no admin password available
      ansible.builtin.fail:
        msg: >
          Set infisical_admin_password in ansible/secrets.yml
          or pass INFISICAL_ADMIN_PASSWORD=<pass> as an env var.
      when: _admin_password == ''

    - name: Ensure /var/lib/infisical exists
      ansible.builtin.file:
        path: /var/lib/infisical
        state: directory
        mode: "0700"
        owner: root
        group: root
      become: true

    - name: Bootstrap Infisical via docker exec
      ansible.builtin.shell: |
        docker exec infisical infisical bootstrap \
          --domain http://localhost:8080 \
          --email "{{ _admin_email }}" \
          --password "{{ _admin_password }}" \
          --organization teamrocket \
          --ignore-if-bootstrapped \
          --output json
      become: true
      register: bootstrap_result
      changed_when: "'already bootstrapped' not in bootstrap_result.stdout"

# ── Phase 3: Seed PIA credentials from Vaultwarden ───────────────────────────
#
# Reads PIA_USERNAME and PIA_PASSWORD from the Vaultwarden service account on
# machamp-infra (created by the infra role) and pushes them to Infisical.
# Requires:
#   - infra role to have run (service account created, bw snap installed)
#   - Operator to have added a login item named "PIA VPN" to the service
#     account's vault (infra-svc@homelab.local)
#   - pia_vault_item in secrets.yml if the item name differs from "PIA VPN"
#
# Skipped automatically if PIA_USERNAME is already populated in Infisical.
- name: Seed PIA credentials from Vaultwarden via machamp-infra service account
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Load secrets.yml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/secrets.yml"
      failed_when: false

    - name: Skip play if machine identity not configured
      ansible.builtin.meta: end_play
      when: >
        (infisical_client_id | default('')) in ['', 'REPLACE_ME'] or
        (infisical_client_secret | default('')) in ['', 'REPLACE_ME']

    - name: Resolve Infisical settings
      ansible.builtin.set_fact:
        _infisical_host: "{{ infisical_host | default('http://192.168.0.32:8080') }}"
        _client_id: "{{ infisical_client_id }}"
        _client_secret: "{{ infisical_client_secret }}"
        _project_id: "{{ infisical_project_id }}"
        _environment: "{{ infisical_environment | default('prod') }}"
        _pia_vault_item: "{{ pia_vault_item | default('PIA VPN') }}"

    - name: Get machine identity access token
      ansible.builtin.uri:
        url: "{{ _infisical_host }}/api/v1/auth/universal-auth/login"
        method: POST
        body_format: json
        body:
          clientId: "{{ _client_id }}"
          clientSecret: "{{ _client_secret }}"
        status_code: 200
      register: _ua_login
      no_log: true

    - name: Check if PIA_USERNAME already set in Infisical
      ansible.builtin.uri:
        url: "{{ _infisical_host }}/api/v3/secrets/raw/PIA_USERNAME"
        headers:
          Authorization: "Bearer {{ _ua_login.json.accessToken }}"
        body_format: json
        body:
          workspaceId: "{{ _project_id }}"
          environment: "{{ _environment }}"
          secretPath: /
        status_code: [200, 404]
      register: _pia_check
      no_log: true

    - name: Skip play if PIA_USERNAME already populated in Infisical
      ansible.builtin.meta: end_play
      when: >
        _pia_check.status == 200 and
        (_pia_check.json.secret.secretValue | default('')) != ''

    - name: Read Vaultwarden service account credentials from machamp-infra
      ansible.builtin.slurp:
        src: /etc/homelab.env
      delegate_to: machamp-infra
      become: true
      register: _homelab_env_raw

    - name: Parse service account credentials
      ansible.builtin.set_fact:
        _vw_svc_email: >-
          {{ (_homelab_env_raw.content | b64decode)
             | regex_search('(?m)^VAULTWARDEN_SVC_EMAIL=(.+)', '\\1')
             | first | default('') }}
        _vw_svc_password: >-
          {{ (_homelab_env_raw.content | b64decode)
             | regex_search('(?m)^VAULTWARDEN_SVC_PASSWORD=(.+)', '\\1')
             | first | default('') }}
      no_log: true

    - name: Fail if service account credentials not found in homelab.env
      ansible.builtin.fail:
        msg: >
          VAULTWARDEN_SVC_EMAIL or VAULTWARDEN_SVC_PASSWORD not found in
          /etc/homelab.env on machamp-infra. Run ansible-playbook ansible/infra.yml first.
      when: _vw_svc_email == '' or _vw_svc_password == ''

    - name: Clear any existing bw session on machamp-infra
      ansible.builtin.command: bw logout
      delegate_to: machamp-infra
      failed_when: false
      changed_when: false

    - name: Configure bw server to vault.home on machamp-infra
      ansible.builtin.command: bw config server https://vault.home
      delegate_to: machamp-infra
      changed_when: false

    - name: Login to Vaultwarden as service account on machamp-infra
      ansible.builtin.shell:
        cmd: "bw login {{ _vw_svc_email }} {{ _vw_svc_password }} --raw --nointeraction"
      delegate_to: machamp-infra
      register: _bw_session
      changed_when: false
      no_log: true

    - name: Retrieve PIA username from Vaultwarden
      ansible.builtin.command:
        cmd: "bw get username {{ _pia_vault_item | quote }}"
      delegate_to: machamp-infra
      environment:
        BW_SESSION: "{{ _bw_session.stdout }}"
      register: _pia_username
      changed_when: false
      no_log: true

    - name: Retrieve PIA password from Vaultwarden
      ansible.builtin.command:
        cmd: "bw get password {{ _pia_vault_item | quote }}"
      delegate_to: machamp-infra
      environment:
        BW_SESSION: "{{ _bw_session.stdout }}"
      register: _pia_password
      changed_when: false
      no_log: true

    - name: Logout from Vaultwarden on machamp-infra
      ansible.builtin.command: bw logout
      delegate_to: machamp-infra
      environment:
        BW_SESSION: "{{ _bw_session.stdout }}"
      changed_when: false
      failed_when: false

    - name: Push PIA credentials to Infisical
      ansible.builtin.command:
        cmd: >
          infisical secrets set
          "PIA_USERNAME={{ _pia_username.stdout }}"
          "PIA_PASSWORD={{ _pia_password.stdout }}"
          --projectId "{{ _project_id }}"
          --env "{{ _environment }}"
          --domain "{{ _infisical_host }}"
          --token "{{ _ua_login.json.accessToken }}"
      changed_when: true
      no_log: true

    - name: Report PIA credentials seeded
      ansible.builtin.debug:
        msg: >
          PIA credentials seeded from Vaultwarden item '{{ _pia_vault_item }}'
          (service account: {{ _vw_svc_email }}) into Infisical.
