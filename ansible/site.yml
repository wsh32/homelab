---
# Run all playbooks in dependency order.
#
# First-run prerequisites (not handled here):
#   - terraform apply diglett  (diglett-dns VM must exist before dns.yml)
#   - terraform apply machamp  (machamp VMs must exist before infra.yml)
#   - ansible/secrets.yml must exist with infisical_admin_password set
#     (copy ansible/secrets.yml.example and fill in REPLACE_ME values)
#
# Subsequent runs are fully idempotent.
#
# Excludes tailscale.yml — bootstrap-only, run manually with TAILSCALE_AUTH_KEY.
- import_playbook: network.yml
- import_playbook: physical.yml
- import_playbook: base.yml
- import_playbook: dns.yml
- import_playbook: infra.yml
- import_playbook: services.yml
- import_playbook: gpu.yml
- import_playbook: games.yml
- import_playbook: media.yml
- import_playbook: arr-init.yml
- import_playbook: oidc.yml
- import_playbook: deploy-vm.yml
- import_playbook: dev.yml
- import_playbook: headscale.yml
