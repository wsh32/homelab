[defaults]
inventory          = inventory/homelab.yml
remote_user        = ubuntu
private_key_file   = ~/.ssh/id_ed25519
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = default
result_format      = yaml
# %(here)s expands to the directory containing ansible.cfg
inventory_plugins  = %(here)s/plugins/inventory

[inventory]
enable_plugins     = homelab, host_list, auto

[ssh_connection]
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s
