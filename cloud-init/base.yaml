#cloud-config
# Base cloud-init template — applied to all VMs.
# The proxmox-vm Terraform module merges this with per-VM config.

package_update: true
package_upgrade: true

packages:
  - qemu-guest-agent
  - curl
  - vim
  - htop
  - unattended-upgrades

runcmd:
  - systemctl enable --now qemu-guest-agent
  # Install Tailscale — auth key injected by Terraform
  - curl -fsSL https://tailscale.com/install.sh | sh

timezone: America/Los_Angeles

ntp:
  enabled: true
  servers:
    - time.cloudflare.com
