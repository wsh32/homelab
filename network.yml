# network.yml -- single source of truth for all static IP assignments.
#
# Terraform reads this file directly via yamldecode().
# Ansible inventory is generated from this file and ansible/group_config.yml
# by the homelab inventory plugin (ansible/inventory/homelab.py).
#
# IP layout per location:
#   .1       gateway
#   .2       primary DNS VM (AdGuard Home -- special-cased outside VM range)
#   .3       reserved (future backup DNS)
#   .4–.19   physical nodes
#   .20–.29  Diglett VMs (VM IDs 200–299)
#   .30–.49  Machamp VMs (VM IDs 100–199)
#   .100+    DHCP (router managed)
#
# Tailscale IP layout (100.64.0.0/10):
#   100.64.0.x   personal devices (dynamic, assigned by headscale)
#   100.64.N.x   location N homelab devices (static, last octet matches LAN IP)
#                N = tailscale_subnet_index for the location (bryant=1, torrance=2, ...)
#
# Tailscale hosted tailnet (physical Proxmox nodes):
#   Physical nodes (diglett, machamp, geodude) run Tailscale hosted (not Headscale).
#   They advertise their vm_bridge_subnet as a subnet route, giving Tailscale
#   devices access to VMs via the internal bridge (vmbr1).
#   vm_bridge_subnet: the /24 advertised; vm_bridge_ip: the node's address on that bridge.

# MagicDNS domain for the hosted Tailscale tailnet (Settings > DNS in Tailscale admin).
# FQDNs for physical nodes are <hostname>.<tailscale_hosted_domain>.
tailscale_hosted_domain: corgi-census.ts.net

locations:
  bryant:
    tailscale_domain: wsh
    tailscale_subnet_index: 1
    gateway: 192.168.0.1
    subnet_prefix: 24
    dns:
      primary: 192.168.0.2   # diglett-dns (AdGuard Home)
      fallback: 8.8.8.8
    traefik_vm: diglett-infra

    nodes:
      alakazam:
        ip: 192.168.0.4
        type: nas
        os: truenas
        nfs_exports:
          docker: /mnt/apps/docker
          media: /mnt/pool/media
          photos: /mnt/pool/photos

      alakazam-deploy:
        ip: 192.168.0.7
        tailscale_ip: 100.64.1.7
        type: other
        ansible_user: ubuntu

      diglett:
        ip: 192.168.0.6
        tailscale_ip: 100.64.1.6
        type: proxmox
        ansible_user: root
        bridge_port: nic0  # Proxmox renames NICs to nic0, nic1, etc. on UM790
        vm_bridge_subnet: "10.0.1.0/24"
        vm_bridge_ip: "10.0.1.1"
        vms:
          diglett-dns:
            ip: 192.168.0.2
            tailscale_ip: 100.64.1.2
            vm_id: 200
            vm_roles: [services]
            tailscale_exit_node: true
            services:
              - name: adguardhome
                hostname: adguard
                port: 3000       # network_mode: host; host port == container port
                nfs_data: docker/adguardhome
                authentik: none
              - name: headscale
                port: 443
                nfs_data: docker/headscale
                authentik: oidc
                traefik: false   # headscale uses its own TLS, not Traefik
              - name: headplane
                port: 3000
                host_port: 3001  # container 3000 mapped to host 3001
                nfs_data: docker/headplane
                authentik: oidc
              - name: cloudflare-ddns
                authentik: none
                traefik: false
          diglett-infra:
            ip: 192.168.0.20
            tailscale_ip: 100.64.1.20
            vm_id: 201
            vm_roles: [services]
            nfs_mounts:
              - export: docker
                mount: /mnt/nas/docker
            services:
              - name: traefik
                port: 80
                authentik: none
                traefik: false   # traefik itself; co-located services use Docker labels
              - name: step-ca
                hostname: ca
                port: 80         # ca-page container serves the UI on port 80
                nfs_data: docker/step-ca
                authentik: none
              - name: postgres
                port: 5432
                authentik: none
                traefik: false
              - name: infisical
                port: 8080
                nfs_data: docker/infisical-backups
                authentik: none
              - name: vaultwarden
                hostname: vault
                port: 80
                authentik: none
              - name: authentik
                hostname: auth
                port: 9000
                nfs_data: docker/authentik
                authentik: none
              - name: cloudflared
                authentik: none
                traefik: false
          diglett-haos:
            ip: 192.168.0.21
            vm_id: 202
            ansible_managed: false  # HAOS -- no SSH access via Ansible

      machamp:
        ip: 192.168.0.5
        tailscale_ip: 100.64.1.5
        type: proxmox
        ansible_user: root
        bridge_port: nic0
        vm_bridge_subnet: "10.0.2.0/24"
        vm_bridge_ip: "10.0.2.1"
        pci_mappings:
          - id: quadro-p2200
            path: "0000:41:00.0"
            description: "Quadro P2200 GPU"
        vms:
          machamp-media:
            ip: 192.168.0.30
            tailscale_ip: 100.64.1.30
            vm_id: 100
            vm_roles: [media, gpu]
            pci_passthrough: [quadro-p2200]  # references pci_mappings id on parent node
            nfs_mounts:
              - export: docker
                mount: /mnt/nas/docker
              - export: media
                mount: /mnt/nas/media
              - export: photos
                mount: /mnt/nas/photos
            services:
              - name: jellyfin
                port: 8096
                nfs_data: docker/jellyfin
                authentik: oidc
              - name: prowlarr
                port: 9696
                nfs_data: docker/prowlarr
                authentik: proxy
              - name: radarr
                port: 7878
                nfs_data: docker/radarr
                authentik: proxy
              - name: sonarr
                port: 8989
                nfs_data: docker/sonarr
                authentik: proxy
              - name: bazarr
                port: 6767
                nfs_data: docker/bazarr
                authentik: proxy
              - name: qbittorrent
                port: 8080
                nfs_data: docker/qbittorrent
                authentik: proxy
              - name: gluetun
                authentik: none
                traefik: false
              - name: sabnzbd
                port: 8080
                host_port: 8085  # container 8080 mapped to host 8085
                nfs_data: docker/sabnzbd
                authentik: proxy
              - name: seerr
                port: 5055
                nfs_data: docker/seerr
                authentik: oidc
              - name: unpackerr
                authentik: none
                traefik: false
              - name: photoprism
                hostname: photos
                port: 2342
                nfs_data: docker/photoprism
                authentik: none
              - name: calibre-web
                hostname: books
                port: 8083
                nfs_data: docker/calibre-web
                authentik: none
              - name: n8n
                port: 5678
                nfs_data: docker/n8n
                authentik: none
              - name: couchdb
                port: 5984
                nfs_data: docker/couchdb
                authentik: none
              - name: quartz
                hostname: notes
                port: 8080
                nfs_data: docker/quartz
                authentik: none
              - name: homepage
                hostname: home
                port: 3000
                host_port: 3001  # grafana owns host port 3000
                nfs_data: docker/homepage
                authentik: none
              - name: prometheus
                port: 9090
                nfs_data: docker/prometheus
                authentik: none
              - name: grafana
                port: 3000
                nfs_data: docker/grafana
                authentik: none
          machamp-dev:
            ip: 192.168.0.31
            tailscale_ip: 100.64.1.31
            vm_id: 101
            vm_roles: [dev]

  geodude:
    # Offsite location. Physical node connects via Tailscale hosted tailnet;
    # ansible_host is set to the MagicDNS hostname (connect_via_tailscale: true).
    tailscale_domain: wsh
    tailscale_subnet_index: 3   # Headscale IPs: 100.64.3.x (last octet = VM IP last octet)
    gateway: 192.168.1.1
    subnet_prefix: 24
    dns:
      primary: 192.168.1.1
      fallback: 8.8.8.8

    nodes:
      geodude:
        tailscale_ip: 100.64.1.2   # Tailscale hosted IP -- used as ansible_host
        type: proxmox
        ansible_user: root
        bridge_port: nic0
        dhcp: true             # LAN IP assigned by DHCP; reached via Tailscale only
        connect_via_tailscale: true  # ansible_host = tailscale_ip; no LAN route
        tailscale_ssh: true
        disable_nic_offload: true
        vm_bridge_subnet: "10.0.3.0/24"
        vm_bridge_ip: "10.0.3.1"
        vms:
          geodude-dev:
            ip: 192.168.1.20
            vm_id: 300
            vm_roles: [dev]
