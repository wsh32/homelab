# network.yml — single source of truth for all static IP assignments.
#
# Terraform reads this file directly via yamldecode().
# Ansible inventory is generated from this file and ansible/group_config.yml
# by the homelab inventory plugin (ansible/plugins/inventory/homelab.py).
#
# IP layout:
#   .1       gateway (Eero)
#   .2       diglett-dns VM (AdGuard Home — primary DNS for all VMs)
#   .3       reserved (future backup DNS)
#   .4–.19   physical nodes
#   .20      alakazam-deploy (TrueNAS KVM, out-of-band — not Terraform-managed)
#   .21–.29  Diglett VMs (VM IDs 200–299)
#   .30–.49  Machamp VMs (VM IDs 100–199)
#   .100+    DHCP (Eero managed)

gateway: 192.168.0.1
subnet_prefix: 24

# DNS servers injected into all VMs via cloud-init
dns:
  - 192.168.0.2   # diglett-dns (AdGuard Home) — primary
  - 8.8.8.8       # fallback if diglett-dns is down

# All nodes — physical and compute.
#
# Fields on every node:
#   ip:              LAN IP address
#   type:            Ansible physical group (proxmox | nas | other)
#   os:              OS family — nodes with os=truenas are excluded from Ansible inventory
#   ansible_user:    SSH user override (default: ubuntu)
#
# Additional fields for Proxmox nodes:
#   bridge_port:     NIC bridged to vmbr0. Verify: ssh root@<ip> ip link show
#   vms:             VMs provisioned on this node
#
# VM fields:
#   ip:              LAN IP (static, set via cloud-init)
#   vm_id:           Proxmox VM ID
#   ansible_managed: Set false to exclude from Ansible inventory (default: true)
#   vm_roles:        List of Ansible groups this VM belongs to (e.g. [services], [dev])

nodes:
  alakazam:
    ip: 192.168.0.4
    type: nas
    os: truenas

  alakazam-deploy:
    ip: 192.168.0.20
    type: other
    ansible_user: ubuntu

  ditto:
    ip: 192.168.0.8
    type: nas
    os: truenas  # offsite; only reachable via Tailscale

  orangepi:
    ip: 192.168.0.7
    type: other
    ansible_user: root

  diglett:
    ip: 192.168.0.6
    type: proxmox
    ansible_user: root
    bridge_port: nic0
    vms:
      diglett-dns:
        ip: 192.168.0.2
        vm_id: 200
        vm_roles: [services]
      diglett-infisical:
        ip: 192.168.0.21
        vm_id: 201
        vm_roles: [services]
      diglett-haos:
        ip: 192.168.0.22
        vm_id: 202
        ansible_managed: false  # HAOS — no SSH access via Ansible

  machamp:
    ip: 192.168.0.5
    type: proxmox
    ansible_user: root
    bridge_port: nic1
    vms:
      machamp-ollama:
        ip: 192.168.0.30
        vm_id: 100
        vm_roles: [services]
      machamp-services:
        ip: 192.168.0.31
        vm_id: 103
        vm_roles: [services]
      machamp-openclaw:
        ip: 192.168.0.32
        vm_id: 102
        vm_roles: [services]
      machamp-dev:
        ip: 192.168.0.33
        vm_id: 101
        vm_roles: [dev]
