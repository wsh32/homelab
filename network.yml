# network.yml — single source of truth for all static IP assignments.
#
# Terraform reads this file directly via yamldecode().
# Ansible inventory is generated dynamically from this file by
# ansible/inventory/hosts.py — no separate hosts file to keep in sync.
#
# IP layout:
#   .1       gateway (Eero)
#   .2       nuc-dns VM (AdGuard Home — also primary DNS for all VMs)
#   .3       reserved (future backup DNS)
#   .4–.19   physical nodes
#   .20–.29  NUC VMs       (10 slots, VM IDs 200–299)
#   .30–.49  Anton VMs     (20 slots, VM IDs 100–199)
#   .50–.69  Services node VMs (20 slots, VM IDs 300–399)
#   .100+    DHCP (Eero managed, not used for static hosts)

gateway: 192.168.0.1

# DNS servers injected into all VMs via cloud-init
dns:
  - 192.168.0.2   # nuc-dns (AdGuard Home) — primary
  - 8.8.8.8       # fallback if nuc-dns is down

# All nodes — physical and compute.
#
# Fields on every node:
#   ip:              LAN IP address
#   type:            Ansible physical group (proxmox | nas | other)
#   ansible_user:    SSH user override (default: debian)
#
# Additional fields for Proxmox nodes:
#   bridge_port:     NIC bridged to vmbr0. Verify: ssh root@<ip> ip link show
#   ansible_group:   Ansible group name for this node's VMs
#   ansible_group_vars: Group vars applied to all VMs on this node
#   vms:             VMs provisioned on this node
#
# VM fields:
#   ip:              LAN IP (static, set via cloud-init)
#   vm_id:           Proxmox VM ID
#   ansible_managed: Set false to exclude from Ansible inventory (default: true)

nodes:
  storinator:
    ip: 192.168.0.4
    type: nas

  gringotts:
    ip: 192.168.0.8
    type: nas  # offsite; only reachable via Tailscale

  orangepi:
    ip: 192.168.0.7
    type: other
    ansible_user: root

  nuc:
    ip: 192.168.0.6
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`
    ansible_group: nuc_vms
    ansible_group_vars:
      proxmox_node: nuc
      ansible_user: debian
    vms:
      nuc-dns:
        ip: 192.168.0.2
        vm_id: 200
      nuc-infisical:
        ip: 192.168.0.21
        vm_id: 201
      nuc-haos:
        ip: 192.168.0.22
        vm_id: 202
        ansible_managed: false  # HAOS — no SSH access via Ansible
      nuc-deploy:
        ip: 192.168.0.23
        vm_id: 203

  anton:
    ip: 192.168.0.5
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`
    ansible_group: anton_vms
    ansible_group_vars:
      proxmox_node: anton
      ansible_user: debian
    vms:
      anton-ollama:
        ip: 192.168.0.30
        vm_id: 100
      anton-services:
        ip: 192.168.0.31
        vm_id: 103
      anton-openclaw:
        ip: 192.168.0.32
        vm_id: 102
      anton-debian:
        ip: 192.168.0.33
        vm_id: 101

  services:
    ip: 192.168.0.9
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`
    ansible_group: services_vms
    ansible_group_vars:
      proxmox_node: services
      ansible_user: debian
    vms:
      services-node:
        ip: 192.168.0.50
        vm_id: 300
