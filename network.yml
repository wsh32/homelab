# network.yml — single source of truth for all static IP assignments.
#
# Terraform reads this file directly via yamldecode().
# Ansible inventory is generated dynamically from this file by
# ansible/inventory/hosts.py — no separate hosts file to keep in sync.
#
# IP layout:
#   .1       gateway (Eero)
#   .2       nuc-dns VM (AdGuard Home — also primary DNS for all VMs)
#   .3       reserved (future backup DNS)
#   .4–.19   physical nodes
#   .20–.29  NUC VMs       (10 slots, VM IDs 200–299)
#   .30–.49  Anton VMs     (20 slots, VM IDs 100–199)
#   .50–.69  Services node VMs (20 slots, VM IDs 300–399)
#   .100+    DHCP (Eero managed, not used for static hosts)

gateway: 192.168.0.1

# DNS servers injected into all VMs via cloud-init
dns:
  - 192.168.0.2   # nuc-dns (AdGuard Home) — primary
  - 8.8.8.8       # fallback if nuc-dns is down

# Proxmox nodes — defines the Ansible group and group vars for each node's VMs.
# hosts.py creates one VM group per entry here; all values come from this section.
nodes:
  nuc:
    group: nuc_vms
    vars:
      proxmox_node: nuc
      ansible_user: debian
  anton:
    group: anton_vms
    vars:
      proxmox_node: anton
      ansible_user: debian
  services:
    group: services_vms
    vars:
      proxmox_node: services
      ansible_user: debian

# Physical nodes
# type:         used by ansible/inventory/hosts.py to assign Ansible groups;
#               any value is valid — a group is created for each unique type.
# bridge_port:  the NIC bridged to vmbr0 on Proxmox nodes.
#               Verify with: ssh root@<ip> ip link show
# ansible_user: overrides the default (debian) for this host only
physical:
  storinator:
    ip: 192.168.0.4
    type: nas
  anton:
    ip: 192.168.0.5
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`
  nuc:
    ip: 192.168.0.6
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`
  orangepi:
    ip: 192.168.0.7
    type: other
    ansible_user: root
  gringotts:
    ip: 192.168.0.8
    type: nas  # offsite; only reachable via Tailscale
  services:
    ip: 192.168.0.9
    type: proxmox
    bridge_port: eno1  # TODO: verify with `ip link show`

# VMs
# NUC:           VM IDs 200–299, IPs .20–.29
# Anton:         VM IDs 100–199, IPs .30–.49
# Services node: VM IDs 300–399, IPs .50–.69
vms:
  nuc-dns:
    ip: 192.168.0.2
    vm_id: 200
    node: nuc
  nuc-infisical:
    ip: 192.168.0.21
    vm_id: 201
    node: nuc
  nuc-haos:
    ip: 192.168.0.22
    vm_id: 202
    node: nuc
    ansible_managed: false  # HAOS — no SSH access via Ansible
  nuc-deploy:
    ip: 192.168.0.23
    vm_id: 203
    node: nuc
  anton-ollama:
    ip: 192.168.0.30
    vm_id: 100
    node: anton
  anton-openclaw:
    ip: 192.168.0.32
    vm_id: 102
    node: anton
  anton-debian:
    ip: 192.168.0.33
    vm_id: 101
    node: anton
  anton-services:
    ip: 192.168.0.31
    vm_id: 103
    node: anton
  services-node:
    ip: 192.168.0.50
    vm_id: 300
    node: services
