services:
  # ── Jellyfin ───────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8096:8096"
    entrypoint: ["/bin/sh", "-c", "cp /step-ca-root.crt /usr/local/share/ca-certificates/step-ca.crt && update-ca-certificates -f 2>/dev/null; exec /jellyfin/jellyfin"]
    volumes:
      - /mnt/nas/docker/jellyfin:/config
      - /mnt/nas/media:/data:ro
      - ./config/jellyfin-encoding.xml:/config/config/encoding.xml
      - /mnt/nas/docker/step-ca/certs/root_ca.crt:/step-ca-root.crt:ro
    environment:
      JELLYFIN_PublishedServerUrl: https://jellyfin.home
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

  # ── Servarr ────────────────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls148
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    volumes:
      - /mnt/nas/docker/prowlarr:/config
    environment:
      PUID: "1000"
      PGID: "1000"

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls304
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - /mnt/nas/docker/radarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls313
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - /mnt/nas/docker/sonarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"

  # ── VPN + Torrent ──────────────────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: private internet access
      VPN_TYPE: openvpn
      OPENVPN_USER: ${PIA_USERNAME}
      OPENVPN_PASSWORD: ${PIA_PASSWORD}
      SERVER_REGIONS: US East
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8080:8080"   # qBittorrent WebUI — also used by Traefik backend routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent-wsh.rule=Host(`qbittorrent.wsh`)"
      - "traefik.http.routers.qbittorrent-wsh.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent-wsh.tls=true"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.12-ls459
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /mnt/nas/docker/qbittorrent:/config
      - /mnt/nas/media:/data
      - /var/lib/qbittorrent/incomplete:/incomplete
    environment:
      PUID: "1000"
      PGID: "1000"
      WEBUI_PORT: "8080"
    # No ports or labels — network is shared with gluetun

  # ── Subtitles ──────────────────────────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls350
    container_name: bazarr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/bazarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"
    ports:
      - "6767:6767"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr-wsh.rule=Host(`bazarr.wsh`)"
      - "traefik.http.routers.bazarr-wsh.entrypoints=websecure"
      - "traefik.http.routers.bazarr-wsh.tls=true"
      - "traefik.http.services.bazarr-svc.loadbalancer.server.port=6767"

  # ── Media Requests ─────────────────────────────────────────────────────────
  seerr:
    image: ghcr.io/seerr-team/seerr:preview-new-oidc
    container_name: seerr
    init: true
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/seerr:/app/config
    ports:
      - "5055:5055"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr-wsh.rule=Host(`seerr.wsh`)"
      - "traefik.http.routers.seerr-wsh.entrypoints=websecure"
      - "traefik.http.routers.seerr-wsh.tls=true"
      - "traefik.http.routers.seerr-home.rule=Host(`seerr.home`)"
      - "traefik.http.routers.seerr-home.entrypoints=web"
      - "traefik.http.services.seerr-svc.loadbalancer.server.port=5055"

  # ── Usenet ────────────────────────────────────────────────────────────────
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.4-ls258
    container_name: sabnzbd
    restart: unless-stopped
    ports:
      - "8085:8080"
    volumes:
      - /mnt/nas/docker/sabnzbd:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd-home.rule=Host(`sabnzbd.home`)"
      - "traefik.http.routers.sabnzbd-home.entrypoints=web"
      - "traefik.http.routers.sabnzbd-home-tls.rule=Host(`sabnzbd.home`)"
      - "traefik.http.routers.sabnzbd-home-tls.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd-home-tls.tls=true"
      - "traefik.http.routers.sabnzbd-home-tls.tls.certresolver=step"
      - "traefik.http.services.sabnzbd-svc.loadbalancer.server.port=8080"

  # ── Archive Extraction ─────────────────────────────────────────────────────
  unpackerr:
    image: golift/unpackerr:0.15.2
    container_name: unpackerr
    restart: unless-stopped
    volumes:
      - /mnt/nas/media:/data
    environment:
      UN_SONARR_0_URL: http://sonarr:8989
      UN_SONARR_0_API_KEY: ${SONARR_API_KEY}
      UN_SONARR_0_PATHS: /data/downloads/complete
      UN_RADARR_0_URL: http://radarr:7878
      UN_RADARR_0_API_KEY: ${RADARR_API_KEY}
      UN_RADARR_0_PATHS: /data/downloads/complete
      UN_SABNZBD_0_URL: http://sabnzbd:8080
      UN_SABNZBD_0_API_KEY: ${SABNZBD_API_KEY}
      UN_SABNZBD_0_PATHS: /data/downloads/complete
    # No ports or labels — background daemon with no UI

