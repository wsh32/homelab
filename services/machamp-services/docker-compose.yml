services:
  # ── Jellyfin ───────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8096:8096"
    volumes:
      - /mnt/nas/docker/jellyfin:/config
      - /mnt/nas/media:/data:ro
      - ./config/jellyfin-encoding.xml:/config/config/encoding.xml
    environment:
      JELLYFIN_PublishedServerUrl: https://jellyfin.home
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility

  # ── Servarr ────────────────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    volumes:
      - /mnt/nas/docker/prowlarr:/config
    environment:
      PUID: "1000"
      PGID: "1000"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - /mnt/nas/docker/radarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - /mnt/nas/docker/sonarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"

  # ── VPN + Torrent ──────────────────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: private internet access
      VPN_TYPE: openvpn
      OPENVPN_USER: ${PIA_USERNAME}
      OPENVPN_PASSWORD: ${PIA_PASSWORD}
      SERVER_REGIONS: US East
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8080:8080"   # qBittorrent WebUI — also used by Traefik backend routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent-wsh.rule=Host(`qbittorrent.wsh`)"
      - "traefik.http.routers.qbittorrent-wsh.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent-wsh.tls=true"
      - "traefik.http.services.qbittorrent-svc.loadbalancer.server.port=8080"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /mnt/nas/docker/qbittorrent:/config
      - /mnt/nas/media:/data
      - /var/lib/qbittorrent/incomplete:/incomplete
    environment:
      PUID: "1000"
      PGID: "1000"
      WEBUI_PORT: "8080"
    # No ports or labels — network is shared with gluetun

  # ── Subtitles ──────────────────────────────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/bazarr:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"
    ports:
      - "127.0.0.1:6767:6767"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr-wsh.rule=Host(`bazarr.wsh`)"
      - "traefik.http.routers.bazarr-wsh.entrypoints=websecure"
      - "traefik.http.routers.bazarr-wsh.tls=true"
      - "traefik.http.services.bazarr-svc.loadbalancer.server.port=6767"

  # ── Media Requests ─────────────────────────────────────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/jellyseerr:/app/config
    ports:
      - "127.0.0.1:5055:5055"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr-wsh.rule=Host(`jellyseerr.wsh`)"
      - "traefik.http.routers.jellyseerr-wsh.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr-wsh.tls=true"
      - "traefik.http.routers.jellyseerr-home.rule=Host(`jellyseerr.home`)"
      - "traefik.http.routers.jellyseerr-home.entrypoints=web"
      - "traefik.http.services.jellyseerr-svc.loadbalancer.server.port=5055"

  # ── Usenet ────────────────────────────────────────────────────────────────
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - /mnt/nas/docker/sabnzbd:/config
      - /mnt/nas/media:/data
    environment:
      PUID: "1000"
      PGID: "1000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd-home.rule=Host(`sabnzbd.home`)"
      - "traefik.http.routers.sabnzbd-home.entrypoints=web"
      - "traefik.http.routers.sabnzbd-home-tls.rule=Host(`sabnzbd.home`)"
      - "traefik.http.routers.sabnzbd-home-tls.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd-home-tls.tls=true"
      - "traefik.http.routers.sabnzbd-home-tls.tls.certresolver=step"
      - "traefik.http.services.sabnzbd-svc.loadbalancer.server.port=8085"

  # ── Archive Extraction ─────────────────────────────────────────────────────
  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    restart: unless-stopped
    volumes:
      - /mnt/nas/media:/data
    environment:
      UN_SONARR_0_URL: http://sonarr:8989
      UN_SONARR_0_API_KEY: ${SONARR_API_KEY}
      UN_SONARR_0_PATHS: /data/downloads/complete
      UN_RADARR_0_URL: http://radarr:7878
      UN_RADARR_0_API_KEY: ${RADARR_API_KEY}
      UN_RADARR_0_PATHS: /data/downloads/complete
      UN_SABNZBD_0_URL: http://sabnzbd:8085
      UN_SABNZBD_0_API_KEY: ${SABNZBD_API_KEY}
      UN_SABNZBD_0_PATHS: /data/downloads/complete
    # No ports or labels — background daemon with no UI

