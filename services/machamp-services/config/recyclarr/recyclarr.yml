# Recyclarr configuration — syncs TRaSH Guide quality profiles to Radarr and Sonarr.
# API keys are read from environment variables (injected by Infisical at runtime).
# Profile: Option B — 4K WEB movies, 1080p WEB TV, no Remux.

radarr:
  main:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY
    quality_definition:
      type: movie
    quality_profiles:
      - name: 4K WEB Movies
        upgrade:
          allowed: true
          until_quality: WEBDL-2160p
          until_score: 10000
        min_format_score: 0
        score_set: default
        qualities:
          - name: WEBDL-2160p
            enabled: true
          - name: WEBRip-2160p
            enabled: true
          - name: Bluray-2160p
            enabled: true
          - name: WEBDL-1080p
            enabled: true
          - name: WEBRip-1080p
            enabled: true
          - name: Bluray-1080p
            enabled: true
          - name: WEBDL-720p
            enabled: true
          # Remux explicitly excluded
          - name: Remux-2160p
            enabled: false
          - name: Remux-1080p
            enabled: false
    custom_formats:
      - trash_ids:
          # Audio — prefer lossless/object-based
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95  # DTS X
          - 417804f7f2c4308c1f4c83d6a29f48d4  # Atmos (undefined)
          - 1af239278386be2919e1bcee0bde047e  # DD+ Atmos
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b  # FLAC
          - e7c2fcae07cbada050a0af3357491d7b  # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db  # DTS-HD HRA
          - 185f1dd7264c4562b9022d963ac37424  # DD+
          - f9f847ac70a0af62ea4a08280b859636  # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73  # DTS
          - 240770601cc226190c367ef59aba7463  # AAC
          - c2998bd0d90ed5621d8df281e839436e  # DD
          # HDR formats — preferred for 4K TV
          - e23edd2482476e595fb990b12e7c609c  # HDR
          - 58d6a88f13e2db7f5059c41047876f00  # HDR (undefined)
          - 55d53828b9d81cbe20b02efd00aa0efd  # HDR10
          - a3d82cbef5039cde1e943e85f6c1ca3d  # HDR10+
          - 17e889ce13117940092308f48b48b45b  # HLG
          - 2a7e3be05d3861d6df7171ec74cad727  # DV HDR10
          - 08d6d8834ad9ec87b1dc7ec8148e7a1f  # DV
          # Unwanted
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
        quality_profiles:
          - name: 4K WEB Movies

sonarr:
  main:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY
    quality_definition:
      type: series
    quality_profiles:
      - name: WEB-1080p
        upgrade:
          allowed: true
          until_quality: WEB 1080p
          until_score: 10000
        min_format_score: 0
        score_set: default
        qualities:
          - name: WEB 1080p
            enabled: true
          - name: WEB 720p
            enabled: true
          - name: WEB 480p
            enabled: true
          # Remux and 4K explicitly excluded for TV
          - name: Remux-1080p
            enabled: false
          - name: WEBDL-2160p
            enabled: false
          - name: WEBRip-2160p
            enabled: false
    custom_formats:
      - trash_ids:
          # Audio
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95  # DTS X
          - 1af239278386be2919e1bcee0bde047e  # DD+ Atmos
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
          - e7c2fcae07cbada050a0af3357491d7b  # PCM
          - 185f1dd7264c4562b9022d963ac37424  # DD+
          - f9f847ac70a0af62ea4a08280b859636  # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73  # DTS
          - 240770601cc226190c367ef59aba7463  # AAC
          - c2998bd0d90ed5621d8df281e839436e  # DD
          # Unwanted
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
        quality_profiles:
          - name: WEB-1080p
