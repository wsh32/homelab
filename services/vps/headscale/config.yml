---
# Headscale configuration — see https://github.com/juanfont/headscale/blob/main/config-example.yaml

server_url: https://headscale.wsh  # TODO: set to public VPS IP or domain

listen_addr: 0.0.0.0:443
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 127.0.0.1:50443

private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

ip_prefixes:
  - fd7a:115c:a1e0::/48
  - 100.64.0.0/10

db_type: sqlite3
db_path: /var/lib/headscale/db.sqlite

tls_cert_path: ""
tls_key_path: ""

log:
  level: info

dns_config:
  # Push AdGuard's Tailscale IP as authoritative resolver for .wsh and .home
  # to all tailnet members. Set after AdGuard VM is provisioned and has a Tailscale IP.
  nameservers:
    - 100.64.0.2  # TODO: replace with actual Tailscale IP of redstone-dns VM
  domains:
    - wsh
    - home
  magic_dns: true
  base_domain: ts.home

oidc:
  only_start_if_oidc_is_available: false
