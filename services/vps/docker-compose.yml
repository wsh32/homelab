services:
  # ── Headscale (Tailscale coordination server) ──────────────────────────────
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    volumes:
      - ./headscale/config.yml:/etc/headscale/config.yaml:ro
      - /var/lib/headscale:/var/lib/headscale
    ports:
      - "443:443"
      - "41641:41641/udp"
    command: serve

  # ── Webhook forwarder — validates GitHub HMAC, forwards to deploy VM ───────
  webhook:
    image: almir/webhook:latest
    container_name: webhook
    restart: unless-stopped
    volumes:
      - ./webhook/hooks.json:/etc/webhook/hooks.json:ro
    ports:
      - "9000:9000"
    environment:
      DEPLOY_VM_URL: http://redstone-deploy.ts.home:9001/hooks/deploy
      WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    command: ["-hooks", "/etc/webhook/hooks.json", "-verbose"]
