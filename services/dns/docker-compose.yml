networks:
  dns:
    driver: bridge

services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host  # needs port 53 on host IP
    volumes:
      - ./adguard:/opt/adguardhome/conf
      - /mnt/nas/docker/adguardhome/work:/opt/adguardhome/work
    # Pre-seeded AdGuardHome.yaml in ./adguard/ bypasses the setup wizard.
    # Admin password (bcrypt) and DNS rewrites are committed in AdGuardHome.yaml.

  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    networks:
      - dns
    ports:
      - "443:443"
    volumes:
      - ./headscale:/etc/headscale
      - /mnt/nas/docker/headscale:/var/lib/headscale
    env_file: /etc/headscale.env  # provides HEADSCALE_SERVER_URL, HEADSCALE_TLS_LETSENCRYPT_HOSTNAME
    command: serve

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    container_name: headscale-ui
    restart: unless-stopped
    networks:
      - dns
    ports:
      - "8080:80"
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    restart: unless-stopped
    network_mode: host  # needs host networking to detect the real public IP
    read_only: true
    cap_drop:
      - ALL
    env_file: /etc/headscale.env  # provides CF_API_TOKEN, DOMAINS, PROXIED
