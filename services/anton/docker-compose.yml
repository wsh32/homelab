name: anton-services

# Anton services VM — temporary services (migrates to services node when built).
# All persistent data mounts to Storinator via NFS at /mnt/nas.
# Secrets injected via Infisical.

services:

  # ── Media server ─────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - /mnt/nas/docker/jellyfin:/config
      - /mnt/nas/media:/media:ro
    devices:
      - /dev/dri:/dev/dri # Intel/AMD GPU hardware transcoding; swap for Nvidia if using P2000
    environment:
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.home`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096

  # ── Servarr stack ─────────────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/prowlarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.home`)
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/radarr:/config
      - /mnt/nas/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.home`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.services.radarr.loadbalancer.server.port=7878

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/sonarr:/config
      - /mnt/nas/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.home`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/qbittorrent:/config
      - /mnt/nas/media/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.home`)
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

  # ── Photos ───────────────────────────────────────────────────────────────────
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: unless-stopped
    volumes:
      - /mnt/nas/photos:/photoprism/originals
      - /mnt/nas/docker/photoprism:/photoprism/storage
    environment:
      - PHOTOPRISM_ADMIN_PASSWORD=${PHOTOPRISM_ADMIN_PASSWORD}
      - PHOTOPRISM_SITE_URL=https://photos.home
      - PHOTOPRISM_ORIGINALS_LIMIT=10000
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.photoprism.rule=Host(`photos.home`)
      - traefik.http.routers.photoprism.entrypoints=websecure
      - traefik.http.services.photoprism.loadbalancer.server.port=2342

  # ── Ebooks ───────────────────────────────────────────────────────────────────
  calibre_web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre_web
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/calibre:/config
      - /mnt/nas/media/books:/books
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.calibre.rule=Host(`books.home`)
      - traefik.http.routers.calibre.entrypoints=websecure
      - traefik.http.services.calibre.loadbalancer.server.port=8083

  # ── Automation ───────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/n8n:/home/node/.n8n
    environment:
      - N8N_HOST=n8n.home
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`n8n.home`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.services.n8n.loadbalancer.server.port=5678

  # ── AI assistant ─────────────────────────────────────────────────────────────
  openclaw:
    image: openclaw/openclaw:latest  # replace with actual image when available
    container_name: openclaw
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/openclaw:/data
    environment:
      - TZ=America/Los_Angeles
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw.rule=Host(`openclaw.home`)
      - traefik.http.routers.openclaw.entrypoints=websecure

  # ── Monitoring ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prometheus.home`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.services.prometheus.loadbalancer.server.port=9090

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - /mnt/nas/docker/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.home`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.services.grafana.loadbalancer.server.port=3000
