services:
  # Internal webhook listener — Tailscale only, not internet-facing.
  # Receives forwarded payloads from VPS, runs webhook-deploy.sh.
  webhook:
    image: almir/webhook:latest
    container_name: webhook
    restart: unless-stopped
    volumes:
      - ./hooks.json:/etc/webhook/hooks.json:ro
      - /home/debian/homelab:/homelab:ro   # repo checkout; deploy scripts read from here
      - /var/lock:/var/lock
    ports:
      - "9001:9000"   # Tailscale-only; firewall blocks LAN access
    command: ["-hooks", "/etc/webhook/hooks.json", "-verbose"]
