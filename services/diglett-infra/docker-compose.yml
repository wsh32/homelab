services:
  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - docker
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      step-ca:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt/nas/docker/traefik/acme:/acme
      # step-ca root cert so LEGO can trust the ACME CA endpoint
      - /mnt/nas/docker/step-ca/certs/root_ca.crt:/certs/root_ca.crt:ro
    environment:
      LEGO_CA_CERTIFICATES: /certs/root_ca.crt

  # ── step-ca (local CA for TLS certs) ──────────────────────────────────────
  step-ca:
    image: smallstep/step-ca:0.30.2
    container_name: step-ca
    restart: unless-stopped
    dns:
      - 192.168.0.2   # AdGuard on diglett-dns -- needed to resolve .home for ACME HTTP-01
      - 8.8.8.8
    volumes:
      - /mnt/nas/docker/step-ca:/home/step
    environment:
      DOCKER_STEPCA_INIT_NAME: Team Rocket
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,step-ca.wsh,localhost,192.168.0.20"
      DOCKER_STEPCA_INIT_ACME: "true"
    healthcheck:
      # nc -z works with TLS ports; start_period gives first-run init time
      test: ["CMD-SHELL", "nc -z localhost 9000"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  # ── Shared databases ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine  # TODO: upgrade to 17-alpine (EOL Nov 2025) -- requires pg_upgrade; see impl-todos.md
    container_name: postgres
    restart: unless-stopped
    volumes:
      - /var/lib/postgres:/var/lib/postgresql/data   # local disk -- not NFS
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Passed through so the init script can create per-service users.
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Infisical ─────────────────────────────────────────────────────────────
  infisical:
    image: infisical/infisical:v0.159.25
    container_name: infisical
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/infisical
      REDIS_URL: redis://redis:6379/0
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      SITE_URL: https://infisical.home
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical-home.rule=Host(`infisical.home`)"
      - "traefik.http.routers.infisical-home.entrypoints=web"
      - "traefik.http.routers.infisical-home-tls.rule=Host(`infisical.home`)"
      - "traefik.http.routers.infisical-home-tls.entrypoints=websecure"
      - "traefik.http.routers.infisical-home-tls.tls=true"
      - "traefik.http.routers.infisical-home-tls.tls.certresolver=step"
      - "traefik.http.services.infisical-svc.loadbalancer.server.port=8080"

  # ── Vaultwarden ────────────────────────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - /var/lib/vaultwarden:/data   # local disk -- backed up continuously by litestream
    environment:
      DOMAIN: https://vault.home
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vault-home.rule=Host(`vault.home`)"
      - "traefik.http.routers.vault-home.entrypoints=web"
      - "traefik.http.routers.vault-home-tls.rule=Host(`vault.home`)"
      - "traefik.http.routers.vault-home-tls.entrypoints=websecure"
      - "traefik.http.routers.vault-home-tls.tls=true"
      - "traefik.http.routers.vault-home-tls.tls.certresolver=step"
      - "traefik.http.services.vault-svc.loadbalancer.server.port=80"

  litestream:
    image: litestream/litestream:0.5.11
    container_name: litestream
    restart: unless-stopped
    depends_on:
      - vaultwarden
    volumes:
      - /var/lib/vaultwarden:/data:ro
      - /mnt/nas/docker/vaultwarden-backup:/backup
      - ./litestream.yml:/etc/litestream.yml:ro
    command: replicate

  # ── Authentik ──────────────────────────────────────────────────────────────
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "9000:9000"
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-}
    volumes:
      - /mnt/nas/docker/authentik/media:/media
      - /mnt/nas/docker/authentik/custom-templates:/templates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-home.rule=Host(`auth.home`)"
      - "traefik.http.routers.auth-home.entrypoints=web"
      - "traefik.http.routers.auth-home-tls.rule=Host(`auth.home`)"
      - "traefik.http.routers.auth-home-tls.entrypoints=websecure"
      - "traefik.http.routers.auth-home-tls.tls=true"
      - "traefik.http.routers.auth-home-tls.tls.certresolver=step"
      - "traefik.http.services.auth-svc.loadbalancer.server.port=9000"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__DB: 1
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_HOST: ${AUTHENTIK_HOST:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/nas/docker/authentik/media:/media
      - /mnt/nas/docker/authentik/custom-templates:/templates

  # ── CA certificate install page ───────────────────────────────────────────
  ca-page:
    image: nginx:1.28.0-alpine
    container_name: ca-page
    restart: unless-stopped
    volumes:
      - ./ca-page/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ca-page/index.html:/usr/share/nginx/html/index.html:ro
      - /mnt/nas/docker/step-ca/certs/root_ca.crt:/certs/root_ca.crt:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ca-home.rule=Host(`ca.home`)"
      - "traefik.http.routers.ca-home.entrypoints=web"
      - "traefik.http.routers.ca-home-tls.rule=Host(`ca.home`)"
      - "traefik.http.routers.ca-home-tls.entrypoints=websecure"
      - "traefik.http.routers.ca-home-tls.tls=true"
      - "traefik.http.routers.ca-home-tls.tls.certresolver=step"
      - "traefik.http.routers.ca-wsh-tls.rule=Host(`ca.wsh`)"
      - "traefik.http.routers.ca-wsh-tls.entrypoints=websecure"
      - "traefik.http.routers.ca-wsh-tls.tls=true"
      - "traefik.http.routers.ca-wsh-tls.tls.certresolver=step"
      - "traefik.http.services.ca-svc.loadbalancer.server.port=80"

  # ── Cloudflare Tunnel (Authentik OIDC) ────────────────────────────────────
  # Exposes only /application/o/ (Authentik OIDC) publicly via Cloudflare Tunnel.
  # Token written to /etc/cloudflare-tunnel.env by Ansible (ansible/roles/infra/tasks/main.yml).
  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file: /etc/cloudflare-tunnel.env
    # TUNNEL_TOKEN in env_file is read natively by cloudflared -- no tunnel name needed
    depends_on:
      - authentik-server

  # ── PostgreSQL backup ──────────────────────────────────────────────────────
  postgres-backup:
    image: postgres:16-alpine
    container_name: postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /mnt/nas/docker/postgres-backup:/backups
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          file="/backups/dump_$(date +%Y%m%d_%H%M%S).sql.gz"
          pg_dumpall -h postgres -U postgres | gzip > "$$file" \
            && echo "Backup saved: $$file"
          find /backups -name 'dump_*.sql.gz' -mtime +7 -delete
          sleep 86400
        done
