services:
  # ── Infisical ─────────────────────────────────────────────────────────────
  infisical-db:
    image: mongo:7.0
    container_name: infisical-db
    restart: unless-stopped
    volumes:
      - /var/lib/infisical/mongo:/data/db   # local disk — not NFS (avoid soft-mount corruption)
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

  infisical-redis:
    image: redis:7.2-alpine
    container_name: infisical-redis
    restart: unless-stopped

  infisical:
    # TODO: pin to a specific version tag. Check https://hub.docker.com/r/infisical/infisical/tags
    # before pinning — verify the tag still supports MongoDB (DB_CONNECTION_URI mongo://...).
    # Infisical began a PostgreSQL migration in late 2023; newer tags may drop MongoDB support.
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    depends_on:
      - infisical-db
      - infisical-redis
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@infisical-db:27017/infisical?authSource=admin
      REDIS_URL: redis://infisical-redis:6379
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      SITE_URL: https://infisical.wsh

  # ── MongoDB backup ─────────────────────────────────────────────────────────
  infisical-backup:
    image: mongo:7.0
    container_name: infisical-backup
    restart: unless-stopped
    depends_on:
      - infisical-db
    volumes:
      - /mnt/nas/docker/infisical-backups:/backups
    entrypoint: >
      /bin/sh -c "
        while true; do
          mongodump --uri='mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@infisical-db:27017/infisical?authSource=admin'
            --out=/backups/$$(date +%Y%m%d-%H%M%S);
          find /backups -maxdepth 1 -mtime +7 -exec rm -rf {} +;
          sleep 21600;
        done
      "

  # ── Vaultwarden ────────────────────────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:1.32.0
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - /var/lib/vaultwarden:/data   # local disk — backed up continuously by litestream
    environment:
      DOMAIN: https://vault.wsh
      # SIGNUPS_ALLOWED=true on first boot; set to false in .secrets.env after registering.
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    # No Traefik labels — routing handled by machamp Traefik file provider:
    # services/machamp/traefik/dynamic/diglett-services.yml

  # Litestream — continuous WAL streaming for Vaultwarden SQLite to NFS.
  litestream:
    image: litestream/litestream:v0.3.13
    container_name: litestream
    restart: unless-stopped
    depends_on:
      - vaultwarden
    volumes:
      - /var/lib/vaultwarden:/data:ro
      - /mnt/nas/docker/vaultwarden-backup:/backup
      - ./litestream.yml:/etc/litestream.yml:ro
    command: replicate
