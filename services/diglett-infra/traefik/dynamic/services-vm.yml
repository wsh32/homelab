        # Proxmox uses a self-signed cert; serversTransport skips verification.
        serversTransport: insecureTransport
        servers:
          - url: "https://192.168.0.5:8006"   # machamp
          - url: "https://192.168.0.6:8006"   # diglett

  serversTransports:
    insecureTransport:
      insecureSkipVerify: true
