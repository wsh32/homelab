# Recyclarr configuration -- syncs TRaSH Guide quality profiles to Radarr and Sonarr.
# API keys are read from environment variables (injected by Infisical at runtime).
# Profile: Option B -- 4K WEB movies, 1080p WEB TV, no Remux.

radarr:
  radarr-main:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY
    include:
      - template: radarr-quality-definition-movie
    quality_profiles:
      - name: 4K WEB Movies
        upgrade:
          allowed: true
          until_quality: WEBDL-2160p
          until_score: 10000
        min_format_score: 0
        score_set: default
        qualities:
          - name: WEBDL-2160p
            enabled: true
          - name: WEBRip-2160p
            enabled: true
          - name: Bluray-2160p
            enabled: true
          - name: WEBDL-1080p
            enabled: true
          - name: WEBRip-1080p
            enabled: true
          - name: Bluray-1080p
            enabled: true
          - name: WEBDL-720p
            enabled: true
          - name: Remux-2160p
            enabled: false
          - name: Remux-1080p
            enabled: false
    custom_formats:
      - trash_ids:
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
        assign_scores_to:
          - name: 4K WEB Movies
            score: -10000

sonarr:
  sonarr-main:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY
    include:
      - template: sonarr-quality-definition-series
    quality_profiles:
      - name: WEB-1080p
        upgrade:
          allowed: true
          until_quality: WEBDL-1080p
          until_score: 10000
        min_format_score: 0
        score_set: default
        qualities:
          - name: WEBDL-1080p
            enabled: true
          - name: WEBRip-1080p
            enabled: true
          - name: Bluray-1080p
            enabled: false
          - name: WEBDL-720p
            enabled: true
          - name: WEBRip-720p
            enabled: true
          - name: WEBDL-2160p
            enabled: false
          - name: WEBRip-2160p
            enabled: false
    custom_formats:
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # 3D
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
