# server_url and tls_letsencrypt_hostname are set via env vars written by cloud-init:
#   HEADSCALE_SERVER_URL=https://<hostname>
#   HEADSCALE_TLS_LETSENCRYPT_HOSTNAME=<hostname>
server_url: ""
tls_letsencrypt_hostname: ""

listen_addr: 0.0.0.0:443
metrics_listen_addr: 127.0.0.1:9090

# TLS-ALPN-01 validates over port 443 using a special TLS handshake extension.
# No port 80 needed -- port 443 (Eero port forward) is sufficient.
tls_letsencrypt_cache_dir: /var/lib/headscale/cache
tls_letsencrypt_challenge_type: TLS-ALPN-01
acme_email: wesoohoo@gmail.com

private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

disable_check_updates: true
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

policy:
  mode: file
  path: /etc/headscale/acls.hujson

log:
  level: info

dns:
  magic_dns: true
  base_domain: ts.home
  nameservers:
    global:
      # AdGuard (100.64.1.2) is the only nameserver pushed to Tailscale
      # clients. It forwards everything not matching *.wsh/*.home to
      # 8.8.8.8/8.8.4.4 itself -- exposing 8.8.8.8 directly here too would
      # let clients intermittently pick it for *.wsh queries, which it
      # can't resolve (NXDOMAIN / ERR_NAME_NOT_RESOLVED).
      - 100.64.1.2  # diglett-dns static Tailscale IP

oidc:
  only_start_if_oidc_is_available: false
  issuer: ""  # injected by Ansible: https://auth.<domain>/application/o/headscale/
  client_id: ""  # injected by Ansible from /mnt/nas/docker/headscale-oidc.env
  client_secret: ""  # injected by Ansible from /mnt/nas/docker/headscale-oidc.env
  scope: ["openid", "email", "profile"]
