global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node
    static_configs:
      # Add node_exporter targets as VMs are stood up.
      - targets:
          - diglett-infisical:9100
          - diglett-deploy:9100
          - diglett-dns:9100
          - machamp-services:9100
          - machamp-ollama:9100
          - machamp-openclaw:9100
          - machamp-dev:9100
