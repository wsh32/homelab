# External backends for machamp-infra services routed through Machamp's Traefik.
# machamp-infra runs on 192.168.0.32 — a separate VM on the same node.

http:
  routers:
    infisical-wsh:
      rule: Host(`infisical.wsh`)
      entryPoints: [websecure]
      tls: true
      service: infisical-svc
    infisical-home:
      rule: Host(`infisical.home`)
      entryPoints: [web]
      service: infisical-svc

    vault-wsh:
      rule: Host(`vault.wsh`)
      entryPoints: [websecure]
      tls: true
      service: vault-svc
    vault-home:
      rule: Host(`vault.home`)
      entryPoints: [web]
      service: vault-svc

    authentik-wsh:
      rule: Host(`authentik.wsh`)
      entryPoints: [websecure]
      tls: true
      service: authentik-svc
    authentik-home:
      rule: Host(`authentik.home`)
      entryPoints: [web]
      service: authentik-svc

  services:
    infisical-svc:
      loadBalancer:
        servers:
          - url: http://192.168.0.32:8080
    vault-svc:
      loadBalancer:
        servers:
          - url: http://192.168.0.32:80
    authentik-svc:
      loadBalancer:
        servers:
          - url: http://192.168.0.32:9000
