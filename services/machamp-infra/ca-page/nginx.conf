server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve the cert with the right MIME type so browsers/OS prompt to install it
    location = /root_ca.crt {
        alias /certs/root_ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="homelab-ca.crt"';
    }

    location / {
        index index.html;
    }
}
