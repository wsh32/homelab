# File-provider routes for off-host backends.
# Infra services (Infisical, Vaultwarden, Authentik) are handled by Docker labels.
# All services are LAN (.home) only until Tailscale is wired up — see TODOS.md.
http:
  routers:
    # ── Traefik Dashboard ─────────────────────────────────────────────────────
    traefik-home:
      rule: "Host(`traefik.home`)"
      entryPoints: [web]
      service: api@internal
    traefik-home-tls:
      rule: "Host(`traefik.home`)"
      entryPoints: [websecure]
      service: api@internal
      tls:
        certResolver: step

    # ── Headplane (diglett-dns) ───────────────────────────────────────────────
    headplane-home:
      rule: "Host(`headplane.home`)"
      entryPoints: [web]
      service: headplane-svc
    headplane-home-tls:
      rule: "Host(`headplane.home`)"
      entryPoints: [websecure]
      service: headplane-svc
      tls:
        certResolver: step

    # ── Jellyfin ──────────────────────────────────────────────────────────────
    jellyfin-home:
      rule: "Host(`jellyfin.home`)"
      entryPoints: [web]
      service: jellyfin-svc
    jellyfin-home-tls:
      rule: "Host(`jellyfin.home`)"
      entryPoints: [websecure]
      service: jellyfin-svc
      tls:
        certResolver: step

    # ── Servarr ───────────────────────────────────────────────────────────────
    prowlarr-home:
      rule: "Host(`prowlarr.home`)"
      entryPoints: [web]
      service: prowlarr-svc
    prowlarr-home-tls:
      rule: "Host(`prowlarr.home`)"
      entryPoints: [websecure]
      service: prowlarr-svc
      tls:
        certResolver: step
    radarr-home:
      rule: "Host(`radarr.home`)"
      entryPoints: [web]
      service: radarr-svc
    radarr-home-tls:
      rule: "Host(`radarr.home`)"
      entryPoints: [websecure]
      service: radarr-svc
      tls:
        certResolver: step
    sonarr-home:
      rule: "Host(`sonarr.home`)"
      entryPoints: [web]
      service: sonarr-svc
    sonarr-home-tls:
      rule: "Host(`sonarr.home`)"
      entryPoints: [websecure]
      service: sonarr-svc
      tls:
        certResolver: step

    # ── PhotoPrism ────────────────────────────────────────────────────────────
    photos-home:
      rule: "Host(`photos.home`)"
      entryPoints: [web]
      service: photos-svc
    photos-home-tls:
      rule: "Host(`photos.home`)"
      entryPoints: [websecure]
      service: photos-svc
      tls:
        certResolver: step

    # ── Calibre-Web ───────────────────────────────────────────────────────────
    books-home:
      rule: "Host(`books.home`)"
      entryPoints: [web]
      service: books-svc
    books-home-tls:
      rule: "Host(`books.home`)"
      entryPoints: [websecure]
      service: books-svc
      tls:
        certResolver: step

    # ── n8n ───────────────────────────────────────────────────────────────────
    n8n-home:
      rule: "Host(`n8n.home`)"
      entryPoints: [web]
      service: n8n-svc
    n8n-home-tls:
      rule: "Host(`n8n.home`)"
      entryPoints: [websecure]
      service: n8n-svc
      tls:
        certResolver: step

    # ── CouchDB ───────────────────────────────────────────────────────────────
    couchdb-home:
      rule: "Host(`couchdb.home`)"
      entryPoints: [web]
      service: couchdb-svc
    couchdb-home-tls:
      rule: "Host(`couchdb.home`)"
      entryPoints: [websecure]
      service: couchdb-svc
      tls:
        certResolver: step

    # ── Quartz (notes) ────────────────────────────────────────────────────────
