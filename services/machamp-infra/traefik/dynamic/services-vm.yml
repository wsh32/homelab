    # ── Prometheus ────────────────────────────────────────────────────────────
    prometheus-home:
      rule: "Host(`prometheus.home`)"
      entryPoints: [web]
      service: prometheus-svc
    prometheus-home-tls:
      rule: "Host(`prometheus.home`)"
