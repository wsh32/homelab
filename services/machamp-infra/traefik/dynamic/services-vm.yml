  services:
    headplane-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.2:3001"
    jellyfin-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:8096"
    prowlarr-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:9696"
    radarr-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:7878"
    sonarr-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:8989"
    photos-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:2342"
    books-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:8083"
    n8n-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:5678"
    couchdb-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:5984"
    notes-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:8080"
    home-svc:
      loadBalancer:
        servers:
          # homepage maps container port 3000 to host port 3001 (grafana owns 3000)
          - url: "http://192.168.0.30:3001"
    prometheus-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:9090"
    grafana-svc:
      loadBalancer:
        servers:
          - url: "http://192.168.0.30:3000"
