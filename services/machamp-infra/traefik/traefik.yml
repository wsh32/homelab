api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true

# step-ca is in the same compose network; use container name to avoid circular routing
# through Traefik itself. LEGO_CA_CERTIFICATES on the Traefik container provides the
# step-ca root cert so lego trusts the CA's TLS endpoint.
certificatesResolvers:
  step:
    acme:
      email: admin@homelab.local
      storage: /acme/acme.json
      caServer: https://step-ca:9000/acme/acme/directory
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog: {}
